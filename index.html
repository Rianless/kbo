        <button onClick={()=>mo===12?(setYr(y=>y+1),setMo(1)):setMo(m=>m+1)}
          style={{background:"none",border:"none",color:"#E31837",fontSize:"22px",padding:"4px 10px",lineHeight:1}}>›</button>
      </div>

      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"14px",overflow:"hidden",marginBottom:"16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          {WDAYS.map((w,i)=>(
            <div key={w} style={{textAlign:"center",padding:"8px 0",fontSize:"11px",fontWeight:"700",
              color:i===5?"#4FC3F7":i===6?"#EF5350":dark?"rgba(255,255,255,0.35)":"rgba(0,0,0,0.5)",fontFamily:"'Noto Sans KR',sans-serif"}}>{w}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {cells.map((day,idx)=>{
            if(!day) return <div key={`e${idx}`} style={{minHeight:"62px",borderRight:idx%7!==6?"1px solid rgba(255,255,255,0.04)":"none",borderBottom:"1px solid rgba(255,255,255,0.04)"}}/>;
            const ds = `${yr}-${pad(mo)}-${pad(day)}`;
            const kg = kbd[day];
            const isSel = ds===sel;
            const isToday = ds===today;
            const isOpen = ds==="2026-03-28";
            const dow = (f+day-1)%7;
            const oppKey = kg?(kg.home==="KIA"?kg.away:kg.home):null;
            const isHome = kg&&kg.home==="KIA";
            const opp = oppKey?T[oppKey]:null;
            const isPast = new Date(ds)<new Date("2026-03-28");
            return (
              <div key={day} onClick={()=>setSel(ds)} style={{minHeight:"68px",padding:"3px 2px",
                borderRight:"none",
                borderBottom:"none",
                background:isSel?"rgba(227,24,55,0.15)":isOpen?"rgba(255,179,0,0.06)":"transparent",
                cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",opacity:isPast?0.4:1}}>
                <div style={{width:"22px",height:"22px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:"11px",fontWeight:isToday||isOpen?"900":"500",marginTop:"2px",
                  background:isToday?(dark?"rgba(255,255,255,0.18)":"rgba(0,0,0,0.12)"):isOpen?"rgba(255,179,0,0.22)":"transparent",
                  color:dow===5?"#4FC3F7":dow===6?"#EF5350":isSel?"#fff":isOpen?"#FFB300":dark?"rgba(255,255,255,0.8)":"rgba(0,0,0,0.8)",
                  border:isSel?"2px solid #E31837":isOpen?"2px solid #FFB300":"2px solid transparent"}}>{day}</div>
                {isOpen&&!kg&&<div style={{fontSize:"8px",fontWeight:"800",color:"#FFB300",lineHeight:1}}>개막</div>}
                {kg&&opp&&(
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"1px"}}>
                    {isHome&&<div style={{fontSize:"7px",fontWeight:"800",color:"#E31837",background:"rgba(227,24,55,0.12)",borderRadius:"3px",padding:"0px 3px",lineHeight:"1.4"}}>홈</div>}
                    <div style={{width:"23px",height:"23px",borderRadius:"50%",
                      background:"transparent",border:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px"}}>
                      {opp.img?<img src={opp.img} style={{width:"100%",height:"100%",objectFit:"contain"}}/>:<span>{opp.emoji}</span>}
                    </div>
                    <div style={{fontSize:"7px",color:dark?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.4)",fontWeight:"600",lineHeight:1}}>{kg.time}</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div>
        <div style={{display:"flex",alignItems:"baseline",gap:"8px",marginBottom:"10px"}}>
          <h3 style={{fontSize:"14px",fontWeight:"900",fontFamily:"'Noto Sans KR',sans-serif",color:D.text}}>{sm}월 {sd}일 ({dw})</h3>
          <span style={{fontSize:"11px",color:dark?"rgba(255,255,255,0.3)":"rgba(0,0,0,0.45)",fontFamily:"'Noto Sans KR',sans-serif"}}>· {selGs.length>0?`${selGs.length}경기`:"경기 없음"}</span>
        </div>
        {new Date(sel)<new Date("2026-03-28")
          ? <div style={{textAlign:"center",padding:"18px",color:dark?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.3)",fontSize:"12px",fontFamily:"'Noto Sans KR',sans-serif",background:dark?"rgba(255,255,255,0.02)":"rgba(0,0,0,0.02)",borderRadius:"12px",border:"1px solid rgba(255,255,255,0.05)"}}>
              ⚾ 개막 전 · 정규시즌 개막 <strong style={{color:"rgba(255,255,255,0.4)"}}>3월 28일 (토)</strong>
            </div>
          : selGs.length===0
          ? <div style={{textAlign:"center",padding:"18px",color:dark?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.3)",fontSize:"12px",fontFamily:"'Noto Sans KR',sans-serif",background:dark?"rgba(255,255,255,0.02)":"rgba(0,0,0,0.02)",borderRadius:"12px",border:"1px solid rgba(255,255,255,0.05)"}}>
              😴 휴식일 (월요일은 경기 없음)
            </div>
          : <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {selGs.map((g,i)=>{
                const isKia = g.away==="KIA"||g.home==="KIA";
                // KIA 경기면 항상 KIA를 왼쪽에
                const kiaIsHome = g.home==="KIA";
                const leftKey  = isKia&&kiaIsHome ? g.home : g.away;
                const rightKey = isKia&&kiaIsHome ? g.away : g.home;
                const leftLabel  = isKia&&kiaIsHome ? "HOME" : "AWAY";
                const rightLabel = isKia&&kiaIsHome ? "AWAY" : "HOME";
                const aw = T[leftKey] ||{emoji:"⚾",color:"#888",name:leftKey};
                const hw = T[rightKey]||{emoji:"⚾",color:"#888",name:rightKey};
                return (
                  <div key={i} onClick={()=>onSelect(g)} style={{
                    background:isKia?"rgba(227,24,55,0.08)":D.card,
                    border:`1px solid ${isKia?"rgba(227,24,55,0.25)":D.cardBorder}`,
                    borderRadius:"14px",padding:"12px 14px",cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                        <span style={{fontSize:"11px",fontWeight:"700",color:"#FFB300",fontFamily:"'Noto Sans KR',sans-serif"}}>{g.time} 시작</span>
                        {isKia&&<span style={{fontSize:"9px",background:"#E31837",color:"#fff",borderRadius:"4px",padding:"1px 5px",fontWeight:"700"}}>🐯 KIA</span>}
                        {g.lineup&&<span style={{fontSize:"9px",background:"rgba(0,230,118,0.15)",color:"#00E676",borderRadius:"4px",padding:"1px 5px",fontWeight:"700",border:"1px solid rgba(0,230,118,0.3)"}}>라인업 공개</span>}
                      </div>
                      <span style={{fontSize:"10px",color:dark?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.35)",fontFamily:"'Noto Sans KR',sans-serif"}}>📍{g.stad} ›</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"7px",flex:1}}>
                        <div style={{width:"36px",height:"36px",borderRadius:"50%",background:"transparent",border:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"}}>
                          {aw.img?<img src={aw.img} style={{width:"100%",height:"100%",objectFit:"contain"}}/>:<span>{aw.emoji}</span>}
                        </div>
                        <div>
                          <div style={{fontSize:"12px",fontWeight:"700",fontFamily:"'Noto Sans KR',sans-serif",color:leftKey==="KIA"?"#ff6b6b":dark?"rgba(255,255,255,0.85)":"rgba(0,0,0,0.85)"}}>{aw.name}</div>
                          <div style={{fontSize:"9px",color:dark?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.35)",fontFamily:"'Noto Sans KR',sans-serif"}}>{leftLabel}</div>
                        </div>
                      </div>
                      <div style={{fontSize:"12px",fontWeight:"800",color:"#FFB300",padding:"0 8px"}}>VS</div>
                      <div style={{display:"flex",alignItems:"center",gap:"7px",flex:1,flexDirection:"row-reverse"}}>
                        <div style={{width:"36px",height:"36px",borderRadius:"50%",background:"transparent",border:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"}}>
                          {hw.img?<img src={hw.img} style={{width:"100%",height:"100%",objectFit:"contain"}}/>:<span>{hw.emoji}</span>}
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:"12px",fontWeight:"700",fontFamily:"'Noto Sans KR',sans-serif",color:rightKey==="KIA"?"#ff6b6b":dark?"rgba(255,255,255,0.85)":"rgba(0,0,0,0.85)"}}>{hw.name}</div>
                          <div style={{fontSize:"9px",color:dark?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.35)",fontFamily:"'Noto Sans KR',sans-serif"}}>{rightLabel}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
        }
      </div>
    </div>
  );
}

function App() {
  const [tab,setTab] = useState("calendar");
  const [lcat,setLcat] = useState("batting");
  const [time,setTime] = useState(new Date());
  const [game,setGame] = useState(null);
  const [dark,setDark] = useState(false);
  const D = dark ? {
    bg:"#0A0E1A", header:"#111827", card:dark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.03)", cardBorder:dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.06)",
    text:"#fff", textSub:"rgba(255,255,255,0.4)", textMuted:"rgba(255,255,255,0.2)",
    navBg:"#111827", navBorder:"rgba(255,255,255,0.08)", navText:dark?"rgba(255,255,255,0.35)":"rgba(0,0,0,0.5)",
    modalBg:"#0F1525", inputBg:"rgba(255,255,255,0.03)",
  } : {
    bg:"#E8ECF1", header:"#ffffff", card:"#ffffff", cardBorder:"rgba(0,0,0,0.12)",
    text:"#0A0E1A", textSub:"rgba(0,0,0,0.6)", textMuted:"rgba(0,0,0,0.4)",
    navBg:"#ffffff", navBorder:"rgba(0,0,0,0.12)", navText:"rgba(0,0,0,0.5)",
    modalBg:"#ffffff", inputBg:"rgba(0,0,0,0.04)",
  };

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);

  const TABS=[{id:"calendar",label:"📅 일정"},{id:"standings",label:"🏆 순위"},{id:"leaders",label:"⭐ 주목"}];

  // 모달 열릴 때 히스토리 추가, 뒤로가기 시 모달만 닫기
  const openGame = (g) => {
    setGame(g);
    history.pushState({modal:true}, "");
  };
  const closeModal = React.useRef(null);
  useEffect(()=>{
    const onPop = () => { if(closeModal.current) closeModal.current(); else setGame(null); };
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
  }, []);
  const TAB_ORDER=["calendar","standings","leaders"];

  // 스와이프 핸들러 (좌우만, 상하 스크롤 방해 안함)
  const touchStart = React.useRef(null);
  const handleTouchStart = (e) => {
    touchStart.current = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  };
  const handleTouchEnd = (e) => {
    if(!touchStart.current) return;
    const dx = touchStart.current.x - e.changedTouches[0].clientX;
    const dy = touchStart.current.y - e.changedTouches[0].clientY;
    touchStart.current = null;
    // 상하 움직임이 좌우보다 크면 스크롤로 판단, 무시
    if(Math.abs(dy) > Math.abs(dx)) return;
    // 좌우 이동이 70px 미만이면 무시
    if(Math.abs(dx) < 70) return;
    const cur = TAB_ORDER.indexOf(tab);
    if(dx > 0 && cur < TAB_ORDER.length-1) setTab(TAB_ORDER[cur+1]);
    if(dx < 0 && cur > 0) setTab(TAB_ORDER[cur-1]);
  };

  return (
    <div style={{minHeight:"100vh",background:D.bg,fontFamily:"'Inter',sans-serif",color:D.text,transition:"background 0.3s,color 0.3s"}}>
      {game&&<Modal game={game} onClose={()=>setGame(null)} closeRef={closeModal} dark={dark} D={D}/>}

      {/* 헤더 */}
      <div style={{background:dark?"linear-gradient(180deg,#111827 0%,transparent 100%)":"linear-gradient(180deg,#ffffff 0%,transparent 100%)",padding:"18px 16px 12px",transition:"background 0.3s"}}>
        <div style={{maxWidth:"600px",margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"24px"}}>🐯</span>
              <div>
                <h1 style={{fontSize:"19px",fontWeight:"900",color:D.text,background:"none",WebkitTextFillColor:"unset",fontFamily:"'Noto Sans KR',sans-serif"}}>KBO 대시보드</h1>
                <p style={{fontSize:"10px",fontWeight:"700",fontFamily:"'Noto Sans KR',sans-serif"}}>
                  <span style={{color:"#E31837"}}>KIA 타이거즈</span>
                  <span style={{color:D.textSub}}> · 2026 개막 D-2 ⚾</span>
                </p>
              </div>
            </div>
            <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px"}}>
              <div style={{fontSize:"15px",fontWeight:"700",letterSpacing:"0.04em",color:D.text}}>
                {time.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                <div style={{fontSize:"10px",color:D.textSub,fontFamily:"'Noto Sans KR',sans-serif"}}>
                  {time.toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})}
                </div>
                <button onClick={()=>setDark(!dark)} style={{
                  background:dark?dark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)":"rgba(0,0,0,0.08)",
                  border:"none",borderRadius:"20px",padding:"3px 8px",
                  fontSize:"13px",cursor:"pointer",lineHeight:1,
                }}>
                  {dark?"☀️":"🌙"}
                </button>
              </div>
            </div>
          </div>
          
        </div>
      </div>

      {/* 본문 */}
      <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} style={{maxWidth:"600px",margin:"0 auto",padding:"14px 16px 62px"}}>

        {/* 일정 탭 */}
        {tab==="calendar"&&<CalendarTab onSelect={openGame} dark={dark} D={D}/>}

        {/* 순위 탭 */}
        {tab==="standings"&&(
          <div style={{animation:"fadeIn 0.4s"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
              <h2 style={{fontSize:"12px",fontWeight:"700",color:"rgba(255,255,255,0.4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>2025 최종 순위</h2>
              <span style={{fontSize:"10px",background:"rgba(255,179,0,0.15)",border:"1px solid rgba(255,179,0,0.3)",color:"#FFB300",borderRadius:"5px",padding:"1px 6px",fontFamily:"'Noto Sans KR',sans-serif",fontWeight:"700"}}>개막 전</span>
            </div>
            <div style={{background:D.inputBg,border:`1px solid ${D.cardBorder}`,borderRadius:"14px",overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"28px 1fr 70px",padding:"9px 12px",borderBottom:"1px solid rgba(255,255,255,0.07)",fontSize:"9px",fontWeight:"700",letterSpacing:"0.1em",color:dark?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.4)",textTransform:"uppercase"}}>
                <span>#</span><span style={{fontFamily:"'Noto Sans KR',sans-serif"}}>팀</span><span style={{textAlign:"center"}}>비고</span>
              </div>
              {STAND.map((row,i)=>(
                <div key={row.r} style={{display:"grid",gridTemplateColumns:"28px 1fr 70px",padding:"11px 12px",
                  borderBottom:i<9?"1px solid rgba(255,255,255,0.04)":"none",
                  background:row.s==="KIA"?"rgba(227,24,55,0.08)":i<2?dark?"rgba(255,255,255,0.02)":"rgba(0,0,0,0.02)":"transparent",alignItems:"center"}}>
                  <span style={{fontSize:"13px",fontWeight:"800",color:row.r===1?"#FFD700":row.r===2?"#C0C0C0":row.r===3?"#CD7F32":row.r<=5?dark?"rgba(255,255,255,0.6)":"rgba(0,0,0,0.7)":dark?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.4)"}}>{row.r}</span>
                  <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                    <div style={{width:"24px",height:"24px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{T[row.s]?.img?<img src={T[row.s].img} style={{width:"100%",height:"100%",objectFit:"contain"}}/>:<span style={{fontSize:"13px"}}>{T[row.s]?.emoji}</span>}</div>
                    <span style={{fontSize:"13px",fontWeight:row.s==="KIA"?"800":"600",fontFamily:"'Noto Sans KR',sans-serif",color:row.s==="KIA"?"#ff7070":dark?"rgba(255,255,255,0.85)":"rgba(0,0,0,0.85)"}}>{row.name}</span>
                  </div>
                  <span style={{textAlign:"center",fontSize:"10px",color:dark?"rgba(255,255,255,0.3)":"rgba(0,0,0,0.45)",fontFamily:"'Noto Sans KR',sans-serif"}}>{row.note}</span>
                </div>
              ))}
            </div>
            <p style={{fontSize:"10px",color:dark?dark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.2)":"rgba(0,0,0,0.25)",textAlign:"right",marginTop:"6px",fontFamily:"'Noto Sans KR',sans-serif"}}>* 2025 정규시즌 최종 순위 기준</p>
          </div>
        )}

        {/* 주목 선수 탭 */}
        {tab==="leaders"&&(
          <div style={{animation:"fadeIn 0.4s"}}>
            <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
              {[{id:"batting",label:"타격"},{id:"hr",label:"홈런"},{id:"era",label:"투수"}].map(c=>(
                <button key={c.id} onClick={()=>setLcat(c.id)} style={{
                  padding:"6px 14px",background:lcat===c.id?"#E31837":"rgba(255,255,255,0.06)",
                  border:"1px solid",borderColor:lcat===c.id?"#E31837":dark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)",
                  color:"#fff",borderRadius:"20px",fontSize:"12px",fontWeight:"700",
                  fontFamily:"'Noto Sans KR',sans-serif",transition:"all 0.2s"}}>{c.label} 주목</button>
              ))}
            </div>
            <div style={{marginBottom:"10px",padding:"8px 12px",background:"rgba(255,179,0,0.07)",border:"1px solid rgba(255,179,0,0.2)",borderRadius:"9px"}}>
              <span style={{fontSize:"11px",color:"#FFB300",fontFamily:"'Noto Sans KR',sans-serif",fontWeight:"700"}}>⚾ 2026시즌 주목 선수 프리뷰</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {LEAD[lcat].map((p,i)=>(
                <div key={p.name} style={{display:"flex",alignItems:"center",
                  background:p.team==="KIA"?"rgba(227,24,55,0.08)":D.card,
                  border:`1px solid ${p.team==="KIA"?"rgba(227,24,55,0.28)":D.cardBorder}`,
                  borderRadius:"13px",padding:"13px 15px",gap:"12px"}}>
                  <div style={{width:"32px",height:"32px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{T[p.team]?.img?<img src={T[p.team].img} style={{width:"100%",height:"100%",objectFit:"contain"}}/>:<span style={{fontSize:"18px"}}>{T[p.team]?.emoji}</span>}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                      <span style={{fontSize:"14px",fontWeight:"800",fontFamily:"'Noto Sans KR',sans-serif"}}>{p.name}</span>
                      {p.team==="KIA"&&<span style={{fontSize:"10px",background:"#E31837",color:"#fff",borderRadius:"4px",padding:"1px 5px",fontWeight:"700"}}>KIA</span>}
                    </div>
                    <div style={{fontSize:"11px",color:dark?"rgba(255,255,255,0.35)":"rgba(0,0,0,0.5)",fontFamily:"'Noto Sans KR',sans-serif"}}>{p.team}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:"12px",fontWeight:"700",color:p.team==="KIA"?"#ff6b6b":"#FFB300",fontFamily:"'Noto Sans KR',sans-serif"}}>{p.stat}</div>
                    <div style={{fontSize:"10px",color:dark?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.4)",fontFamily:"'Noto Sans KR',sans-serif"}}>{p.label}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* 하단 네비게이션 바 */}
      <div style={{
        position:"fixed",bottom:0,left:0,right:0,
        background:D.navBg,
        borderTop:`1px solid ${D.navBorder}`,transition:"background 0.3s",
        display:"flex",
        paddingBottom:"6px",
        zIndex:50,
      }}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,
            padding:"4px 0 4px",
            background:"transparent",
            border:"none",
            display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",
            color:tab===t.id?"#E31837":D.navText,
            transition:"all 0.2s",
          }}>
            <span style={{fontSize:"18px"}}>
              {t.id==="calendar"?"📅":t.id==="standings"?"🏆":"⭐"}
            </span>
            <span style={{fontSize:"9px",fontWeight:tab===t.id?"700":"400",fontFamily:"'Noto Sans KR',sans-serif"}}>
              {t.id==="calendar"?"일정":t.id==="standings"?"순위":"주목"}
            </span>
            
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
