  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#E8ECF1" id="theme-meta"/>
  <title>KBO 대시보드 🐯</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#E8ECF1;color:#0A0E1A;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
    body.dark{background:#0A0E1A;color:#fff}
    button{cursor:pointer;border:none;outline:none;background:none;-webkit-appearance:none}
    textarea{outline:none;font-family:'Noto Sans KR',sans-serif}
    ::-webkit-scrollbar{display:none}
    .fade{animation:fadeIn 0.3s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
    #modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s}
    #modal-overlay.open{display:flex}
    #modal-box{width:100%;max-width:520px;background:#fff;border-radius:22px 22px 0 0;height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:28px;animation:slideUp 0.3s ease}
    #modal-box.closing{animation:slideDown 0.28s ease forwards}
    body.dark #modal-box{background:#0F1525}
    .nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid rgba(0,0,0,0.1);display:flex;padding-bottom:6px;z-index:50}
    body.dark .nav{background:#111827;border-color:rgba(255,255,255,0.08)}
    .nav button{flex:1;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(0,0,0,0.4);font-size:9px;font-family:'Noto Sans KR',sans-serif}
    body.dark .nav button{color:rgba(255,255,255,0.35)}
    .nav button.active{color:#E31837}
    .nav button span.icon{font-size:18px}
     .tab{display:none;animation:fadeIn 0.3s}
    .tab.active{display:block}
    .card{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:14px;padding:12px 14px;cursor:pointer;margin-bottom:8px}
    body.dark .card{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.07)}
    .card.kia{background:rgba(227,24,55,0.08);border-color:rgba(227,24,55,0.25)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
    .cal-sticky{position:sticky;top:0;z-index:10;background:inherit;}
    .cal-week-only .cal-grid#cal-grid-body .cal-cell:not(.current-week){display:none}
    .cal-cell{min-height:68px;padding:3px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:opacity 0.25s ease,max-height 0.3s ease,padding 0.3s ease,min-height 0.3s ease}
    .cal-cell.sel{background:rgba(227,24,55,0.15)}
    .cal-cell.past{opacity:0.4}
    .cal-day{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin-top:2px;border:2px solid transparent}
    .cal-day.sel{color:#E31837;border-color:#E31837}
    .cal-day.today{background:rgba(0,0,0,0.12)}
    body.dark .cal-day.today{background:rgba(255,255,255,0.18)}
    .cal-day.sat{color:#4FC3F7}
    .cal-day.sun{color:#EF5350}
    .inn-table{width:100%;border-collapse:collapse;font-size:12px;min-width:300px}
    .inn-table td{text-align:center;padding:6px 3px}
    .inn-table .team-cell{text-align:left;padding:8px 6px;font-size:11px;font-weight:700}
    .tag-kia{font-size:9px;background:#E31837;color:#fff;border-radius:4px;padding:1px 5px;font-weight:700}
    .tag-lu{font-size:9px;background:rgba(0,230,118,0.15);color:#00E676;border-radius:4px;padding:1px 5px;font-weight:700;border:1px solid rgba(0,230,118,0.3)}
  </style>

// ── 개막 D-day 자동 계산 ──
function getDday() {
  const now = new Date();
  const kstNow = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  const nowDate = new Date(kstNow.getFullYear(), kstNow.getMonth(), kstNow.getDate());
  const openDate = new Date(2026, 2, 28); // 3월 28일 개막
  const postseasonDate = new Date(2026, 7, 20); // 8월 20일 가을야구
  // 8/20 이후면 가을야구
  if (nowDate >= postseasonDate) return 'POSTSEASON';
  const diff = Math.round((openDate - nowDate) / (1000*60*60*24));
  if (diff > 0) return `D-${diff}`;
  if (diff === 0) return 'D-Day';
  return `D+${Math.abs(diff)}`;
}

      <div class="cal-grid" id="cal-grid-body">${cells}</div>
    </div>`;
  const listHtml = `<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px;padding-top:8px">
      <div style="font-size:14px;font-weight:900;color:${d.text}">${sm}월 ${sd}일 (${dw})</div>
      <span style="font-size:11px;color:${d.sub}">· ${selGs.length>0?selGs.length+'경기':'경기 없음'}</span>
    </div>

  return {calHtml, listHtml};
}

    g.status === 'FINAL' && (g.away === 'KIA' || g.home === 'KIA')

    html += '<div style="background:'+d.card+';border:2px solid '+winColor+';border-radius:16px 16px 0 0;padding:14px 16px">';

    html += '<div style="text-align:center;padding:0 8px"><span style="font-size:24px;font-weight:900;color:'+winColor+'">'+kiaScore+'</span><span style="font-size:13px;color:'+d.sub+'"> : </span><span style="font-size:24px;font-weight:900;color:'+d.text+'">'+oppScore+'</span></div>';
    html += '<div style="display:flex;align-items:center;gap:8px;flex:1;flex-direction:row-reverse">'+logo(opp,36)+'<span style="font-size:13px;font-weight:700;color:'+d.text+';text-align:right">'+(T[opp]?T[opp].name:opp)+'</span></div>';

window.saveRecordMemoEl = function(el) {
  const date = el.dataset.date, away = el.dataset.away, home = el.dataset.home;
  const key = 'm_'+date+'_'+away+'_'+home;
  let data = {};
  try { data = JSON.parse(localStorage.getItem(key)||'{}'); if(typeof data==='string') data={text:data}; } catch(e) {}
  data.text = el.value;
  localStorage.setItem(key, JSON.stringify(data));
};

function renderMemos(d) {
  const memos = [];
  for(let i=0;i<localStorage.length;i++) {
    const k=localStorage.key(i);
    if(k&&k.startsWith('m_')) {
      const raw=localStorage.getItem(k);
      if(raw&&raw.trim()) {
        const parts=k.substring(2).split('_');
        const date=parts[0], away=parts[1], home=parts[2];
        let memoData={};
        try{ memoData=JSON.parse(raw); if(typeof memoData==='string') memoData={text:raw}; }catch(e){ memoData={text:raw}; }
        if(memoData.text||memoData.photo||memoData.watch)
          memos.push({date,away,home,memo:memoData.text||'',watch:memoData.watch||'',photo:memoData.photo||null});
      }
    }
  }
  memos.sort((a,b)=>b.date.localeCompare(a.date));

  if(!memos.length) {
    return '<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:40px;margin-bottom:12px">📝</div>'
      + '<div style="font-size:15px;font-weight:700;color:'+d.text+'">메모가 없어요</div>'
      + '<div style="font-size:12px;color:'+d.sub+';margin-top:6px">경기 팝업에서 메모를 남겨보세요</div>'
      + '</div>';
  }

  let html = '<div style="font-size:12px;font-weight:700;color:'+d.sub+';margin-bottom:12px">총 '+memos.length+'개의 메모</div>';
  memos.forEach(m => {
    const isKia = m.away==='KIA'||m.home==='KIA';
    html += '<div class="card'+(isKia?' kia':'')+'" onclick="openGameByKey(this)" data-date="'+m.date+'" data-away="'+m.away+'" data-home="'+m.home+'">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html += logo(m.away,20);
    html += '<span style="font-size:11px;font-weight:700;color:'+d.sub+'">'+m.away+' vs '+m.home+'</span>';
    html += logo(m.home,20);
    html += '<span style="font-size:10px;color:'+d.sub+';margin-left:auto">'+m.date+'</span>';
    html += '</div>';
    if(m.watch) html += '<span style="font-size:10px;font-weight:700;background:'+(m.watch==='직관'?'rgba(227,24,55,0.1)':'rgba(0,120,255,0.1)')+';color:'+(m.watch==='직관'?'#E31837':'#0078ff')+';border-radius:5px;padding:2px 7px;margin-bottom:6px;display:inline-block">'+(m.watch==='직관'?'⚾ 직관':'📺 집관')+'</span>';
    if(m.memo) html += '<div style="font-size:13px;color:'+d.text+';line-height:1.6;white-space:pre-wrap;margin-top:4px">'+m.memo+'</div>';
    if(m.photo) html += '<img src="'+m.photo+'" style="width:100%;border-radius:8px;margin-top:8px;max-height:160px;object-fit:cover"/>';
    html += '</div>';
  });
  return html;
}

function renderFavs(d) {

    html += '<div class="card'+(isKia?' kia':'')+'" onclick="openGameByKey(this)" data-date="'+g.date+'" data-away="'+g.away+'" data-home="'+g.home+'">';

    html += '<div style="display:flex;align-items:center;gap:6px">';
    if(isLive) html += '<span style="font-size:9px;background:#E31837;color:#fff;border-radius:4px;padding:1px 5px;font-weight:700">LIVE</span>';
    if(isFinal) html += '<span style="font-size:9px;background:rgba(0,0,0,0.2);color:'+d.text+';border-radius:4px;padding:1px 5px;font-weight:700">종료</span>';

    html += '</div></div>';
    html += '<div style="display:flex;align-items:center;justify-content:space-between">';
    html += '<div style="display:flex;align-items:center;gap:6px;flex:1">'+logo(lKey,30)+'<span style="font-size:12px;font-weight:700;color:'+(lKey==='KIA'?'#ff6b6b':d.text)+'">'+(T[lKey]?T[lKey].name:lKey)+'</span></div>';
    html += '<div style="padding:0 8px;text-align:center">';
    if(isLive||isFinal) html += '<span style="font-size:16px;font-weight:900;color:'+d.text+'">'+lScore+' : '+rScore+'</span>';
    else html += '<span style="font-size:11px;font-weight:700;color:#FFB300">'+g.time+'</span>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;flex:1;flex-direction:row-reverse">'+logo(rKey,30)+'<span style="font-size:12px;font-weight:700;color:'+(rKey==='KIA'?'#ff6b6b':d.text)+';text-align:right">'+(T[rKey]?T[rKey].name:rKey)+'</span></div>';
    html += '</div></div>';
  });
  return html;
}

function getProfile() {
  try { return JSON.parse(localStorage.getItem('kbo_profile')||'{}'); } catch(e) { return {}; }
}
function saveProfile(data) {
  localStorage.setItem('kbo_profile', JSON.stringify({...getProfile(),...data}));
  render();
}
function editNickname() {
  const cur = getProfile().nickname||'';
  const name = prompt('닉네임을 입력하세요', cur);
  if(name !== null) saveProfile({nickname: name.trim()||'타이거즈 팬'});
}
function setProfilePhoto(input) {
  if(!input.files||!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => { saveProfile({photo: e.target.result}); };
  reader.readAsDataURL(input.files[0]);
}

                const teamScore=isHome?g.homeScore:g.awayScore;
                const oppScore=isHome?g.awayScore:g.homeScore;
                const result=teamScore>oppScore?'W':'L';
                if(!streakType){streakType=result;streak=1;}
                else if(result===streakType) streak++;
                else break;
              }
              const color=streakType==='W'?'#E31837':'#4FC3F7';
              const icon=streakType==='W'?'🔥':'💧';
              return streak>=2?`<span style="font-size:10px;font-weight:700;color:${color}">${icon}${streak}연${streakType==='W'?'승':'패'}</span>`:`<span style="font-size:10px;color:${d.sub}">${row.note}</span>`;
            })()}
          </div>
        </div>`).join('')}
    </div>
    <div style="font-size:10px;color:${d.muted};text-align:right;margin-top:6px">* 2025 정규시즌 최종 순위 기준</div>
`;
}

      </div>

  const memoKey = `m_${g.date}_${g.away}_${g.home}`;

  function getMemoData() {
    try { return JSON.parse(localStorage.getItem(memoKey)||'{}'); } catch(e) { return {}; }
  }
  function saveMemoData(data) {
    localStorage.setItem(memoKey, JSON.stringify(data));
    // 클라우드 동기화 (window.storage 사용 가능 시)
    if(window.storage) {
      window.storage.set(memoKey, JSON.stringify(data)).catch(()=>{});
    }
    const s=document.getElementById('memo-saved');
    if(s){ s.style.display='inline'; clearTimeout(window._memoT); window._memoT=setTimeout(()=>s.style.display='none',1500); }
  }
  // 클라우드에서 메모 동기화
  async function syncMemoFromCloud() {
    if(!window.storage) return;
    try {
      const result = await window.storage.get(memoKey);
      if(result && result.value) {
        const cloudData = JSON.parse(result.value);
        const localData = getMemoData();
        // 둘 다 있으면 최신 것 사용 (클라우드 우선)
        const merged = {...localData, ...cloudData};
        localStorage.setItem(memoKey, JSON.stringify(merged));
        // 화면 갱신
        const input = document.getElementById('memo-input');
        if(input && merged.text) input.value = merged.text;
        const preview = document.getElementById('memo-photo-preview');
        if(preview && merged.photo) {
          preview.innerHTML = '<div style="position:relative;display:inline-block;width:100%">'
            + '<img src="'+merged.photo+'" style="width:100%;border-radius:10px;max-height:200px;object-fit:cover"/>'
            + '<button onclick="saveMemoField(&quot;photo&quot;,null)" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);color:#fff;border-radius:50%;width:28px;height:28px;font-size:14px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer">✕</button>'
            + '</div>';
        }
      }
    } catch(e) {}
  }
  syncMemoFromCloud();
  window.saveMemoField = function(field, val) {
    const data = getMemoData();
    if(val===null) delete data[field]; else data[field]=val;
    if(field==='text') data.text=document.getElementById('memo-input')?.value||'';
    saveMemoData(data);
    renderModal(D());
  };
  window.saveMemoPhoto = function(input) {
    if(!input||!input.files||!input.files[0]) return;
    const file = input.files[0];
    // 파일 크기 제한 2MB (localStorage 용량 초과 방지)
    if(file.size > 5*1024*1024) {
      alert('사진 크기가 너무 커요. 5MB 이하의 사진을 선택해 주세요.');
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      if(!e.target||!e.target.result) return;
      const data = getMemoData();
      data.photo = e.target.result;
      saveMemoData(data);
      const preview = document.getElementById('memo-photo-preview');
      if(preview) {
        preview.innerHTML = '<div style="position:relative;display:inline-block;width:100%">'
          + '<img src="'+e.target.result+'" style="width:100%;border-radius:10px;max-height:200px;object-fit:cover"/>'
          + '<button onclick="saveMemoField(&quot;photo&quot;,null)" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);color:#fff;border-radius:50%;width:28px;height:28px;font-size:14px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer">✕</button>'
          + '</div>';
      }
      // input 초기화 (갤럭시 중복 선택 방지)
      input.value = '';
    };
    reader.onerror = () => alert('사진을 불러오는 데 실패했어요. 다시 시도해 주세요.');
    reader.readAsDataURL(file);
  };

  document.getElementById('memo-input').addEventListener('input', e => {
    const data = getMemoData();
    data.text = e.target.value;
    saveMemoData(data);
  });
}


function openGameByKey(el) {
  const date = el.dataset.date;
  const away = el.dataset.away;
  const home = el.dataset.home;
  state.sel = date;
  setTab('cal');
  setTimeout(() => {
    const dayGs = SCH.filter(g => g.date === date);
    const sorted = [...dayGs.filter(g => g.away==='KIA'||g.home==='KIA'), ...dayGs.filter(g => g.away!=='KIA'&&g.home!=='KIA')];
    const idx = sorted.findIndex(g => g.away === away && g.home === home);
    if(idx !== -1) openModal(idx, date);
  }, 100);
}

function setTab(t){
  state.tab=t;
  render();
  window.scrollTo({top:0,behavior:'instant'});
}
function setLcat(c){state.lcat=c;render();}
function goToday(){
  const now=new Date();
  const kst=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  state.yr=kst.getFullYear();
  state.mo=kst.getMonth()+1;
  state.sel=kst.getFullYear()+'-'+String(kst.getMonth()+1).padStart(2,'0')+'-'+String(kst.getDate()).padStart(2,'0');
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function toggleDark(){
  state.dark=!state.dark;
  document.body.classList.toggle('dark',state.dark);
  document.getElementById('theme-meta').setAttribute('content',state.dark?'#0A0E1A':'#E8ECF1');
  render(); if(state.modalGame) renderModal(D());
}
function prevMo(){if(state.mo===1){state.yr--;state.mo=12;}else state.mo--;render();}
function nextMo(){if(state.mo===12){state.yr++;state.mo=1;}else state.mo++;render();}
function selDate(ds){state.sel=ds;render();}

function openModal(idx,date) {
  const dayGs=SCH.filter(g=>g.date===date);
  const sorted=[...dayGs.filter(g=>g.away==='KIA'||g.home==='KIA'),...dayGs.filter(g=>g.away!=='KIA'&&g.home!=='KIA')];
  state.modalGame=sorted[idx]; state.modalLt='away';
  const overlay=document.getElementById('modal-overlay');
  const box=document.getElementById('modal-box');
  box.classList.remove('closing'); overlay.classList.add('open');
  box.scrollTop = 0;
  renderModal(D()); history.pushState({modal:true},'');
  document.body.style.overflow='hidden';
  let ty=null, txStart=0, canSwipeClose=false;
  box.ontouchstart=e=>{
    ty=e.touches[0].clientY;
    txStart=e.touches[0].clientX;
    // 최상단에서만 스와이프 닫기 가능
    canSwipeClose = (box.scrollTop <= 0);
  };
  box.ontouchmove=e=>{
    if(ty===null) return;
    const dy=e.touches[0].clientY-ty;
    const dx=Math.abs(e.touches[0].clientX-txStart);
    // 세로 스와이프이고 최상단에서 아래로 내릴 때만 preventDefault (스크롤 막기)
    if(canSwipeClose && dy>0 && dx<30) e.preventDefault();
  };
  box.ontouchend=e=>{
    if(ty===null) return;
    const dy=e.changedTouches[0].clientY-ty;
    // 최상단에서 60px 이상 아래로 스와이프 시에만 닫기
    if(canSwipeClose && dy>60) closeModal();
    ty=null;
  };
}

function closeModal() {
  const box=document.getElementById('modal-box');
  box.classList.add('closing');
  setTimeout(()=>{
    document.getElementById('modal-overlay').classList.remove('open');
    box.classList.remove('closing'); state.modalGame=null;
    document.body.style.overflow='';
  },280);
}

function setModalLt(lt){state.modalLt=lt;renderModal(D());}

document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});
window.addEventListener('popstate',()=>{if(state.modalGame)closeModal();});

setInterval(()=>{state.clock=new Date();render();},1000);




// ── 탭 스와이프 ──
(function(){
  const TABS = ['cal','stand','my'];
  let sx=0, sy=0, sScrollY=0;
  const app = document.getElementById('app');

  app.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    sScrollY = window.scrollY;
  }, {passive:true});

  app.addEventListener('touchend', e => {
    // 모달 열려있으면 무시
    if(state.modalGame) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    // 세로 스크롤 중이면 무시 (세로 이동이 가로보다 크면)
    if(Math.abs(dy) > Math.abs(dx)) return;
    // 스와이프 거리 부족하면 무시
    if(Math.abs(dx) < 60) return;
    // 스크롤이 내려간 상태면 무시
    if(window.scrollY > 30) return;
    const cur = TABS.indexOf(state.tab);
    if(dx < 0 && cur < TABS.length-1) setTab(TABS[cur+1]); // 왼쪽 스와이프 → 다음 탭
    else if(dx > 0 && cur > 0) setTab(TABS[cur-1]); // 오른쪽 스와이프 → 이전 탭
  }, {passive:true});
})();


// ── 실시간 스코어 (MLB Stats API - KBO sportId=6) ──
async function fetchTodayScores() {
  const now = new Date();
  const kst = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  const pad = n => String(n).padStart(2,'0');
  const yyyy = kst.getFullYear();
  const mm = pad(kst.getMonth()+1);
  const dd = pad(kst.getDate());
  const dateStr = `${yyyy}-${mm}-${dd}`;

  const TEAM = {
    'KIA Tigers':'KIA','KT Wiz':'KT','LG Twins':'LG','SSG Landers':'SSG','NC Dinos':'NC',
    'Doosan Bears':'두산','Lotte Giants':'롯데','Samsung Lions':'삼성','Hanwha Eagles':'한화','Kiwoom Heroes':'키움',
  };
  const mapTeam = n => {
    if(!n) return n;
    for(const [k,v] of Object.entries(TEAM)) if(n.includes(k)) return v;
    return n;
  };

  try {
    const url = `/api/kboScores`;
    const r = await fetch(url);
    if(!r.ok) return;
    const data = await r.json();
    const games = data?.games || [];
    if(!games.length) return;

    let updated = false;
    games.forEach(g => {
      const idx = SCH.findIndex(s => s.date===g.date && s.away===g.away && s.home===g.home);
      if(idx !== -1) {
        if(g.status) SCH[idx].status = g.status;
        if(g.awayScore != null) SCH[idx].awayScore = g.awayScore;
        if(g.homeScore != null) SCH[idx].homeScore = g.homeScore;
        if(g.awayInnings?.some(x=>x>=0)) SCH[idx].awayInnings = g.awayInnings;
        if(g.homeInnings?.some(x=>x>=0)) SCH[idx].homeInnings = g.homeInnings;
        if(g.inning) SCH[idx].inning = g.inning;
        if(g.winPitcher) SCH[idx].winPitcher = g.winPitcher;
        if(g.losePitcher) SCH[idx].losePitcher = g.losePitcher;
        if(g.awayStarter) SCH[idx].awayStarter = g.awayStarter;
        if(g.homeStarter) SCH[idx].homeStarter = g.homeStarter;
        updated = true;
      }
    });

    // 열려있는 모달도 갱신
    if(updated) {
      const kstDate = `${yyyy}-${mm}-${dd}`;
      if(state.sel === kstDate) render();
      if(state.modalGame) {
        const mg = SCH.find(s => s.date===state.modalGame.date && s.away===state.modalGame.away && s.home===state.modalGame.home);
        if(mg) { state.modalGame = mg; renderModal(D()); }
      }
    }
  } catch(e) {
    console.log('스코어 갱신 실패:', e.message);
  }
}

// 30초마다 갱신
fetchTodayScores();
setInterval(fetchTodayScores, 30000);

render();
