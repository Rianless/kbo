  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    :root{
      --c-text:#141925;--c-text-soft:#2d3547;--c-sub:rgba(20,25,37,0.52);--c-muted:rgba(20,25,37,0.28);--c-faint:rgba(20,25,37,0.12);
      --c-surface:#e6ebf3;--c-surface-2:#eef1f7;--c-card:#edf1f8;--c-card-b:rgba(255,255,255,0.9);--c-bg:rgba(255,255,255,0.5);--c-bg-b:rgba(200,210,230,0.55);
      --nm-1:1.5px 1.5px 4px rgba(163,177,198,0.38),-1.5px -1.5px 4px rgba(255,255,255,0.72);
      --nm-2:3px 3px 8px rgba(163,177,198,0.48),-3px -3px 8px rgba(255,255,255,0.82);
      --nm-3:5px 5px 12px rgba(163,177,198,0.55),-5px -5px 12px rgba(255,255,255,0.88);
      --nm-4:8px 8px 20px rgba(163,177,198,0.6),-8px -8px 20px rgba(255,255,255,0.92);
      --nm-5:12px 12px 32px rgba(163,177,198,0.65),-12px -12px 32px rgba(255,255,255,0.95);
      --nm-inset:inset 2px 2px 5px rgba(163,177,198,0.55),inset -2px -2px 5px rgba(255,255,255,0.78);
      --nm-inset-deep:inset 3px 3px 8px rgba(163,177,198,0.65),inset -3px -3px 8px rgba(255,255,255,0.85);
      --edge-top:inset 0 1px 0 rgba(255,255,255,1);--edge-bottom:inset 0 -1px 0 rgba(163,177,198,0.15);
      --nm-shadow:var(--nm-3);--nm-shadow-sm:var(--nm-2);
      --glass-bg:rgba(255,255,255,0.6);--glass-border:rgba(255,255,255,0.85);--glass-blur:blur(18px) saturate(1.4);
      --accent:#E31837;--accent-2:#ff2a4e;--accent-soft:rgba(227,24,55,0.1);
      --accent-glow:0 4px 14px rgba(227,24,55,0.35),inset 0 1px 0 rgba(255,255,255,0.25);
      --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:26px;--r-full:999px;
      --ease-soft:cubic-bezier(0.32,0.72,0.25,1);--ease-bounce:cubic-bezier(0.34,1.35,0.64,1);
    }
    body.dark{
      --c-text:#edf1fa;--c-text-soft:#c7cdd9;--c-sub:rgba(237,241,250,0.48);--c-muted:rgba(237,241,250,0.22);--c-faint:rgba(237,241,250,0.1);
      --c-surface:#0a0e17;--c-surface-2:#111825;--c-card:#151c2b;--c-card-b:rgba(255,255,255,0.05);--c-bg:rgba(255,255,255,0.035);--c-bg-b:rgba(255,255,255,0.07);
      --nm-1:0 2px 6px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04);
      --nm-2:0 4px 12px rgba(0,0,0,0.38),inset 0 1px 0 rgba(255,255,255,0.05);
      --nm-3:0 6px 20px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.06);
      --nm-4:0 10px 30px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.07);
      --nm-5:0 16px 48px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,255,0.08);
      --nm-inset:inset 0 2px 6px rgba(0,0,0,0.5),inset 0 -1px 2px rgba(255,255,255,0.04);
      --nm-inset-deep:inset 0 3px 10px rgba(0,0,0,0.6),inset 0 -1px 3px rgba(255,255,255,0.06);
      --edge-top:inset 0 1px 0 rgba(255,255,255,0.08);--edge-bottom:inset 0 -1px 0 rgba(0,0,0,0.3);
      --nm-shadow:var(--nm-3);--nm-shadow-sm:var(--nm-2);
      --glass-bg:rgba(21,28,43,0.7);--glass-border:rgba(255,255,255,0.07);--glass-blur:blur(24px) saturate(1.6);
      --accent:#ff3355;--accent-2:#ff5574;--accent-soft:rgba(255,51,85,0.14);
      --accent-glow:0 4px 16px rgba(255,51,85,0.35),inset 0 1px 0 rgba(255,255,255,0.08);
    }
    body{background:var(--c-surface);color:var(--c-text);font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;transition:background 0.35s var(--ease-soft),color 0.3s var(--ease-soft);min-height:100vh}
    body:not(.dark){background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,255,255,0.6),transparent 60%),radial-gradient(ellipse 60% 40% at 100% 100%,rgba(227,24,55,0.035),transparent 50%),linear-gradient(160deg,#dbe2ef 0%,#e6ebf3 45%,#dbe2ef 100%);background-attachment:fixed}

    /* ═══════════════════════════════════════════════════════════════
       PC LAYOUT — HUD 미래형 데이터 대시보드 (≥1080px: 3-column)
       PC LAYOUT — 2-column (900–1079px)
    ═══════════════════════════════════════════════════════════════ */

    /* ── 공통: 모바일 nav 숨김 / 스크롤바 ── */
    @media (min-width:900px) {
      .nav { display: none !important; }

      ::-webkit-scrollbar { display: block !important; width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--c-faint); border-radius: 4px; }
      body.dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

      /* ── 모달 → 중앙 팝업 ── */
      #modal-overlay { align-items: center !important; }
      #modal-box {
        max-width: 640px; height: 85vh;
        border-radius: var(--r-xl) !important;
        border-bottom: 1px solid var(--glass-border) !important;
        margin-bottom: 0;
        animation: fadeIn 0.22s var(--ease-soft) !important;
      }
      #ticket-panel { align-items: center !important; }
      #ticket-box {
        max-width: 480px;
        border-radius: var(--r-xl) !important;
        border-bottom: 1px solid var(--glass-border) !important;
        animation: fadeIn 0.22s var(--ease-soft) !important;
      }
      #relay-panel { align-items: center !important; }
      #relay-box {
        border-radius: var(--r-xl) !important;
        border-bottom: 1px solid var(--glass-border) !important;
      }
    }

    /* ── PC 공통 배경 ── */
    @media (min-width:900px) {
      body:not(.dark) {
        background:
          radial-gradient(ellipse 70% 50% at 20% 0%, rgba(255,255,255,0.5), transparent 55%),
          radial-gradient(ellipse 50% 40% at 85% 95%, rgba(227,24,55,0.05), transparent 50%),
          linear-gradient(155deg, #cdd6e4 0%, #dae2ef 45%, #cfd8e6 100%);
        background-attachment: fixed;
      }
      body.dark {
        background:
          radial-gradient(ellipse 80% 60% at 50% -5%, rgba(30,45,100,0.22), transparent 60%),
          radial-gradient(ellipse 55% 40% at 95% 100%, rgba(255,40,80,0.14), transparent 50%),
          radial-gradient(ellipse 40% 30% at 0% 60%, rgba(0,200,180,0.04), transparent 50%),
          linear-gradient(160deg, #020408 0%, #060a12 50%, #090e1a 100%);
        background-attachment: fixed;
      }
    }

    /* ══════════════════════════════
       3-COLUMN: ≥1080px
    ══════════════════════════════ */
    @media (min-width:1080px) {
      #app {
        display: grid;
        grid-template-columns: 200px 1fr 260px;
        grid-template-rows: 100vh;
        max-width: 1600px;
        margin: 0 auto;
      }
      #pc-sidebar   { display: flex !important; grid-column: 1; }
      #content-wrapper { grid-column: 2; overflow-y: auto; height: 100vh; }
      #pc-right-panel  { display: flex !important; grid-column: 3; }
      #content {
        max-width: 100% !important;
        padding: 28px 28px 48px !important;
        margin: 0 !important;
      }
    }

    /* ══════════════════════════════
       2-COLUMN: 900–1079px
    ══════════════════════════════ */
    @media (min-width:900px) and (max-width:1079px) {
      #app {
        display: grid;
        grid-template-columns: 190px 1fr;
        grid-template-rows: 100vh;
        max-width: 1200px;
        margin: 0 auto;
      }
      #pc-sidebar   { display: flex !important; grid-column: 1; }
      #content-wrapper { grid-column: 2; overflow-y: auto; height: 100vh; }
      #pc-right-panel  { display: none !important; }
      #content {
        max-width: 100% !important;
        padding: 28px 28px 48px !important;
        margin: 0 !important;
      }
    }

    /* ── 모바일: 사이드바·우측 패널 숨김 ── */
    @media (max-width:899px) {
      #pc-sidebar      { display: none !important; }
      #pc-right-panel  { display: none !important; }
      #content-wrapper { display: contents; }
    }

    /* ══════════════════════════════════════════════
       공통 사이드바 스타일
    ══════════════════════════════════════════════ */
    #pc-sidebar {
      display: none; /* 모바일 기본값, PC에서 flex로 오버라이드 */
      flex-direction: column;
      position: sticky; top: 0; height: 100vh;
      padding: 24px 14px 20px;
      overflow: hidden;
      z-index: 40;
      border-right: 1px solid var(--glass-border);
    }
    body:not(.dark) #pc-sidebar {
      background: rgba(220,228,242,0.88);
      border-right-color: rgba(255,255,255,0.75);
      box-shadow: 2px 0 24px rgba(163,177,198,0.2);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
    }
    body.dark #pc-sidebar {
      background: rgba(5,8,16,0.92);
      border-right-color: rgba(255,255,255,0.04);
      box-shadow: 2px 0 40px rgba(0,0,0,0.6), 1px 0 0 rgba(255,40,80,0.04);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
    }
    /* 스캔라인 */
    #pc-sidebar::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.01) 3px, rgba(0,0,0,0.01) 4px);
    }
    body.dark #pc-sidebar::before {
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,200,255,0.012) 3px, rgba(0,200,255,0.012) 4px);
    }
    /* 다크모드: 오른쪽 엣지 글로우 라인 */
    body.dark #pc-sidebar::after {
      content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 1px;
      background: linear-gradient(to bottom, transparent 0%, rgba(255,40,80,0.25) 30%, rgba(255,40,80,0.1) 70%, transparent 100%);
      pointer-events: none;
    }
    #pc-sidebar > * { position: relative; z-index: 1; }

    /* ── 로고 ── */
    #pc-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px; padding: 0 2px;
    }
    #pc-logo-emblem {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      box-shadow: var(--accent-glow), 0 4px 16px rgba(227,24,55,0.3);
      position: relative; overflow: hidden;
    }
    #pc-logo-emblem::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: rgba(255,255,255,0.18); border-radius: 10px 10px 0 0;
    }
    body.dark #pc-logo-emblem {
      box-shadow: 0 0 0 1px rgba(255,40,80,0.5), 0 0 16px rgba(255,40,80,0.35), 0 4px 12px rgba(0,0,0,0.5);
    }
    #pc-logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    #pc-logo-text .title {
      font-size: 12px; font-weight: 900; color: var(--c-text); letter-spacing: 0.02em;
    }
    #pc-logo-text .sub {
      font-size: 8.5px; font-weight: 700; color: var(--c-sub);
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px;
    }
    body.dark #pc-logo-text .sub {
      color: var(--accent); text-shadow: 0 0 8px rgba(255,40,80,0.6);
    }

    /* ── 시계 위젯 ── */
    #pc-clock-widget {
      border-radius: var(--r-md); padding: 10px 12px; margin-bottom: 20px;
      font-variant-numeric: tabular-nums; position: relative; overflow: hidden;
    }
    body:not(.dark) #pc-clock-widget {
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: var(--nm-inset);
    }
    body.dark #pc-clock-widget {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,40,80,0.06);
    }
    body.dark #pc-clock-widget::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,40,80,0.3), transparent);
    }
    #pc-clock-time {
      font-size: 20px; font-weight: 900; letter-spacing: 0.06em;
      color: var(--c-text); line-height: 1; font-variant-numeric: tabular-nums;
    }
    body.dark #pc-clock-time {
      color: #ff2a50;
      text-shadow: 0 0 10px rgba(255,40,80,0.5), 0 0 24px rgba(255,40,80,0.2);
    }
    #pc-clock-date {
      font-size: 9.5px; font-weight: 600; color: var(--c-sub); margin-top: 3px; letter-spacing: 0.03em;
    }
    body.dark #pc-clock-date { color: rgba(255,255,255,0.35); }

    /* ── 내비 버튼 ── */
    #pc-nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .pc-nav-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px; border-radius: var(--r-md);
      font-size: 12.5px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
      color: var(--c-sub); background: transparent; border: none; cursor: pointer;
      transition: all 0.18s var(--ease-soft); text-align: left;
      position: relative; overflow: hidden;
    }
    /* 왼쪽 액티브 인디케이터 바 */
    .pc-nav-btn::before {
      content: ''; position: absolute; left: 0; top: 18%; bottom: 18%;
      width: 2.5px; border-radius: 2px; background: var(--accent);
      opacity: 0; transition: opacity 0.18s, transform 0.22s var(--ease-bounce);
      transform: scaleY(0.2);
    }
    /* 다크모드: 호버시 배경 스캔 효과 */
    .pc-nav-btn::after {
      content: ''; position: absolute; inset: 0; border-radius: var(--r-md);
      background: linear-gradient(90deg, transparent, rgba(255,40,80,0.04), transparent);
      opacity: 0; transition: opacity 0.2s;
      transform: translateX(-100%);
    }
    .pc-nav-btn:hover::after { opacity: 1; transform: translateX(0); }
    .pc-nav-btn .nav-icon {
      width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
      background: var(--c-bg); box-shadow: var(--nm-1);
      transition: all 0.2s var(--ease-bounce);
    }
    body.dark .pc-nav-btn .nav-icon {
      background: rgba(255,255,255,0.03);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .pc-nav-btn:hover { color: var(--c-text); background: var(--c-bg); }
    body.dark .pc-nav-btn:hover { background: rgba(255,255,255,0.03); }
    .pc-nav-btn:hover .nav-icon { transform: scale(1.1) rotate(-4deg); }
    .pc-nav-btn.active { color: var(--accent); background: var(--accent-soft); }
    body.dark .pc-nav-btn.active {
      background: rgba(255,40,80,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 0 12px rgba(255,40,80,0.04);
    }
    .pc-nav-btn.active::before { opacity: 1; transform: scaleY(1); }
    body.dark .pc-nav-btn.active::before { box-shadow: 0 0 6px rgba(255,40,80,0.6); }
    .pc-nav-btn.active .nav-icon {
      background: linear-gradient(135deg, var(--accent-soft), transparent);
      box-shadow: var(--nm-1), inset 0 1px 0 rgba(255,255,255,0.3);
      transform: translateY(-1px) scale(1.06);
    }
    body.dark .pc-nav-btn.active .nav-icon {
      background: linear-gradient(135deg, rgba(255,40,80,0.2), rgba(255,40,80,0.05));
      box-shadow: 0 0 12px rgba(255,40,80,0.2), 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .pc-nav-btn .nav-label { flex: 1; }

    /* ── 사이드바 푸터 ── */
    #pc-sidebar-footer {
      border-top: 1px solid var(--c-faint); padding-top: 14px; margin-top: 6px;
      display: flex; flex-direction: column; gap: 8px;
    }
    body.dark #pc-sidebar-footer { border-top-color: rgba(255,255,255,0.05); }
    #pc-dark-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border-radius: var(--r-md);
      background: var(--c-bg); border: 1px solid var(--glass-border);
      cursor: pointer; font-size: 11.5px; font-weight: 700; color: var(--c-sub);
      box-shadow: var(--nm-1), var(--edge-top);
      transition: all 0.15s var(--ease-soft); font-family: 'Noto Sans KR', sans-serif;
    }
    body.dark #pc-dark-toggle {
      background: rgba(255,255,255,0.025); border-color: rgba(255,255,255,0.05);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #pc-dark-toggle:hover { color: var(--c-text); }
    #pc-dark-toggle .toggle-track {
      width: 32px; height: 17px; border-radius: 9px;
      background: var(--c-bg-b); box-shadow: var(--nm-inset);
      position: relative; transition: background 0.25s; flex-shrink: 0;
    }
    body.dark #pc-dark-toggle .toggle-track {
      background: var(--accent);
      box-shadow: 0 0 8px rgba(255,40,80,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    #pc-dark-toggle .toggle-thumb {
      width: 11px; height: 11px; border-radius: 50%; background: #fff;
      position: absolute; top: 3px; left: 3px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      transition: transform 0.25s var(--ease-bounce);
    }
    body.dark #pc-dark-toggle .toggle-thumb { transform: translateX(15px); }
    #pc-version {
      text-align: center; font-size: 8.5px; font-weight: 700; color: var(--c-muted);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    body.dark #pc-version { color: rgba(255,40,80,0.25); }

    /* ══════════════════════════════════════════════
       오른쪽 정보 패널 (PC 전용, ≥1080px)
    ══════════════════════════════════════════════ */
    #pc-right-panel {
      display: none; /* 모바일 기본값, ≥1080px에서 flex로 오버라이드 */
      flex-direction: column;
      position: sticky; top: 0; height: 100vh;
      padding: 24px 16px 20px;
      overflow-y: auto; overflow-x: hidden;
      z-index: 40;
      border-left: 1px solid var(--glass-border);
      scrollbar-width: none;
    }
    #pc-right-panel::-webkit-scrollbar { display: none; }
    body:not(.dark) #pc-right-panel {
      background: rgba(220,228,242,0.82);
      border-left-color: rgba(255,255,255,0.7);
      box-shadow: -2px 0 24px rgba(163,177,198,0.18);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
    }
    body.dark #pc-right-panel {
      background: rgba(4,7,14,0.92);
      border-left-color: rgba(255,255,255,0.04);
      box-shadow: -2px 0 40px rgba(0,0,0,0.55), -1px 0 0 rgba(255,40,80,0.04);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
    }
    body.dark #pc-right-panel::before {
      content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 1px;
      background: linear-gradient(to bottom, transparent 0%, rgba(255,40,80,0.2) 30%, rgba(255,40,80,0.08) 70%, transparent 100%);
      pointer-events: none;
    }
    #pc-right-panel > * { position: relative; z-index: 1; }

    /* 우측 패널 섹션 헤더 */
    .rp-section {
      margin-bottom: 16px;
    }
    .rp-section-title {
      font-size: 9px; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--c-muted);
      margin-bottom: 8px; padding: 0 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .rp-section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--c-faint), transparent);
    }
    body.dark .rp-section-title {
      color: rgba(255,40,80,0.45);
    }
    body.dark .rp-section-title::after {
      background: linear-gradient(90deg, rgba(255,40,80,0.15), transparent);
    }

    /* 우측 카드 공통 */
    .rp-card {
      background: var(--c-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 12px 13px;
      margin-bottom: 8px;
      box-shadow: var(--nm-1), var(--edge-top);
      transition: transform 0.15s var(--ease-soft);
    }
    body.dark .rp-card {
      background: rgba(255,255,255,0.025);
      border-color: rgba(255,255,255,0.05);
      box-shadow: 0 2px 12px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .rp-card:hover { transform: translateY(-1px); }
    body.dark .rp-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,40,80,0.08); }

    /* 시스템 상태 지표 */
    .rp-stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0; font-size: 11px;
    }
    .rp-stat-row + .rp-stat-row { border-top: 1px solid var(--c-faint); }
    body.dark .rp-stat-row + .rp-stat-row { border-top-color: rgba(255,255,255,0.04); }
    .rp-stat-label { font-weight: 600; color: var(--c-sub); font-size: 10.5px; }
    .rp-stat-val { font-weight: 800; color: var(--c-text); font-size: 11px; font-variant-numeric: tabular-nums; }
    body.dark .rp-stat-val { color: rgba(200,220,255,0.9); }
    .rp-stat-val.live { color: var(--accent); }
    body.dark .rp-stat-val.live { text-shadow: 0 0 8px rgba(255,40,80,0.45); }
    .rp-stat-val.ok { color: #22c55e; }
    body.dark .rp-stat-val.ok { color: #4ade80; text-shadow: 0 0 8px rgba(74,222,128,0.3); }

    /* 순위 미니 리스트 */
    .rp-rank-row {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 0; font-size: 11px;
    }
    .rp-rank-row + .rp-rank-row { border-top: 1px solid var(--c-faint); }
    body.dark .rp-rank-row + .rp-rank-row { border-top-color: rgba(255,255,255,0.04); }
    .rp-rank-num {
      font-size: 10px; font-weight: 900; color: var(--c-muted);
      width: 14px; text-align: center; flex-shrink: 0;
    }
    .rp-rank-num.top3 { color: var(--accent); }
    body.dark .rp-rank-num.top3 { text-shadow: 0 0 6px rgba(255,40,80,0.5); }
    .rp-rank-team { font-weight: 800; font-size: 11px; color: var(--c-text); flex: 1; }
    .rp-rank-note { font-size: 9.5px; font-weight: 600; color: var(--c-muted); }

    /* HUD 배지 */
    .rp-hud-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.06em;
      padding: 2px 7px; border-radius: var(--r-full);
      border: 1px solid currentColor; opacity: 0.75;
    }
    .rp-hud-badge.green { color: #22c55e; }
    .rp-hud-badge.red { color: var(--accent); }
    body.dark .rp-hud-badge.green { color: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.25); }
    body.dark .rp-hud-badge.red { box-shadow: 0 0 6px rgba(255,40,80,0.25); }

    /* 오늘의 KIA 경기 카드 */
    .rp-game-card {
      border-radius: var(--r-md); padding: 12px;
      background: linear-gradient(135deg, rgba(227,24,55,0.08), rgba(227,24,55,0.02));
      border: 1px solid rgba(227,24,55,0.2);
      margin-bottom: 8px;
      box-shadow: var(--nm-1), 0 2px 10px rgba(227,24,55,0.06);
    }
    body.dark .rp-game-card {
      background: linear-gradient(135deg, rgba(255,40,80,0.1), rgba(255,40,80,0.03));
      border-color: rgba(255,40,80,0.18);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,40,80,0.08);
    }
    .rp-game-teams {
      display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px;
    }
    .rp-game-team { font-size: 13px; font-weight: 900; color: var(--c-text); }
    .rp-game-vs { font-size: 9px; font-weight: 700; color: var(--c-muted); }
    .rp-game-score {
      text-align: center; font-size: 22px; font-weight: 900;
      letter-spacing: 0.04em; color: var(--c-text); line-height: 1;
      font-variant-numeric: tabular-nums; margin-bottom: 4px;
    }
    body.dark .rp-game-score { color: #fff; }
    .rp-game-meta { text-align: center; font-size: 10px; font-weight: 600; color: var(--c-sub); }

    /* 세그먼트 바 (이닝 진행 등) */
    .rp-seg-bar {
      height: 3px; border-radius: 2px; background: var(--c-faint);
      overflow: hidden; margin-top: 8px;
    }
    .rp-seg-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.6s var(--ease-soft);
    }
    body.dark .rp-seg-fill {
      box-shadow: 0 0 6px rgba(255,40,80,0.5);
    }

    /* D-day 큰 배지 */
    .rp-dday {
      text-align: center; padding: 10px 12px;
      border-radius: var(--r-md);
      background: linear-gradient(135deg, var(--accent-soft), transparent);
      border: 1px solid rgba(227,24,55,0.2);
    }
    body.dark .rp-dday { border-color: rgba(255,40,80,0.2); }
    .rp-dday-val {
      font-size: 26px; font-weight: 900; color: var(--accent); line-height: 1;
    }
    body.dark .rp-dday-val { text-shadow: 0 0 16px rgba(255,40,80,0.5); }
    .rp-dday-label { font-size: 9.5px; font-weight: 700; color: var(--c-sub); margin-top: 3px; letter-spacing: 0.04em; }

    /* ── 메인 콘텐츠 래퍼 ── */
    #content-wrapper { display: block; position: relative; }
  </style>

</head>
<body>

<div id="app">
  <!-- ── 왼쪽 사이드바 ── -->
  <aside id="pc-sidebar">
    <div id="pc-logo">
      <div id="pc-logo-emblem">⚾</div>
      <div id="pc-logo-text">
        <span class="title">KBO 대시보드</span>
        <span class="sub">horang2 · 2026</span>
      </div>
    </div>
    <div id="pc-clock-widget">
      <div id="pc-clock-time">--:--:--</div>
      <div id="pc-clock-date">날짜 로딩중...</div>
    </div>
    <nav id="pc-nav">
      <button class="pc-nav-btn active" onclick="setTab('cal')" id="pc-btn-cal">
        <div class="nav-icon"><img src="https://raw.githubusercontent.com/Rianless/kbo/main/images/calender.png" style="width:22px;height:22px;object-fit:contain" onerror="this.outerHTML='⚾'"/></div>
        <span class="nav-label">일정</span>
      </button>
      <button class="pc-nav-btn" onclick="setTab('stand')" id="pc-btn-stand">
        <div class="nav-icon"><img src="https://raw.githubusercontent.com/Rianless/kbo/main/images/lank.png" style="width:22px;height:22px;object-fit:contain" onerror="this.outerHTML='📊'"/></div>
        <span class="nav-label">기록</span>
      </button>
      <button class="pc-nav-btn" onclick="setTab('my')" id="pc-btn-my">
        <div class="nav-icon"><img src="https://raw.githubusercontent.com/Rianless/kbo/main/images/mypage.png" style="width:22px;height:22px;object-fit:contain" onerror="this.outerHTML='🐯'"/></div>
        <span class="nav-label">마이페이지</span>
      </button>
    </nav>
    <div id="pc-sidebar-footer">
      <button id="pc-dark-toggle" onclick="toggleDark()">
        <span>다크 모드</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </button>
      <div id="pc-version">KBO · SYSTEM ONLINE · KST</div>
    </div>
  </aside>

  <!-- ── 메인 콘텐츠 ── -->
  <div id="content-wrapper">
    <div id="content" style="max-width:600px;margin:0 auto;padding:14px 16px 80px"></div>
  </div>

  <!-- ── 오른쪽 정보 패널 ── -->
  <aside id="pc-right-panel">
    <!-- KIA 오늘 경기 -->
    <div class="rp-section" id="rp-today-section">
      <div class="rp-section-title">오늘의 KIA</div>
      <div id="rp-today-game">
        <div class="rp-dday">
          <div class="rp-dday-val" id="rp-dday-val">--</div>
          <div class="rp-dday-label">KBO 정규시즌</div>
        </div>
      </div>
    </div>
    <!-- 현재 순위 스냅샷 -->
    <div class="rp-section">
      <div class="rp-section-title">순위 스냅샷</div>
      <div class="rp-card" id="rp-standings">
        <div style="text-align:center;padding:10px;font-size:11px;color:var(--c-muted)">순위 로딩 중...</div>
      </div>
    </div>

const _API_RECORDS = '/api/records';
let _serverSyncDone = false;

async function serverGetAll() {
  try {
    const r = await fetch(_API_RECORDS + '?action=getAll');
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function serverSet(key, value) {
  try {
    await fetch(_API_RECORDS + '?action=set&key=' + encodeURIComponent(key), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(value)
    });
  } catch(e) {}
}

async function serverDel(key) {
  try {
    await fetch(_API_RECORDS + '?action=del&key=' + encodeURIComponent(key), {
      method: 'DELETE'
    });
  } catch(e) {}
}

// 앱 시작 시 서버 → localStorage 동기화
async function initServerSync() {
  const data = await serverGetAll();
  if (!data) return;
  Object.entries(data).forEach(([key, value]) => {
    // 사진(base64)은 서버에서 안 내려오지만 혹시 모르니 스킵
    if (key === 'kbo_game_cache') return;
    const existing = localStorage.getItem(key);
    // 서버 데이터로 덮어쓰기 (서버가 진실의 원천)
    localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
  });
  _serverSyncDone = true;
}

// localStorage + 서버 동시 저장
function syncSet(key, value) {
  const str = typeof value === 'string' ? value : JSON.stringify(value);
  localStorage.setItem(key, str);
  serverSet(key, value);
}

// localStorage + 서버 동시 삭제
function syncDel(key) {
  localStorage.removeItem(key);
  serverDel(key);
}

function favKey(g) { return `${g.date}_${g.away}_${g.home}`; }
function isFav(g) { return FAVS.includes(favKey(g)); }
function toggleFav(g) {
  const k=favKey(g);
  if(FAVS.includes(k)) FAVS=FAVS.filter(x=>x!==k);
  else FAVS.push(k);

}

// ── 개막 D-day 자동 계산 ──
function getDday() {
  const now = new Date();
  const kstNow = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  const nowDate = new Date(kstNow.getFullYear(), kstNow.getMonth(), kstNow.getDate());
  const openDate = new Date(2026, 2, 28); // 3월 28일 개막
  const postseasonDate = new Date(2026, 7, 20); // 8월 20일 가을야구
  // 8/20 이후면 가을야구
  if (nowDate >= postseasonDate) return 'POSTSEASON';
  const diff = Math.round((openDate - nowDate) / (1000*60*60*24));
  if (diff > 0) return `D-${diff}`;
  if (diff === 0) return 'D-Day';
  return `D+${Math.abs(diff)}`;
}

const pad = n => String(n).padStart(2,'0');

const normalizePositionLabel = pos => {
  // 비필드 포지션(대주자/대타/주자 등)은 빈 문자열로 반환 → buildDisplayLineup에서 starterPos로 폴백
  const nonField = new Set(['대주자','대타','주자','대주자/대타','대타/대주자']);
  if (nonField.has(pos)) return '';
  const map = {
    '중견수':'CF','좌익수':'LF','우익수':'RF','유격수':'SS',
    '2루수':'2B','1루수':'1B','3루수':'3B','포수':'C',
    '투수':'P','지명타자':'DH',
    CF:'CF', LF:'LF', RF:'RF', SS:'SS', '2B':'2B', '1B':'1B', '3B':'3B', C:'C', P:'P', DH:'DH'
  };
  return map[pos] || '';
};
// 다이아몬드에 표시 가능한 포지션 코드 목록
const FIELD_POSITIONS = new Set(['CF','LF','RF','SS','2B','1B','3B','C','P','DH']);
// 포지션이 실제 수비 포지션인지 확인 (대주자/대타 등 비필드 포지션 제외)
const isFieldPos = pos => FIELD_POSITIONS.has(pos);

const buildDisplayLineup = lineup => {
  if (!lineup || !lineup.length) return [];
  // 1단계: 각 batOrder별 최초(선발) 포지션 수집
  const orderToStarterPos = {};
  lineup.forEach(player => {
    const order = player.order || player.batOrder || player.n;
    if (!order) return;
    if (orderToStarterPos[order]) return; // 이미 선발 포지션 있음
    const sp = normalizePositionLabel(player.starterPos || player.pos || player.p || '');
    if (isFieldPos(sp)) orderToStarterPos[order] = sp;
  });

  return lineup.map((player, idx) => {
    const starterName = player.starterName || player.name || '';
    const currentName = player.name || starterName;
    const starterPos = normalizePositionLabel(player.starterPos || '');
    const currentPos = normalizePositionLabel(player.pos || player.p || '');
    const order = player.order || player.batOrder || player.n || idx + 1;
    // 현재 포지션이 비필드이면: starterPos → 같은 타순 선발포지션 → 빈 문자열 순으로 폴백
    const displayPos = isFieldPos(currentPos) ? currentPos
      : isFieldPos(starterPos) ? starterPos
      : (orderToStarterPos[order] || '');
    const isSub = starterName && starterName !== currentName;
    const subLabel = player.sub || (isSub ? starterName : null);
    return {
      n: order,
      name: currentName,
      p: displayPos,
      pos: displayPos,
      sub: subLabel,
    };
  });
};

function renderContent(d) {
  // PC 인라인 중계 열려있으면 content 재렌더 스킵 (새 방식: pc-relay-inline-wrapper 존재 여부)
  if (window.innerWidth >= 1080) {
    const wrapper = document.getElementById('pc-relay-inline-wrapper');
    // 탭이 바뀌었으면 중계 패널 닫고 렌더 허용
    if (wrapper && state.tab !== 'cal') {
      // 중계 인라인 wrapper 제거하고 렌더 계속
      wrapper.parentElement && wrapper.parentElement.removeChild(wrapper);
    } else if (wrapper) {
      return; // cal 탭이고 중계 열려있으면 스킵
    }
    const panel = document.getElementById('relay-panel');
    if (panel && panel.classList.contains('pc-inline') && state.tab === 'cal') return;
  }

  const el=document.getElementById('content');
  // 포커스된 input이 콘텐츠 안에 있으면 커서 위치 보존
  const focused = document.activeElement;
  const focusedId = focused && (focused.tagName==='INPUT'||focused.tagName==='TEXTAREA') ? focused.id : null;
  const focusedVal = focusedId ? focused.value : null;
  const focusedSel = focusedId ? [focused.selectionStart, focused.selectionEnd] : null;

  if(state.tab==='cal') el.innerHTML=renderCal(d);
  else if(state.tab==='stand') el.innerHTML=renderBaseballRecord(d);
  else if(state.tab==='my') el.innerHTML=renderMyPage(d);
  else el.innerHTML=renderCal(d);

  // 포커스 복원
  if (focusedId) {
    const restored = document.getElementById(focusedId);
    if (restored) {
      restored.focus();
      if (focusedVal !== null) restored.value = focusedVal;
      if (focusedSel) try { restored.setSelectionRange(focusedSel[0], focusedSel[1]); } catch(e) {}
    }
  }
}

// ── 시즌 성적 요약 + 연승/연패 스트릭 ──
function getKiaSeasonStats() {
  const kiaGames = SCH.filter(g =>
    g.status === 'FINAL' && (g.away === 'KIA' || g.home === 'KIA')
  ).sort((a, b) => a.date.localeCompare(b.date));

  let wins = 0, losses = 0, draws = 0;
  let streak = 0, streakType = null; // 'W' | 'L' | 'D'
  let lastNonDrawType = null; // 무승부 연속 시 직전 W/L 결과 추적
  let lastNonDrawStreak = 0; // 직전 W/L streak 개수 보존

  kiaGames.forEach(g => {
    const isHome = g.home === 'KIA';
    const ks = isHome ? g.homeScore : g.awayScore;
    const os = isHome ? g.awayScore : g.homeScore;
    if (ks == null || os == null) return;
    let res;
    if (ks > os) { wins++; res = 'W'; }
    else if (ks < os) { losses++; res = 'L'; }
    else { draws++; res = 'D'; }
    if (res === streakType) streak++;
    else { streakType = res; streak = 1; }
    if (res !== 'D') { lastNonDrawType = res; lastNonDrawStreak = streak; }
  });

  const total = wins + losses + draws;
  const pct = total > 0 ? (wins / (total - draws)).toFixed(3).replace(/^0/, '') : '—';
  return { wins, losses, draws, total, pct, streak, streakType, lastNonDrawType, lastNonDrawStreak };
}

// ── 선수 기록 fetch (타자/투수) ──
window._fetchPlayerStats = async function(tab) {
  state.playerStatsLoading = true;
  state.playerStatsError = null;
  render();
  try {
    const type = tab === 'hitter' ? 'hitter' : 'pitcher';
    // 1차: 백엔드 프록시 (/api/kboScores?action=playerStats)
    // 2차: 네이버 API 직접 호출
    let players = null;

    // 네이버 API 응답에서 선수 배열 추출 (다양한 필드명 커버)
    const extractPlayers = (d) => {
      const r = d?.result || {};
      return r.seasonPlayerStats || r.playerList || r.players || r.list || null;
    };

    // 백엔드 프록시 (다중 URL fallback 포함)
    const proxyUrl = `/api/kboScores?action=playerStats&tab=${type}&teamCode=HT&seasonCode=2026`;
    const pr = await fetch(proxyUrl);
    if (!pr.ok) {
      const errData = await pr.json().catch(() => ({}));
      throw new Error(errData.error || `서버 오류 ${pr.status}`);
    }
    const pd = await pr.json();
    players = extractPlayers(pd);
    if (!players) throw new Error('선수 데이터 형식 오류');

    state.playerStats = { tab, data: players };
  } catch(e) {
    state.playerStatsError = e.message || '데이터를 불러오지 못했어요 😢';
    state.playerStats = null;
  }
  state.playerStatsLoading = false;
  render();
};

function _fetchMissingMemoData() {
  // localStorage 메모에서 날짜 수집
  const dates = new Set();
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('m_')) {
      const parts = k.substring(2).split('_');
      if (parts[0]) dates.add(parts[0]);
    }
  }
  // 이닝 데이터가 없는 날짜만 fetch (최근 30일 이내만)
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 30);
  const missing = [...dates].filter(date => {
    const d = new Date(date+'T12:00:00');
    if (d > now || d < cutoff) return false;
    const g = SCH.find(s => s.date === date && (s.away === 'KIA' || s.home === 'KIA'));
    if (!g || g.status !== 'FINAL') return false;
    const hasInn = (g.awayInnings||[]).some(x => x >= 0);
    return !hasInn && !g.winPitcher;
  });
  // 최대 5일치만 순차 fetch (과부하 방지)
  missing.slice(0, 5).reduce((p, date) => {
    return p.then(() => fetchTodayScores(date).then(() => { render(); }).catch(() => {}));
  }, Promise.resolve());
}
// ── 기록 탭 검색/필터 상태 ──
let _recordFilter = { q: '', result: 'all', watch: 'all' };

function _applyRecordFilter(games) {
  return games.filter(g => {
    const isHome = g.home === 'KIA';
    const opp = isHome ? g.away : g.home;
    const ks = isHome ? g.homeScore : g.awayScore;
    const os = isHome ? g.awayScore : g.homeScore;
    const res = ks > os ? 'win' : ks < os ? 'lose' : 'draw';
    if (_recordFilter.result !== 'all' && res !== _recordFilter.result) return false;
    if (_recordFilter.watch !== 'all') {
      const memoKey = 'm_'+g.date+'_'+g.away+'_'+g.home;
      let md = {};
      try { md = JSON.parse(localStorage.getItem(memoKey)||'{}'); } catch(e) {}
      const w = md.watch || '';
      if (_recordFilter.watch === 'jikgwan' && w !== '직관') return false;
      if (_recordFilter.watch === 'jipgwan' && w !== '집관') return false;
      if (_recordFilter.watch === 'memo' && !md.text) return false;
    }
    if (_recordFilter.q) {
      const q = _recordFilter.q;
      if (!opp.includes(q) && !g.date.includes(q) && !(g.stad||'').includes(q)) return false;
    }
    return true;
  });
}

window.toggleGameRecord = function(cardId, el) {
  state.grecOpen = state.grecOpen || {};
  state.grecOpen[cardId] = !state.grecOpen[cardId];
  var b = document.getElementById(cardId);
  if (!b) return;
  var open = state.grecOpen[cardId];
  b.style.display = open ? 'block' : 'none';
  var arrow = el.querySelector('.grec-arrow');
  if (arrow) arrow.textContent = open ? '▼' : '▶';

  // 카드 열 때 이닝/투수 데이터 없으면 해당 날짜 API fetch
  if (open) {
    var parts = cardId.replace('grec-', '').split('-');
    // cardId = grec-YYYY-MM-DD-AWAY-HOME
    var date = parts[0]+'-'+parts[1]+'-'+parts[2];
    var away = parts[3], home = parts[4];
    var idx = SCH.findIndex(function(s){ return s.date===date&&s.away===away&&s.home===home; });
    if (idx === -1) return;
    var g = SCH[idx];
    var hasInn = g.awayInnings && g.awayInnings.some(function(x){ return x>=0; });
    var hasPitcher = g.winPitcher || g.losePitcher;
    if (!hasInn && !hasPitcher && g.status === 'FINAL') {
      var innEl = document.getElementById(cardId+'-inning');
      if (innEl) innEl.innerHTML = '<div style="text-align:center;padding:8px;font-size:11px;color:var(--c-sub)">불러오는 중...</div>';
      fetchTodayScores(date).then(function() {
        var g2 = SCH[idx];
        var d2 = D();
        var innEl2 = document.getElementById(cardId+'-inning');
        var pitEl2 = document.getElementById(cardId+'-pitcher');
        if (innEl2) innEl2.innerHTML = _renderRecInnTable(d2, g2);
        if (pitEl2) pitEl2.innerHTML = _renderRecPitcherRow(d2, g2);
      }).catch(function(){});
    }
  }
};

function _renderRecInnTable(d, g) {
  const awayInn = g.awayInnings || [];
  const homeInn = g.homeInnings || [];
  const hasInn = awayInn.some(x=>x>=0) || homeInn.some(x=>x>=0);
  if (!hasInn) return '';
  const totalInnings = Math.max(9, awayInn.length, homeInn.length);
  const iv = (arr, i) => { const v = arr[i]; return (v==null||v<0) ? '·' : String(v); };
  const cell = (arr, i) => {
    const v = arr[i]; const hi = v > 0;
    return '<td style="text-align:center;padding:5px 3px;color:'+(hi?'#E31837':d.text)+';font-weight:'+(hi?900:400)+'">'+iv(arr,i)+'</td>';
  };
  let h = '<div style="overflow-x:auto;margin-bottom:8px">';
  h += '<table style="width:100%;border-collapse:collapse;font-size:11px;font-variant-numeric:tabular-nums">';
  h += '<thead><tr>';
  h += '<td style="padding:4px 6px;text-align:left;font-size:10px;font-weight:700;color:'+d.sub+';min-width:42px">팀</td>';
  for (let i=1;i<=totalInnings;i++) h += '<td style="text-align:center;font-size:10px;font-weight:700;color:'+d.sub+';min-width:20px;padding:4px 2px">'+i+'</td>';
  h += '<td style="text-align:center;font-size:10px;font-weight:800;color:'+d.sub+';border-left:1px solid '+d.bgB+';min-width:26px;padding:4px 5px">R</td>';
  h += '<td style="text-align:center;font-size:10px;font-weight:700;color:'+d.sub+';min-width:22px;padding:4px 4px">H</td>';
  h += '<td style="text-align:center;font-size:10px;font-weight:700;color:'+d.sub+';min-width:22px;padding:4px 4px">E</td>';
  h += '</tr></thead><tbody>';
  // away row
  const awayIsKia = g.away === 'KIA';
  h += '<tr style="background:'+(d.dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.02)')+'">';
  h += '<td style="padding:5px 6px;font-weight:800;font-size:11px;color:'+(awayIsKia?'#E31837':d.text)+';text-align:left">'+g.away+'</td>';
  for (let i=0;i<totalInnings;i++) h += cell(awayInn, i);
  h += '<td style="text-align:center;font-weight:900;font-size:13px;color:'+(awayIsKia?'#E31837':d.text)+';border-left:1px solid '+d.bgB+';padding:5px 5px">'+(g.awayScore??'-')+'</td>';
  h += '<td style="text-align:center;font-size:11px;color:'+d.sub+';padding:5px 4px">'+(g.awayHit??'-')+'</td>';
  h += '<td style="text-align:center;font-size:11px;color:'+((g.awayError>0)?'#E31837':d.sub)+';padding:5px 4px">'+(g.awayError??'-')+'</td>';
  h += '</tr>';
  // home row
  const homeIsKia = g.home === 'KIA';
  h += '<tr>';
  h += '<td style="padding:5px 6px;font-weight:800;font-size:11px;color:'+(homeIsKia?'#E31837':d.text)+';text-align:left">'+g.home+'</td>';
  for (let i=0;i<totalInnings;i++) h += cell(homeInn, i);
  h += '<td style="text-align:center;font-weight:900;font-size:13px;color:'+(homeIsKia?'#E31837':d.text)+';border-left:1px solid '+d.bgB+';padding:5px 5px">'+(g.homeScore??'-')+'</td>';
  h += '<td style="text-align:center;font-size:11px;color:'+d.sub+';padding:5px 4px">'+(g.homeHit??'-')+'</td>';
  h += '<td style="text-align:center;font-size:11px;color:'+((g.homeError>0)?'#E31837':d.sub)+';padding:5px 4px">'+(g.homeError??'-')+'</td>';
  h += '</tr>';
  h += '</tbody></table></div>';
  return h;
}

function _renderRecPitcherRow(d, g) {
  const win = g.winPitcher, lose = g.losePitcher;
  if (!win && !lose) return '';
  let h = '<div style="display:flex;gap:8px;margin-bottom:8px">';
  if (win) h += '<div style="flex:1;background:rgba(0,200,100,0.08);border:1px solid rgba(0,200,100,0.25);border-radius:8px;padding:7px 10px"><div style="font-size:9px;font-weight:700;color:#00C864;margin-bottom:2px">승리투수</div><div style="font-size:13px;font-weight:900;color:'+d.text+'">'+win+'</div></div>';
  if (lose) h += '<div style="flex:1;background:rgba(227,24,55,0.06);border:1px solid rgba(227,24,55,0.2);border-radius:8px;padding:7px 10px"><div style="font-size:9px;font-weight:700;color:#E31837;margin-bottom:2px">패전투수</div><div style="font-size:13px;font-weight:900;color:'+d.text+'">'+lose+'</div></div>';
  h += '</div>';
  return h;
}

  const files = Array.from(input.files);
  _compressAll(files, function(results) {
    const data = _recGetMemo(date, away, home);
    const existing = data.photos || (data.photo ? [data.photo] : []);
    data.photos = [...existing, ...results];
    delete data.photo;
    _recSaveMemo(date, away, home, data);
    render();
    input.value = '';
  });
};

      + 'data-date="'+m.date+'" data-away="'+m.away+'" data-home="'+m.home+'" '

    // ── 사진 ──

    html += '<span style="font-size:13px">📷</span>';

    html += '<button onclick="document.getElementById(\'recphoto-'+memoId+'\').click()" '
      + 'style="font-size:11px;color:#E31837;font-weight:700;font-family:\'Noto Sans KR\',sans-serif;background:none;border:1.5px solid #E31837;border-radius:6px;cursor:pointer;padding:3px 10px">선택</button>';
    html += '</div>';

    html += '</div>';
  });
  return html;
}

function getTodos() {

}

function renderTodoMemo(d) {
  const todos = getTodos();
  const pad2 = n => String(n).padStart(2,'0');
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const todayStr = now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(now.getDate());
  const dw = ['일','월','화','수','목','금','토'];

  let html = '';

  // 입력창
  html += `<div style="display:flex;gap:8px;margin-bottom:10px">
    <input id="todo-input" type="text" placeholder="새 메모 입력..." maxlength="100"
      autocomplete="off"
      onkeydown="if(event.key==='Enter'){event.preventDefault();addTodo();}"
      onclick="event.stopPropagation()"
      ontouchstart="event.stopPropagation()"
      style="flex:1;padding:10px 12px;background:${d.bg};border:1px solid ${d.bgB};border-radius:10px;
      font-size:13px;color:${d.text};font-family:'Noto Sans KR',sans-serif;outline:none;
      -webkit-user-select:text;user-select:text"/>
    <button onclick="addTodo()" style="padding:10px 14px;background:#E31837;color:#fff;border:none;
      border-radius:10px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap">추가</button>
  </div>`;

  // 리스트 컨테이너
  html += `<div id="todo-list-container">`;

  if (!todos.length) {
    html += `<div style="text-align:center;padding:20px 0;color:${d.sub};font-size:13px">메모가 없어요. 위에 입력해보세요!</div>`;
    html += `</div>`;
    return html;
  }

  // 날짜별 그룹
  const groups = {};
  todos.forEach(t => {
    if (!groups[t.date]) groups[t.date] = [];
    groups[t.date].push(t);
  });

  Object.keys(groups).sort((a,b) => b.localeCompare(a)).forEach(date => {
    const [y,m,da] = date.split('-');
    const dayObj = new Date(date+'T12:00:00');
    const dayLabel = dw[dayObj.getDay()];
    const isToday = date === todayStr;

    html += `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span style="font-size:12px;font-weight:700;color:${isToday?'#E31837':d.sub}">${y}.${m}.${da} (${dayLabel})</span>
        ${isToday?`<span style="font-size:10px;background:rgba(227,24,55,0.1);color:#E31837;border-radius:4px;padding:1px 6px;font-weight:700">오늘</span>`:''}
      </div>`;

    groups[date].forEach(t => {
      let tagBadge = '';
      if (t.tag) {
        const parts = t.tag.split('|');
        if (parts.length === 3) {
          const [,tAway,tHome] = parts;
          tagBadge = `<div style="margin-bottom:3px"><span style="font-size:10px;background:rgba(227,24,55,0.1);color:#E31837;border-radius:4px;padding:1px 6px;font-weight:700">⚾ ${tAway}↔${tHome}</span></div>`;
        }
      }
      // 카드 전체 클릭으로 완료 토글, 원은 done이면 빨간색으로 꽉 채움
      html += `<div onclick="toggleTodo('${t.id}')" style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:${d.bg};border:1px solid ${t.tag?'rgba(227,24,55,0.2)':d.bgB};border-radius:10px;margin-bottom:6px;cursor:pointer">
        <div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;background:${t.done?'#E31837':'transparent'};border:2px solid ${t.done?'#E31837':d.bgB}"></div>
        <div style="flex:1;min-width:0">${tagBadge}<span style="font-size:13px;color:${t.done?d.sub:d.text};${t.done?'text-decoration:line-through;':''}line-height:1.4">${t.text}</span></div>
        <button onclick="event.stopPropagation();deleteTodo('${t.id}')"
          style="color:${d.sub};font-size:16px;background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0">×</button>
      </div>`;
    });

    html += `</div>`;
  });

  html += `</div>`;
  return html;
}

window.addTodo = function() {
  const input = document.getElementById('todo-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const pad2 = n => String(n).padStart(2,'0');
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const date = now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(now.getDate());
  const todos = getTodos();
  const newTodo = { id: Date.now().toString(), text, date, done: false };
  todos.unshift(newTodo);
  saveTodos(todos);
  input.value = '';
  // render() 대신 DOM 직접 업데이트 (포커스 유지)
  _refreshTodoList();
  // 입력란에 포커스 유지
  input.focus();
};

window._refreshTodoList = function() {
  const listEl = document.getElementById('todo-list-container');
  if (!listEl) { render(); return; }
  const d = D();
  const todos = getTodos();
  const pad2 = n => String(n).padStart(2,'0');
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const todayStr = now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(now.getDate());
  const dw = ['일','월','화','수','목','금','토'];

  if (!todos.length) {
    listEl.innerHTML = `<div style="text-align:center;padding:20px 0;color:${d.sub};font-size:13px">메모가 없어요. 위에 입력해보세요!</div>`;
    return;
  }

  const groups = {};
  todos.forEach(t => {
    if (!groups[t.date]) groups[t.date] = [];
    groups[t.date].push(t);
  });

  let html = '';
  Object.keys(groups).sort((a,b) => b.localeCompare(a)).forEach(date => {
    const [y,m,da] = date.split('-');
    const dayObj = new Date(date+'T12:00:00');
    const dayLabel = dw[dayObj.getDay()];
    const isToday = date === todayStr;
    html += `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span style="font-size:12px;font-weight:700;color:${isToday?'#E31837':d.sub}">${y}.${m}.${da} (${dayLabel})</span>
        ${isToday?`<span style="font-size:10px;background:rgba(227,24,55,0.1);color:#E31837;border-radius:4px;padding:1px 6px;font-weight:700">오늘</span>`:''}
      </div>`;
    groups[date].forEach(t => {
      let tagBadge2 = '';
      if (t.tag) {
        const parts = t.tag.split('|');
        if (parts.length === 3) {
          const [,tAway,tHome] = parts;
          tagBadge2 = `<div style="margin-bottom:3px"><span style="font-size:10px;background:rgba(227,24,55,0.1);color:#E31837;border-radius:4px;padding:1px 6px;font-weight:700">⚾ ${tAway}↔${tHome}</span></div>`;
        }
      }
      html += `<div onclick="toggleTodo('${t.id}')" style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:${d.bg};border:1px solid ${t.tag?'rgba(227,24,55,0.2)':d.bgB};border-radius:10px;margin-bottom:6px;cursor:pointer">
        <div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;background:${t.done?'#E31837':'transparent'};border:2px solid ${t.done?'#E31837':d.bgB}"></div>
        <div style="flex:1;min-width:0">${tagBadge2}<span style="font-size:13px;color:${t.done?d.sub:d.text};${t.done?'text-decoration:line-through;':''}line-height:1.4">${t.text}</span></div>
        <button onclick="event.stopPropagation();deleteTodo('${t.id}')"
          style="color:${d.sub};font-size:16px;background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0">×</button>
      </div>`;
    });
    html += `</div>`;
  });
  listEl.innerHTML = html;
};

window.toggleTodo = function(id) {
  const todos = getTodos();
  const t = todos.find(t=>t.id===id);
  if (t) t.done = !t.done;
  saveTodos(todos);
  _refreshTodoList();
};

window.deleteTodo = function(id) {
  saveTodos(getTodos().filter(t=>t.id!==id));
  _refreshTodoList();
};

function renderFavs(d) {
  const favGames = SCH.filter(g=>isFav(g));
  favGames.sort((a,b)=>a.date.localeCompare(b.date));

  if(!favGames.length) {
    return '<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:40px;margin-bottom:12px">⭐</div>'
      + '<div style="font-size:15px;font-weight:700;color:'+d.text+'">즐겨찾기가 없어요</div>'
      + '<div style="font-size:12px;color:'+d.sub+';margin-top:6px">경기 카드의 ☆를 눌러 추가해보세요</div>'
      + '</div>';
  }

  let html = '<div style="font-size:12px;font-weight:700;color:'+d.sub+';margin-bottom:12px">⭐ '+favGames.length+'개의 즐겨찾기</div>';
  favGames.forEach(function(g) {
    const isKia=g.away==='KIA'||g.home==='KIA';
    const kiaHome=g.home==='KIA';
    const lKey=isKia&&kiaHome?g.home:g.away;
    const rKey=isKia&&kiaHome?g.away:g.home;
    const isLive=g.status==='LIVE', isFinal=g.status==='FINAL';
    const lScore=kiaHome?(g.homeScore!=null?g.homeScore:0):(g.awayScore!=null?g.awayScore:0);
    const rScore=kiaHome?(g.awayScore!=null?g.awayScore:0):(g.homeScore!=null?g.homeScore:0);

    html += '<div class="card'+(isKia?' kia':'')+'" onclick="openGameByKey(this)" data-date="'+g.date+'" data-away="'+g.away+'" data-home="'+g.home+'">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html += '<span style="font-size:10px;color:'+d.sub+'">'+g.date+'</span>';
    html += '<div style="display:flex;align-items:center;gap:6px">';
    if(isLive) html += '<span style="font-size:9px;background:#E31837;color:#fff;border-radius:4px;padding:1px 5px;font-weight:700">LIVE</span>';
    if(isFinal) html += '<span style="font-size:9px;background:rgba(0,0,0,0.2);color:'+d.text+';border-radius:4px;padding:1px 5px;font-weight:700">종료</span>';

    html += '</div></div>';
    html += '<div style="display:flex;align-items:center;justify-content:space-between">';
    html += '<div style="display:flex;align-items:center;gap:6px;flex:1">'+logo(lKey,30)+'<span style="font-size:12px;font-weight:700;color:'+(lKey==='KIA'?'#ff6b6b':d.text)+'">'+(T[lKey]?T[lKey].name:lKey)+'</span></div>';
    html += '<div style="padding:0 8px;text-align:center">';
    if(isLive||isFinal) html += '<span style="font-size:16px;font-weight:900;color:'+d.text+'">'+lScore+' : '+rScore+'</span>';
    else html += '<span style="font-size:11px;font-weight:700;color:#FFB300">'+g.time+'</span>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;flex:1;flex-direction:row-reverse">'+logo(rKey,30)+'<span style="font-size:12px;font-weight:700;color:'+(rKey==='KIA'?'#ff6b6b':d.text)+';text-align:right">'+(T[rKey]?T[rKey].name:rKey)+'</span></div>';
    html += '</div></div>';
  });
  return html;
}

    const kiaScore = g.home==='KIA' ? g.homeScore : g.awayScore;

    return kiaScore != null && oppScore != null && kiaScore > oppScore;
  });
  wins.sort((a,b) => b.date.localeCompare(a.date));

    html += '<div class="card kia" onclick="openGameByKey(this)" data-date="'+g.date+'" data-away="'+g.away+'" data-home="'+g.home+'">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
    html += '<span style="font-size:10px;color:'+d.sub+'">'+g.date+' · '+(isHome?'홈':'원정')+'</span>';
    html += '<span style="font-size:11px;font-weight:700;color:#E31837">✅ 승리</span>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;justify-content:space-between">';
    html += '<div style="display:flex;align-items:center;gap:8px;flex:1">'+logo('KIA',36)+'<span style="font-size:13px;font-weight:800;color:#ff6b6b">KIA 타이거즈</span></div>';

function drawWallpaperCanvas() {
  const ws = _wpState;
  const canvas = document.getElementById('wallpaper-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // S24+ 2x 고해상도 (2160x4680) — 저장 시 최고 화질
  const W = 2160, H = 4680;
  canvas.width = W;
  canvas.height = H;

  // 배경
  if (ws.bgType === 'image' && ws.bgImage) {
    // cover 방식으로 이미지 꽉 채우기
    const img = ws.bgImage;
    const scale = Math.max(W / img.naturalWidth, H / img.naturalHeight);
    const dw = img.naturalWidth * scale;
    const dh = img.naturalHeight * scale;
    ctx.drawImage(img, (W - dw) / 2, (H - dh) / 2, dw, dh);
  } else if (ws.bgType === 'solid') {
    ctx.fillStyle = ws.bgColor;
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = wpParseGradient(ctx, ws.gradient, W, H);
    ctx.fillRect(0, 0, W, H);
  }

  // 달력
  try {
    wpDrawCalendar(ctx, W, H, ws.calScale, ws.calOffsetY);
  } catch(e) {
    console.error('wpDrawCalendar error:', e);
  } finally {
    const loadingEl = document.getElementById('wp-loading');
    if (loadingEl) loadingEl.style.display = 'none';
    const btn = document.getElementById('wp-save-btn');
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
  }
}

function wpParseGradient(ctx, str, W, H) {
  const stops = [];
  const re = /(#[0-9a-fA-F]{6})/g;
  let m;
  while ((m = re.exec(str)) !== null) stops.push(m[1]);
  const am = str.match(/(\d+)deg/);
  const angle = am ? parseInt(am[1]) : 160;
  const rad = (angle - 90) * Math.PI / 180;
  const cx = W / 2, cy = H / 2;
  const len = Math.sqrt(W*W + H*H) / 2;
  const grd = ctx.createLinearGradient(
    cx - Math.cos(rad)*len, cy - Math.sin(rad)*len,
    cx + Math.cos(rad)*len, cy + Math.sin(rad)*len
  );
  stops.forEach((c, i) => grd.addColorStop(i / Math.max(stops.length-1, 1), c));
  return grd;
}

function wpDrawCalendar(ctx, W, H, userScale, offsetYPct) {
  const {yr, mo} = state;
  const isLight = _wpState.textMode === 'light';
  const C = {
    title:            isLight ? 'rgba(0,0,0,0.9)'   : '#ffffff',
    wdaySun:          isLight ? '#d32f2f'            : '#ff8a80',
    wdaySat:          isLight ? '#1565c0'            : '#80d8ff',
    wday:             isLight ? 'rgba(0,0,0,0.45)'   : 'rgba(255,255,255,0.5)',
    daySun:           isLight ? '#d32f2f'            : '#ff8a80',
    daySat:           isLight ? '#1565c0'            : '#80d8ff',
    day:              isLight ? 'rgba(0,0,0,0.9)'    : 'rgba(255,255,255,0.9)',
    homeCircleFill:   'rgba(227,24,55,0.25)',
    homeCircleStroke: 'rgba(227,24,55,0.85)',
    legendText:       isLight ? 'rgba(0,0,0,0.5)'   : 'rgba(255,255,255,0.55)',
    legendDiv:        isLight ? 'rgba(0,0,0,0.1)'   : 'rgba(255,255,255,0.12)',
    watermark:        isLight ? 'rgba(0,0,0,0.18)'  : 'rgba(255,255,255,0.2)',
    fallback:         isLight ? 'rgba(0,0,0,0.6)'   : 'rgba(255,255,255,0.7)',
  };
  const WDAYS = ['일','월','화','수','목','금','토'];
  const f = fdow(yr, mo), days = dim(yr, mo);
  const _kn = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const today = _kn.getFullYear()+'-'+String(_kn.getMonth()+1).padStart(2,'0')+'-'+String(_kn.getDate()).padStart(2,'0');

  const kmap = {};
  SCH.forEach(g => {
    if (g.away !== 'KIA' && g.home !== 'KIA') return;
    const [gy, gm, gd] = g.date.split('-').map(Number);
    if (gy === yr && gm === mo) kmap[gd] = g;
  });

  // ── 기본 단위: W 기준 ──
  const BASE = W; // 2160
  const colW  = BASE * 0.94 / 7;
  const calW  = colW * 7;
  const rowH  = BASE * 0.17;   // 행 높이
  const headerH = BASE * 0.10; // 월 제목 영역
  const wdayH   = BASE * 0.055;// 요일 헤더
  const legendH = BASE * 0.055;
  const rows = Math.ceil((f + days) / 7);
  const calTotalH = headerH + wdayH + rows * rowH + legendH + BASE * 0.015;
  const bgPad = _wpState.calBg ? BASE * 0.028 : 0;

  // ── scale + offset 적용 ──
  const totalW = (calW + bgPad * 2) * userScale;
  const totalH = (calTotalH + bgPad * 2) * userScale;
  const startX = (W - totalW) / 2;
  const baseY  = (H - totalH) / 2;
  const startY = baseY + (offsetYPct / 100) * H;

  ctx.save();
  ctx.translate(startX + bgPad * userScale, startY + bgPad * userScale);
  ctx.scale(userScale, userScale);

  // ── 달력 배경 패널 ──
  if (_wpState.calBg) {
    const r = bgPad * 1.3;
    const bx = -bgPad, by = -bgPad;
    const bw = calW + bgPad * 2, bh = calTotalH + bgPad * 2;
    ctx.beginPath();
    ctx.moveTo(bx + r, by);
    ctx.lineTo(bx + bw - r, by);
    ctx.arcTo(bx + bw, by, bx + bw, by + r, r);
    ctx.lineTo(bx + bw, by + bh - r);
    ctx.arcTo(bx + bw, by + bh, bx + bw - r, by + bh, r);
    ctx.lineTo(bx + r, by + bh);
    ctx.arcTo(bx, by + bh, bx, by + bh - r, r);
    ctx.lineTo(bx, by + r);
    ctx.arcTo(bx, by, bx + r, by, r);
    ctx.closePath();
    ctx.fillStyle = _wpState.calBg;
    ctx.fill();
  }

  // ── 월 타이틀 ──
  ctx.font = `900 ${BASE*0.048}px 'Noto Sans KR', sans-serif`;
  ctx.fillStyle = C.title;
  ctx.textAlign = 'center';
  ctx.fillText(`${yr}년 ${mo}월`, calW / 2, headerH * 0.72);

  // ── 요일 헤더 ──
  WDAYS.forEach((w, i) => {
    ctx.font = `700 ${BASE*0.020}px 'Noto Sans KR', sans-serif`;
    ctx.fillStyle = i === 0 ? C.wdaySun : i === 6 ? C.wdaySat : C.wday;
    ctx.textAlign = 'center';
    ctx.fillText(w, i * colW + colW / 2, headerH + wdayH * 0.78);
  });

  // ── 날짜 셀 ──
  for (let i = 1; i <= days; i++) {
    const ds = `${yr}-${pad(mo)}-${pad(i)}`;
    const kg = kmap[i];
    const cellIdx = f + i - 1;
    const col = cellIdx % 7;
    const row = Math.floor(cellIdx / 7);
    const cx = col * colW + colW / 2;
    const cy = headerH + wdayH + row * rowH;

    const isKiaHome = kg && kg.home === 'KIA';
    const isKiaAway = kg && kg.away === 'KIA';
    const isKiaGame = isKiaHome || isKiaAway;
    const oppKey = isKiaHome ? kg.away : isKiaAway ? kg.home : null;
    const dow = col;

    const circleR = BASE * 0.020;
    const circleY = cy + rowH * 0.22;

    // 홈경기 원
    if (isKiaHome) {
      ctx.beginPath();
      ctx.arc(cx, circleY, circleR, 0, Math.PI * 2);
      ctx.fillStyle = C.homeCircleFill;
      ctx.fill();
      ctx.strokeStyle = C.homeCircleStroke;
      ctx.lineWidth = BASE * 0.003;
      ctx.stroke();
    }

    // 날짜 숫자
    const dayColor = dow === 0 ? C.daySun : dow === 6 ? C.daySat : C.day;
    ctx.font = `500 ${BASE*0.024}px 'Noto Sans KR', sans-serif`;
    ctx.fillStyle = dayColor;
    ctx.textAlign = 'center';
    ctx.fillText(String(i), cx, circleY + BASE*0.009);

    // 상대팀 이름 텍스트 표시
    if (isKiaGame && oppKey) {
      const logoSize = BASE * 0.065;
      const logoY = cy + rowH * 0.46;
      ctx.font = `700 ${BASE*0.017}px 'Noto Sans KR', sans-serif`;
      ctx.fillStyle = C.fallback;
      ctx.textAlign = 'center';
      ctx.fillText(oppKey, cx, logoY + logoSize * 0.6);
    }
  }

  // ── 구분선 (달력 아래) ──
  const legendY = headerH + wdayH + rows * rowH + BASE * 0.008;
  ctx.strokeStyle = C.legendDiv;
  ctx.lineWidth = BASE * 0.002;
  ctx.beginPath();
  ctx.moveTo(0, legendY);
  ctx.lineTo(calW, legendY);
  ctx.stroke();

  // ── 범례 ──
  const ly = legendY + legendH * 0.65;
  const legR = BASE * 0.011;
  const legFS = BASE * 0.018;

  ctx.beginPath();
  ctx.arc(legR * 2.5, ly - legR * 0.7, legR, 0, Math.PI * 2);
  ctx.fillStyle = C.homeCircleFill;
  ctx.fill();
  ctx.strokeStyle = C.homeCircleStroke;
  ctx.lineWidth = BASE * 0.002;
  ctx.stroke();
  ctx.font = `500 ${legFS}px 'Noto Sans KR', sans-serif`;
  ctx.fillStyle = C.legendText;
  ctx.textAlign = 'left';
  ctx.fillText('홈경기', legR * 5, ly);

  ctx.font = `700 ${legFS * 0.9}px 'Noto Sans KR', sans-serif`;
  ctx.fillStyle = C.watermark;
  ctx.textAlign = 'right';
  ctx.fillText('horang2', calW, ly);

  ctx.restore();
}

function renderNotifySection(d) {
  const supported = 'Notification' in window;
  const perm = supported ? Notification.permission : 'unsupported';
  const enabled = window._notifyEnabled && perm === 'granted';

  if (!supported) {
    return `<div style="text-align:center;padding:20px 0;color:${d.sub};font-size:13px">
      이 브라우저는 알림을 지원하지 않아요 😢
    </div>`;
  }

  let statusBadge = '';
  if (perm === 'granted' && enabled) {

// 순위 캐시
let _standCache = null;
let _standCacheTime = 0;

function calcStandingFromSCH() {
  // SCH 배열의 FINAL 경기 결과로 순위 직접 계산
  const teams = Object.keys(T);
  const stats = {};
  teams.forEach(t => { stats[t] = { win:0, lose:0, draw:0 }; });
  SCH.forEach(function(g) {
    if(g.status !== 'FINAL') return;
    if(g.awayScore == null || g.homeScore == null) return;
    const as = Number(g.awayScore), hs = Number(g.homeScore);
    if(!stats[g.away] || !stats[g.home]) return;
    if(as > hs) { stats[g.away].win++; stats[g.home].lose++; }
    else if(hs > as) { stats[g.home].win++; stats[g.away].lose++; }
    else { stats[g.away].draw++; stats[g.home].draw++; }
  });
  // 승률 계산 후 정렬
  const rows = teams.map(tkey => {
    const s = stats[tkey];
    const games = s.win + s.lose;
    const pctNum = games > 0 ? s.win / games : null;
    const pct = pctNum != null ? pctNum.toFixed(3) : '-';
    return { tkey, win:s.win, lose:s.lose, draw:s.draw, pct, pctNum };
  });
  rows.sort((a, b) => {
    if(b.pctNum == null && a.pctNum == null) return 0;
    if(b.pctNum == null) return -1;
    if(a.pctNum == null) return 1;
    return b.pctNum - a.pctNum;
  });
  // 공동순위 부여
  let rank = 1;
  rows.forEach((r, i) => {
    if(i === 0) { r.rank = 1; }
    else if(r.pctNum === rows[i-1].pctNum) { r.rank = rows[i-1].rank; }
    else { r.rank = i + 1; }
  });
  return rows;
}

async function fetchStanding() {
  // 10분 캐시
  if (_standCache && Date.now() - _standCacheTime < 600000) return _standCache;
  try {
    const yr = new Date().getFullYear();
    const url = `https://api-gw.sports.naver.com/schedule/teams/rank?category=kbo&roundId=${yr}`;
    const r = await fetch(url, { headers: { Referer:'https://m.sports.naver.com/', Accept:'application/json' }});
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const list = data?.result?.teamRankList || data?.result?.list || [];
    if (!list.length) throw new Error('empty');
    _standCache = list;
    _standCacheTime = Date.now();
    return list;
  } catch(e) {
    return null;
  }
}

// 라인업+경기상황: 서버 프록시를 통해 호출 (CORS 방지)
// 타자 배열 파싱 (배열 또는 객체)
function _parseBatters(src) {
  // batter 배열 추출 — pitcher 배열에서 batOrder가 있는 선수도 포함 (타자→투수 교체 케이스)
  const batterArr = Array.isArray(src) ? src : (src?.batter || []);
  const pitcherArr = Array.isArray(src) ? [] : (src?.pitcher || []);
  const pitcherBatters = pitcherArr.filter(p => p.batOrder || p.order);
  const arr = [...batterArr, ...pitcherBatters];
  if (!arr.length) return [];
  const om = {};
  arr.forEach(p => {
    const key = p.batOrder || p.order || p.n;
    if (!om[key]) om[key] = [];
    om[key].push(p);
  });
  return Object.entries(om).sort(([a],[b])=>+a-+b).map(([o,ps]) => {
    // 디버그: 타순별 원본 데이터 출력
    if (ps.length > 1) console.log(`[DEBUG] 타순 ${o}:`, ps.map(p=>({name:p.name||p.playerName,seqno:p.seqno,cin:p.cin,cout:p.cout,ab:p.ab,posName:p.posName})));
    // 비필드 포지션(대타/대주자) 여부 판별
    const _subPos = new Set(['대주자','대타','주자','대주자/대타','대타/대주자']);
    const _isSub = p => _subPos.has(p.posName || p.position || '');

    // seqno 기준 정렬: 낮을수록 선발(먼저 출전)
    const sorted = [...ps].sort((a,b) => {
      // 대타/대주자 포지션은 나중 순서
      const aIsSub = _isSub(a) ? 1 : 0;
      const bIsSub = _isSub(b) ? 1 : 0;
      if (aIsSub !== bIsSub) return aIsSub - bIsSub;
      // seqno 오름차순
      const sd = (+a.seqno||0) - (+b.seqno||0);
      if (sd !== 0) return sd;
      // 타수 내림차순 (선발이 보통 많음)
      return (+b.ab||0) - (+a.ab||0);
    });

    // cin/cout + sorted로 최종 선수 결정
    let chain, cur;
    const cinP = ps.find(p => p.cin === 'true' || p.cin === true);
    if (cinP) {
      // cin 있는 사람이 최종 선수. chain 순서는 sorted 기준으로 cinP를 마지막으로
      const withoutCin = sorted.filter(p => p !== cinP);
      chain = [...withoutCin, cinP];
      cur = cinP;
    } else {
      // cin 없으면 sorted 마지막이 최종
      chain = sorted;
      cur = sorted[sorted.length - 1];
    }
    const starters = chain.slice(0, -1);

    return {
      n:+o, order:+o,
      name: cur.name || cur.playerName || '',
      p: normalizePositionLabel(cur.posName || cur.position || ''),
      pos: normalizePositionLabel(cur.posName || cur.position || ''),
      // chain: 선발부터 최종 직전까지 전체 (렌더링용)
      chain: starters.length ? starters.map(s => ({
        name: s.name || s.playerName || '',
        hit: Number(s.hit||0),
        ab:  Number(s.ab||0),
        rbi: Number(s.rbi||0),
        bb:  Number(s.bb||s.walk||s.walks||0),
        run: Number(s.run||s.r||0),
        isStarter: s === chain[0],
      })) : null,
      // 하위 호환: sub = 직전 선수(선발 or 마지막 교체 이전)
      sub: starters.length ? (starters[0].name || starters[0].playerName) : null,
      starterName: chain[0].name || cur.name || '',
      starterPos: normalizePositionLabel(chain[0].posName || chain[0].position || cur.posName || ''),
      subHit: starters.length ? Number(starters[0].hit||0) : 0,
      subAb:  starters.length ? Number(starters[0].ab||0)  : 0,
      subRbi: starters.length ? Number(starters[0].rbi||0) : 0,
      subBb:  starters.length ? Number(starters[0].bb||starters[0].walk||starters[0].walks||0) : 0,
      subRun: starters.length ? Number(starters[0].run||starters[0].r||0) : 0,
      curHit: Number(cur.hit||0),
      curAb:  Number(cur.ab||0),
      curRbi: Number(cur.rbi||0),
      curBb:  Number(cur.bb||cur.walk||cur.walks||0),
      curRun: Number(cur.run||cur.r||0),
      hit: Number(cur.hit||0), ab: Number(cur.ab||0),
      rbi: Number(cur.rbi||0), bb: Number(cur.bb||cur.walk||cur.walks||0),
      run: Number(cur.run||cur.r||0),
    };
  });
}
function _parsePitchers(src) {
  const arr = Array.isArray(src) ? src : (src?.pitcher || []);
  return arr.map(p=>({ seqno:p.seqno, name:p.name||'', inn:p.inn||'0', er:p.er||0, kk:Number(p.kk||p.so||p.strikeout||0), bb:Number(p.bb||p.walk||p.walks||0), hit:Number(p.hit||p.ha||0), pc:Number(p.pc||p.ballCount||p.pitchCount||p.numPitch||p.pitches||p.np||p.numberOfPitches||p.pitchThrown||p.totalPitches||0), sp:Number(p.sp||p.strikeCount||p.strikes||p.numStrike||p.numberOfStrikes||0) }));
}

async function fetchLineupDirect(gameId, inning) {
  if (!gameId) return null;
  const inn = Math.max(1, inning || 1);
  try {
    const r = await fetch(`/api/kboScores?gameId=${encodeURIComponent(gameId)}&inning=${inn}&action=lineup`);
    if (!r.ok) return null;
    const result = await r.json();
    if (!result) return null;

    // 서버가 표준화한 homeLineup/awayLineup 사용
    const homeL = result.homeLineup;
    const awayL = result.awayLineup;
    const gs    = result.currentGameState;

    // console.log('[lineup raw keys]', result._raw_keys); // 디버그

    if (!homeL && !awayL) {
      return gs ? { currentGameState: gs } : null;
    }

    // pcode → 이름 맵 (gs 베이스 이름 추출용)
    // 서버가 반환한 pcodeMap이 있으면 우선 사용, 없으면 lineup 배열에서 직접 구성
    const pcodeMap = { ...(result.pcodeMap || {}) };
    const allP = [...(homeL?.batter||[]), ...(homeL?.pitcher||[]), ...(awayL?.batter||[]), ...(awayL?.pitcher||[])];
    allP.forEach(p => { if(p.pcode) pcodeMap[String(p.pcode)] = p.name || p.playerName; });

    // 타자 순서맵 (베이스 주자 이름)
    const buildOM = (arr) => {
      const o2n = {};
      (Array.isArray(arr) ? arr : (arr?.batter||[])).forEach(p => {
        const k = p.batOrder||p.order;
        if (!o2n[k]) o2n[k] = [];
        o2n[k].push(p);
      });
      const res = {};
      Object.entries(o2n).forEach(([o,ps]) => {
        const cur = ps.find(p=>p.cin==='true'||p.cin===true)||ps[ps.length-1];
        res[o] = cur.name || cur.playerName || '';
      });
      return res;
    };
    const homeOM = buildOM(homeL);
    const awayOM = buildOM(awayL);

    let enrichedGs = gs || null;
    if (gs) {
      const g = state.modalGame;
      const info = g?.inningInfo || '';
      const isTop = info.includes('초') || !info.includes('말');
      const atkOM = isTop ? awayOM : homeOM;
      const _numId = v => v && /^\d+$/.test(String(v));
      enrichedGs = {
        ...gs,
        _inningInfo: info,
        pitcherName: pcodeMap[gs.pitcher] || (!_numId(gs.pitcherName) ? gs.pitcherName : null) || null,
        batterName:  pcodeMap[gs.batter]  || (!_numId(gs.batterName)  ? gs.batterName  : null) || null,
        // 주자 이름: pcode → 이름 우선, 없으면 타순맵
        base1Name: pcodeMap[gs.base1] || atkOM[gs.base1] || null,
        base2Name: pcodeMap[gs.base2] || atkOM[gs.base2] || null,
        base3Name: pcodeMap[gs.base3] || atkOM[gs.base3] || null,
      };
    }

    return {
      home: { batters: _parseBatters(homeL), pitchers: _parsePitchers(homeL) },
      away: { batters: _parseBatters(awayL), pitchers: _parsePitchers(awayL) },
      currentGameState: enrichedGs,
      pcodeMap,  // 타자/투수 ID 변환용
    };
  } catch(e) {
    console.error('fetchLineupDirect error:', e);
    return null;
  }
}

window.refreshModalSituation = async function(gameId, date, away, home) {
  const btn = event.currentTarget;
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
  try {
    // 최신 lineup + 경기상황 다시 fetch
    const inn = state.modalGame?.inning || 1;
    const [lineupData] = await Promise.all([
      fetchLineupDirect(gameId, inn),
    ]);
    const idx2 = SCH.findIndex(s => s.date===date && s.away===away && s.home===home);
    if (idx2 !== -1) {
      if (lineupData) {
        if (lineupData.home || lineupData.away) SCH[idx2].lineup = lineupData;
        if (lineupData.currentGameState) {
          SCH[idx2].currentGameState = lineupData.currentGameState;
          const _rmGs = lineupData.currentGameState;
          const _rmPName = _rmGs?.pitcherName || '';
          if (_rmPName && !/^\d+$/.test(_rmPName)) {
            const _rmInfo = _rmGs?._inningInfo || SCH[idx2].inningInfo || '';
            if (_rmInfo.includes('말')) { if (!SCH[idx2].awayPitcher) SCH[idx2].awayPitcher = _rmPName; }
            else { if (!SCH[idx2].homePitcher) SCH[idx2].homePitcher = _rmPName; }
          }
        }
        // lineup 마지막 투수 보완 (해당 팀의 마지막 등판 투수, 이닝 구분 없이 항상 적용)
        if (!SCH[idx2].awayPitcher) {
          const _rmapl = lineupData.away?.pitchers || [];
          if (_rmapl.length) SCH[idx2].awayPitcher = _rmapl[_rmapl.length-1].name || '';
        }
        if (!SCH[idx2].homePitcher) {
          const _rmhpl = lineupData.home?.pitchers || [];
          if (_rmhpl.length) SCH[idx2].homePitcher = _rmhpl[_rmhpl.length-1].name || '';
        }
      }
      state.modalGame = SCH[idx2];
    }
    await fetchTodayScores(date);
    renderModal(D());
  } finally {
    if (btn) { btn.textContent = '🔄'; btn.disabled = false; }
  }
};

    if (g && g.gameId) {
      openRelay(g.gameId, g.away, g.home, g.inning || 1);
      return;
    }
    // gameId 없는 예정 경기 → 기존 모달로 표시 (PC 스타일 적용됨)
  }
  const dayGs=SCH.filter(g=>g.date===date);
  const sorted=[...dayGs.filter(g=>g.away==='KIA'||g.home==='KIA'),...dayGs.filter(g=>g.away!=='KIA'&&g.home!=='KIA')];
  state.modalGame=sorted[idx];
  // KIA가 있는 경기면 항상 KIA 탭을 기본 선택
  if (state.modalGame.away === 'KIA') state.modalLt = 'away';
  else if (state.modalGame.home === 'KIA') state.modalLt = 'home';
  else state.modalLt = 'away';
  // 기본 기록 탭: KIA
  state.modalRecTab = (state.modalGame.home === 'KIA') ? 'home' : 'away';
  const overlay=document.getElementById('modal-overlay');
  const box=document.getElementById('modal-box');
  box.classList.remove('closing'); overlay.classList.add('open');
  box.scrollTop = 0;
  renderModal(D()); history.pushState({modal:true},'');
  document.body.style.overflow='hidden';

  // 라인업 & 경기 상황 브라우저 직접 fetch
  const g = state.modalGame;
  if (g && g.gameId) {
    const inn = g.inning || 1;
    fetchLineupDirect(g.gameId, inn).then(lineup => {
      if (!lineup) return;
      const idx2 = SCH.findIndex(s=>s.date===g.date&&s.away===g.away&&s.home===g.home);
      if (idx2 !== -1) {
        if (lineup.home || lineup.away) SCH[idx2].lineup = lineup;
        if (lineup.currentGameState) {
          SCH[idx2].currentGameState = lineup.currentGameState;
          // currentGameState의 pitcherName으로 awayPitcher/homePitcher 보완
          const _omGs = lineup.currentGameState;
          const _omPName = _omGs?.pitcherName || '';
          if (_omPName && !/^\d+$/.test(_omPName)) {
            const _omInfo = _omGs?._inningInfo || SCH[idx2].inningInfo || '';
            if (_omInfo.includes('말')) { if (!SCH[idx2].awayPitcher) SCH[idx2].awayPitcher = _omPName; }
            else { if (!SCH[idx2].homePitcher) SCH[idx2].homePitcher = _omPName; }
          }
        }
        // lineup의 마지막 투수로도 보완 (해당 팀의 마지막 등판 투수, 이닝 구분 없이 항상 적용)
        if (!SCH[idx2].awayPitcher) {
          const _apl2 = lineup.away?.pitchers || [];
          if (_apl2.length) SCH[idx2].awayPitcher = _apl2[_apl2.length-1].name || '';
        }
        if (!SCH[idx2].homePitcher) {
          const _hpl2 = lineup.home?.pitchers || [];
          if (_hpl2.length) SCH[idx2].homePitcher = _hpl2[_hpl2.length-1].name || '';
        }
      }
      if (state.modalGame?.gameId === g.gameId) {
        state.modalGame = idx2 !== -1 ? SCH[idx2] : state.modalGame;
        renderModal(D());
      }
    });

    // FINAL 경기이고 득점 상황이 없으면 relay에서 자동 fetch
    if (g.status === 'FINAL' && !g._scoringPlays) {
      fetchRelayData(g.gameId, g.inning || 9).then(relayData => {
        if (!relayData) return;
        const idx2 = SCH.findIndex(s => String(s.gameId) === String(g.gameId));
        if (idx2 !== -1) {
          SCH[idx2]._scoringPlays = extractScoringPlays(relayData);
          if (state.modalGame?.gameId === g.gameId) {
            state.modalGame = SCH[idx2];
            renderModal(D());
          }
        }
      });
    }
  }

  let ty=null, txStart=0, canSwipeClose=false;
  box.ontouchstart=e=>{
    ty=e.touches[0].clientY;
    txStart=e.touches[0].clientX;
    canSwipeClose = (box.scrollTop <= 0);
  };
  box.ontouchmove=e=>{
    if(ty===null) return;
    const dy=e.touches[0].clientY-ty;
    const dx=Math.abs(e.touches[0].clientX-txStart);
    if(canSwipeClose && dy>0 && dx<30) e.preventDefault();
  };
  box.ontouchend=e=>{
    if(ty===null) return;
    const dy=e.changedTouches[0].clientY-ty;
    if(canSwipeClose && dy>60) closeModal();
    ty=null;
  };
}

    state.modalGame=null;
    state.modalLt='away';
    state.modalRecTab=null;
    document.body.style.overflow='';
  },280);
}

function extractScoringPlays(relayData) {
  if (!relayData) return [];
  const relays = relayData.textRelays || [];
  const plays = [];
  relays.forEach(item => {
    const opts = item.textOptions || [];
    const allItems = [item, ...opts];
    allItems.forEach(it => {
      const title = it.title || it.text || '';
      const isScoring = /홈런|타점|득점|희생플라이|밀어내기/.test(title) ||
        (/안타|2루타|3루타/.test(title) && (it.rbi > 0 || opts.some(o => o.rbi > 0)));
      if (isScoring && title) {
        const gs = it.currentGameState || item.currentGameState;
        plays.push({
          title,
          desc: it.resultText || '',
          awayScore: gs?.awayScore ?? '',
          homeScore: gs?.homeScore ?? '',
        });
      }
    });
  });
  const seen = new Set();
  return plays.filter(p => {
    if (seen.has(p.title)) return false;
    seen.add(p.title);
    return true;
  });
}

// ── 탭 스와이프 ──
(function(){
  const TABS = ['cal','stand','my'];
  let sx=0, sy=0, sScrollY=0;
  const app = document.getElementById('app');

  app.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    sScrollY = window.scrollY;
  }, {passive:true});

  app.addEventListener('touchend', e => {
    // 모달 열려있으면 무시
    if(state.modalGame) return;
    // 사진 슬라이드 위에서 발생한 터치면 무시
    if(e.target.closest && e.target.closest('[id^="slide-"]')) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    // 세로 스크롤 중이면 무시 (세로 이동이 가로보다 크면)
    if(Math.abs(dy) > Math.abs(dx)) return;
    // 스와이프 거리 부족하면 무시
    if(Math.abs(dx) < 60) return;
    // 스크롤이 내려간 상태면 무시
    if(window.scrollY > 30) return;
    const cur = TABS.indexOf(state.tab);
    if(dx < 0 && cur < TABS.length-1) setTab(TABS[cur+1]); // 왼쪽 스와이프 → 다음 탭
    else if(dx > 0 && cur > 0) setTab(TABS[cur-1]); // 오른쪽 스와이프 → 이전 탭
  }, {passive:true});
})();
