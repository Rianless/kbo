  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#E8ECF1;color:#0A0E1A;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
    body.dark{background:#0A0E1A;color:#fff}
    button{cursor:pointer;border:none;outline:none;background:none;-webkit-appearance:none}
    textarea{outline:none;font-family:'Noto Sans KR',sans-serif}
    ::-webkit-scrollbar{display:none}
    .fade{animation:fadeIn 0.3s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
    #modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s}
    #modal-overlay.open{display:flex}
    #modal-box{width:100%;max-width:520px;background:#fff;border-radius:22px 22px 0 0;height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:28px;animation:slideUp 0.3s ease}
    #modal-box.closing{animation:slideDown 0.28s ease forwards}
    body.dark #modal-box{background:#0F1525}
    .nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid rgba(0,0,0,0.1);display:flex;padding-bottom:6px;z-index:50}
    body.dark .nav{background:#111827;border-color:rgba(255,255,255,0.08)}
    .nav button{flex:1;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(0,0,0,0.4);font-size:9px;font-family:'Noto Sans KR',sans-serif}
    body.dark .nav button{color:rgba(255,255,255,0.35)}
    .nav button.active{color:#E31837}
    .nav button span.icon{font-size:18px}
     .tab{display:none;animation:fadeIn 0.3s}
    .tab.active{display:block}
    .card{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:14px;padding:12px 14px;cursor:pointer;margin-bottom:8px}
    body.dark .card{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.07)}
    .card.kia{background:rgba(227,24,55,0.08);border-color:rgba(227,24,55,0.25)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
    .cal-sticky{position:sticky;top:0;z-index:10;background:inherit;}
    .cal-week-only .cal-grid#cal-grid-body .cal-cell:not(.current-week){display:none}
    .cal-cell{min-height:68px;padding:3px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:opacity 0.25s ease,max-height 0.3s ease,padding 0.3s ease,min-height 0.3s ease}
    .cal-cell.sel{background:rgba(227,24,55,0.15)}
    .cal-cell.past{opacity:0.4}
    .cal-day{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin-top:2px;border:2px solid transparent}
    .cal-day.sel{color:#E31837;border-color:#E31837}
    .cal-day.today{background:rgba(0,0,0,0.12)}
    body.dark .cal-day.today{background:rgba(255,255,255,0.18)}
    .cal-day.sat{color:#4FC3F7}
    .cal-day.sun{color:#EF5350}
    .inn-table{width:100%;border-collapse:collapse;font-size:12px;min-width:300px}
    .inn-table td{text-align:center;padding:6px 3px}
    .inn-table .team-cell{text-align:left;padding:8px 6px;font-size:11px;font-weight:700}
    .tag-kia{font-size:9px;background:#E31837;color:#fff;border-radius:4px;padding:1px 5px;font-weight:700}
    .tag-lu{font-size:9px;background:rgba(0,230,118,0.15);color:#00E676;border-radius:4px;padding:1px 5px;font-weight:700;border:1px solid rgba(0,230,118,0.3)}
    /* 사진 전체화면 뷰어 */
    #photo-viewer{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;flex-direction:column;animation:fadeIn 0.2s}
    #photo-viewer.open{display:flex}
    #photo-viewer img{max-width:100%;max-height:85vh;object-fit:contain;border-radius:8px;touch-action:pinch-zoom}
    #photo-viewer-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    #photo-viewer-nav{position:absolute;bottom:24px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:12px}

</div>
<div id="modal-overlay">

  </div>
</div>

      <div style="display:flex;justify-content:center;margin-bottom:10px">
        <div style="width:34px;height:4px;border-radius:2px;background:rgba(0,0,0,0.15)"></div>

        <button onclick="closeTicketPanel()" style="background:rgba(0,0,0,0.07);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
    </div>
    <div id="ticket-links" style="padding:12px 18px 0;display:flex;flex-direction:column;gap:8px"></div>

</div>

<div id="relay-panel" onclick="if(event.target===this) closeRelay()">

    <div id="relay-header">

function getDday() {
  const now = new Date();
  const kstNow = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  const nowDate = new Date(kstNow.getFullYear(), kstNow.getMonth(), kstNow.getDate());
  const openDate = new Date(2026, 2, 28); // 3월 28일 개막
  const postseasonDate = new Date(2026, 7, 20); // 8월 20일 가을야구
  // 8/20 이후면 가을야구
  if (nowDate >= postseasonDate) return 'POSTSEASON';
  const diff = Math.round((openDate - nowDate) / (1000*60*60*24));
  if (diff > 0) return `D-${diff}`;
  if (diff === 0) return 'D-Day';
  return `D+${Math.abs(diff)}`;
}

const _weatherCache = {};
async function fetchWeather(stad) {
  if (!stad) return null;
  // 날씨 캐시 (5분)
  const cached = _weatherCache[stad];
  if (cached && Date.now() - cached._ts < 5*60*1000) return cached;
  const c = STAD_COORDS[stad];
  if (!c) return null;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current=temperature_2m,precipitation,rain,showers,snowfall,weathercode,windspeed_10m&timezone=Asia%2FSeoul&forecast_days=1`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    const cur = data?.current;
    if (!cur) return null;
    const wcode = cur.weathercode ?? 0;
    const precip = cur.precipitation || 0;
    let icon, desc;
    if      (wcode===0)     {icon='☀️'; desc='맑음';}
    else if (wcode<=2)      {icon='🌤️'; desc='구름조금';}
    else if (wcode===3)     {icon='☁️'; desc='흐림';}
    else if (wcode<=49)     {icon='🌫️'; desc='안개';}
    else if (wcode<=55)     {icon='☁️'; desc='흐림';}
    else if (wcode<=65)     {icon='🌧️'; desc='비';}
    else if (wcode<=77)     {icon='❄️'; desc='눈';}
    else if (wcode<=82)     {icon='🌦️'; desc='소나기';}
    else if (wcode<=99)     {icon='⛈️'; desc='뇌우';}
    else                    {icon='🌡️'; desc='';}
    const isRain = precip >= 1 || wcode >= 61;
    const result = {
      icon, desc,
      temp: Math.round(cur.temperature_2m),
      wind: Math.round(cur.windspeed_10m),
      precip: parseFloat(precip.toFixed(1)),
      isRain,
      city: c.city,
      _ts: Date.now(),
    };
    _weatherCache[stad] = result;
    return result;
  } catch(e){ return null; }
}

const normalizePositionLabel = pos => {
  // 비필드 포지션(대주자/대타/주자 등)은 빈 문자열로 반환 → buildDisplayLineup에서 starterPos로 폴백
  const nonField = new Set(['대주자','대타','주자','대주자/대타','대타/대주자']);
  if (nonField.has(pos)) return '';
  const map = {
    '중견수':'CF','좌익수':'LF','우익수':'RF','유격수':'SS',
    '2루수':'2B','1루수':'1B','3루수':'3B','포수':'C',
    '투수':'P','지명타자':'DH',
    CF:'CF', LF:'LF', RF:'RF', SS:'SS', '2B':'2B', '1B':'1B', '3B':'3B', C:'C', P:'P', DH:'DH'
  };
  return map[pos] || '';
};
// 다이아몬드에 표시 가능한 포지션 코드 목록
const FIELD_POSITIONS = new Set(['CF','LF','RF','SS','2B','1B','3B','C','P','DH']);
// 포지션이 실제 수비 포지션인지 확인 (대주자/대타 등 비필드 포지션 제외)
const isFieldPos = pos => FIELD_POSITIONS.has(pos);

const buildDisplayLineup = lineup => {
  if (!lineup || !lineup.length) return [];
  // 1단계: 각 batOrder별 최초(선발) 포지션 수집
  const orderToStarterPos = {};
  lineup.forEach(player => {
    const order = player.order || player.batOrder || player.n;
    if (!order) return;
    if (orderToStarterPos[order]) return; // 이미 선발 포지션 있음
    const sp = normalizePositionLabel(player.starterPos || player.pos || player.p || '');
    if (isFieldPos(sp)) orderToStarterPos[order] = sp;
  });

  return lineup.map((player, idx) => {
    const starterName = player.starterName || player.name || '';
    const currentName = player.name || starterName;
    const starterPos = normalizePositionLabel(player.starterPos || '');
    const currentPos = normalizePositionLabel(player.pos || player.p || '');
    const order = player.order || player.batOrder || player.n || idx + 1;
    // 현재 포지션이 비필드이면: starterPos → 같은 타순 선발포지션 → 빈 문자열 순으로 폴백
    const displayPos = isFieldPos(currentPos) ? currentPos
      : isFieldPos(starterPos) ? starterPos
      : (orderToStarterPos[order] || '');
    const isSub = starterName && starterName !== currentName;
    const subLabel = player.sub || (isSub ? starterName : null);
    return {
      n: order,
      name: currentName,
      p: displayPos,
      pos: displayPos,
      sub: subLabel,
    };
  });
};

function renderCalSplit(d) {
  const {yr,mo,sel}=state;
  const WDAYS=['일','월','화','수','목','금','토'];
  const f=fdow(yr,mo), days=dim(yr,mo);
  const _kn=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const today=_kn.getFullYear()+'-'+String(_kn.getMonth()+1).padStart(2,'0')+'-'+String(_kn.getDate()).padStart(2,'0');
  const kmap={};
  SCH.forEach(g => {
    if(g.away!=='KIA'&&g.home!=='KIA') return;
    const [gy,gm,gd]=g.date.split('-').map(Number);
    if(gy===yr&&gm===mo) kmap[gd]=g;
  });
  const dayGs=SCH.filter(g=>g.date===sel);
  const selGs=[...dayGs.filter(g=>g.away==='KIA'||g.home==='KIA'),...dayGs.filter(g=>g.away!=='KIA'&&g.home!=='KIA')];
  const [,sm,sd]=sel.split('-').map(Number);
  const dw=['일','월','화','수','목','금','토'][new Date(yr,sm-1,sd).getDay()];
  let cells='';
  for(let i=0;i<f;i++) cells+=`<div class="cal-cell"></div>`;
  // 오늘이 속한 주의 시작/끝 계산
  const todayDateObj = new Date(today);
  const todayDow = todayDateObj.getDay(); // 0=일
  const weekStart = new Date(todayDateObj); weekStart.setDate(todayDateObj.getDate()-todayDow);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);

  for(let i=1;i<=days;i++) {
    const ds=`${yr}-${pad(mo)}-${pad(i)}`;
    const kg=kmap[i], isSel=ds===sel, isToday=ds===today;
    const dow=(f+i-1)%7, isPast=new Date(ds)<new Date('2026-03-28');
    const dsDate=new Date(ds);
    const isCurrentWeek=(dsDate>=weekStart&&dsDate<=weekEnd);
    const isHome=kg&&kg.home==='KIA', oppKey=kg?(isHome?kg.away:kg.home):null;
    const dayColor=dow===0?'#EF5350':dow===6?'#4FC3F7':d.text;
    // KIA 홈경기: 빨간 동그라미, 원정: 테두리 없음
    const isKiaHome = kg&&kg.home==='KIA';
    const isKiaGame = !!kg&&!!oppKey;
    const statusBadge = kg&&kg.status==='LIVE'?'<div style="font-size:6px;background:#E31837;color:#fff;border-radius:2px;padding:0 2px;font-weight:700;line-height:1.4">LIVE</div>':'';
    // 날짜 스타일: 홈경기=빨간동그라미, 원정=기본, 선택=배경만
    const dayExtraStyle = isKiaGame&&isKiaHome ? 'background:rgba(227,24,55,0.15);border-color:#E31837;' : '';
    const kiaLost = kg&&kg.status==='FINAL'&&(()=>{const ks=isHome?kg.homeScore:kg.awayScore,os=isHome?kg.awayScore:kg.homeScore;return ks!=null&&os!=null&&ks<os;})();
    const logoGrayStyle = kiaLost?'filter:grayscale(1);opacity:0.72;':'';
    cells+=`<div class="cal-cell${isSel?' sel':''}${isPast?' past':''}${isCurrentWeek?' current-week':''}" onclick="selDate('${ds}')">
      <div class="cal-day${isToday?' today':''}${dow===5?' sat':dow===6?' sun':''}" style="color:${dayColor};${dayExtraStyle}">${i}</div>
      ${isKiaGame?`<div style="display:flex;flex-direction:column;align-items:center;gap:1px">
        <div style="${logoGrayStyle}">${logo(oppKey,22)}</div>
        ${statusBadge||`<div style="font-size:7px;color:${d.sub};font-weight:600;line-height:1">${kg.time}</div>`}
      </div>`:''}
    </div>`;
  }
  let gameList='';
  if(new Date(sel)<new Date('2026-03-28')) {
    gameList=`<div style="text-align:center;padding:18px;color:${d.sub};font-size:12px;background:${d.bg};border-radius:12px;border:1px solid ${d.bgB}">⚾ 개막 전 · 3월 28일 (토) 개막</div>`;
  } else if(!selGs.length) {
    gameList=`<div style="text-align:center;padding:18px;color:${d.sub};font-size:12px;background:${d.bg};border-radius:12px;border:1px solid ${d.bgB}">😴 휴식일</div>`;
  } else {
    gameList=selGs.map((g,i)=>{
      const isKia=g.away==='KIA'||g.home==='KIA';
      const kiaHome=g.home==='KIA';
      const lKey=isKia&&kiaHome?g.home:g.away;
      const rKey=isKia&&kiaHome?g.away:g.home;
      const isLive=g.status==='LIVE', isFinal=g.status==='FINAL';
      const scoreHtml = (isLive||isFinal)?
        `<div style="font-size:18px;font-weight:900;color:${d.text}">${kiaHome?(g.homeScore??0):(g.awayScore??0)} <span style="font-size:12px;color:${d.sub}">:</span> ${kiaHome?(g.awayScore??0):(g.homeScore??0)}</div>`:
        `<div style="font-size:12px;font-weight:800;color:#FFB300">VS</div>`;
      return `<div class="card${isKia?' kia':''}" onclick="openModal(${i},'${sel}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:5px">
            <button onclick="event.stopPropagation();toggleFavByKey('${g.date}','${g.away}','${g.home}')" style="font-size:16px;line-height:1;padding:0 2px">${isFav(g)?'⭐':'☆'}</button>
            ${isLive?`<span style="font-size:9px;background:#E31837;color:#fff;border-radius:4px;padding:1px 5px;font-weight:700;animation:fadeIn 0.5s infinite alternate">🔴 LIVE</span>`:
              isFinal?`<span style="font-size:9px;background:rgba(0,0,0,0.25);color:#fff;border-radius:4px;padding:1px 5px;font-weight:700">종료</span>`:
              `<span style="font-size:11px;font-weight:700;color:#FFB300">${g.time} 시작</span>`}
            ${isKia?`<span class="tag-kia">🐯 KIA</span>`:''}
            ${formatInningBadge(g)?`<span class="tag-lu">${formatInningBadge(g)}</span>`:''}
          </div>
          ${isKia
            ? `<button onclick="event.stopPropagation();openTicketPanel('${g.stad}','${g.date}','${g.away}','${g.home}')" style="font-size:10px;color:#E31837;font-weight:700;background:rgba(227,24,55,0.08);border:1px solid rgba(227,24,55,0.25);border-radius:6px;padding:3px 7px;font-family:'Noto Sans KR',sans-serif">📍${g.stad} ›</button>`
            : `<span style="font-size:10px;color:${d.sub}">📍${g.stad} ›</span>`}
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:7px;flex:1">
            ${logo(lKey,36)}
            <div>
              <div style="font-size:12px;font-weight:700;color:${lKey==='KIA'?'#ff6b6b':d.text}">${T[lKey]?.name||lKey}</div>
              <div style="font-size:9px;color:${d.sub}">${isKia&&kiaHome?'HOME':'AWAY'}</div>
            </div>
          </div>
          <div style="padding:0 8px;text-align:center">${scoreHtml}</div>
          <div style="display:flex;align-items:center;gap:7px;flex:1;flex-direction:row-reverse">
            ${logo(rKey,36)}
            <div style="text-align:right">
              <div style="font-size:12px;font-weight:700;color:${rKey==='KIA'?'#ff6b6b':d.text}">${T[rKey]?.name||rKey}</div>
              <div style="font-size:9px;color:${d.sub}">${isKia&&kiaHome?'AWAY':'HOME'}</div>
            </div>
          </div>
        </div>
        ${(g.awayStarter||g.homeStarter)?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.07)">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:10px;color:${d.sub}">선발 <span style="font-weight:700;color:${lKey==='KIA'?'#ff6b6b':d.text}">${(lKey===g.away?g.awayStarter:g.homeStarter)||'미정'}</span></div>
            <div id="card-weather-${g.gameId}" style="font-size:10px;color:${d.sub}"></div>
            <div style="font-size:10px;color:${d.sub}"><span style="font-weight:700;color:${rKey==='KIA'?'#ff6b6b':d.text}">${(rKey===g.away?g.awayStarter:g.homeStarter)||'미정'}</span> 선발</div>
          </div>
        </div>`:''}
      </div>`;
    }).join('');
  }
  // ── KIA 경기 배너 (오늘경기 예정→LIVE→종료결과, 자정 후 다음경기) ──
  const kstNow2 = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const todayStr2 = kstNow2.getFullYear()+'-'+String(kstNow2.getMonth()+1).padStart(2,'0')+'-'+String(kstNow2.getDate()).padStart(2,'0');
  // 오늘 KIA 경기 (FINAL 포함 — 오늘 경기가 끝난 것도 보여줌)
  const todayKiaGame = SCH.find(g=>g.date===todayStr2&&(g.away==='KIA'||g.home==='KIA'));
  // 다음 예정 경기 (오늘 이후)
  const nextKiaFuture = SCH.find(g=>g.date>todayStr2&&(g.away==='KIA'||g.home==='KIA')&&g.status!=='FINAL');
  // 배너 대상: 오늘 경기 있으면 오늘 것, 없으면 다음 경기
  const bannerGame = todayKiaGame || nextKiaFuture;
  let nextBannerHtml = '';
  if (bannerGame) {
    const opp2 = bannerGame.home==='KIA' ? bannerGame.away : bannerGame.home;
    const isHome2 = bannerGame.home==='KIA';
    const isToday2 = bannerGame.date === todayStr2;
    const isLiveNow = bannerGame.status==='LIVE';
    const isFinalNow = bannerGame.status==='FINAL';
    const kScore2 = isHome2?(bannerGame.homeScore??0):(bannerGame.awayScore??0);
    const oScore2 = isHome2?(bannerGame.awayScore??0):(bannerGame.homeScore??0);
    const isWin2 = kScore2 > oScore2;

    const [ny,nm,nd] = bannerGame.date.split('-').map(Number);
    const nextD = new Date(ny,nm-1,nd);
    const nowD = new Date(kstNow2.getFullYear(),kstNow2.getMonth(),kstNow2.getDate());
    const diffDays = Math.round((nextD-nowD)/(1000*60*60*24));
    const dw3=['일','월','화','수','목','금','토'][nextD.getDay()];
    const dateDisp = `${nm}/${nd}(${dw3})`;
    const stadDisp = bannerGame.stad ? ` · ${bannerGame.stad}` : '';

    let subLabel, mainContent, rightContent;

    if (isLiveNow) {
      subLabel = `🔴 LIVE · ${bannerGame.inningInfo||''}`;
      mainContent = `<div style="font-size:17px;font-weight:900;color:#fff">vs ${T[opp2]?.name||opp2}</div>`;
      rightContent = `<div style="font-size:22px;font-weight:900;color:#fff;text-align:right">${kScore2}<span style="font-size:14px;opacity:0.7;margin:0 4px">:</span>${oScore2}</div>`;
    } else if (isFinalNow && isToday2) {
      // 오늘 경기 종료 → 결과 보여줌
      subLabel = `경기 종료 · ${isWin2?'✅ 승리':'❌ 패배'}`;
      mainContent = `<div style="font-size:17px;font-weight:900;color:#fff">vs ${T[opp2]?.name||opp2}</div>`;
      rightContent = `<div style="font-size:22px;font-weight:900;color:#fff;text-align:right">${kScore2}<span style="font-size:14px;opacity:0.7;margin:0 4px">:</span>${oScore2}</div>`;
    } else {
      // 예정 경기
      subLabel = isToday2 ? `${bannerGame.time} 오늘 경기 예정` : `${bannerGame.time} 다음 경기 예정`;
      const diffTxt = !isToday2 && diffDays>0 ? `<span style="font-size:15px;font-weight:900;color:rgba(255,255,255,0.85);margin-left:6px">${diffDays}일 후</span>` : '';
      mainContent = `<div style="font-size:17px;font-weight:900;color:#fff">vs ${T[opp2]?.name||opp2}${diffTxt}</div>`;
      rightContent = '';
    }

    nextBannerHtml = `<div onclick="selDate('${bannerGame.date}')" style="background:linear-gradient(135deg,#E31837,#c0102a);border-radius:16px;padding:14px 16px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 4px 16px rgba(227,24,55,0.25)">
      ${logo('KIA',44)}
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:rgba(255,255,255,0.7);font-weight:700;margin-bottom:3px">${subLabel}</div>
        ${mainContent}
        <div style="font-size:11px;color:rgba(255,255,255,0.65);margin-top:3px">${dateDisp}${stadDisp} · ${isHome2?'홈':'원정'}</div>
      </div>
      ${rightContent ? `<div>${rightContent}</div>` : ''}
      ${logo(opp2,44)}
    </div>`;
  }

  const calHtml = `
    ${nextBannerHtml}
    <div style="position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:12px;height:36px">
      <div style="position:absolute;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:4px;pointer-events:none">
        <button onclick="prevMo()" style="color:#E31837;font-size:22px;padding:4px 8px;line-height:1;pointer-events:auto">‹</button>
        <div style="font-size:17px;font-weight:900;min-width:120px;text-align:center;color:${d.text}">${yr}년 ${mo}월</div>
        <button onclick="nextMo()" style="color:#E31837;font-size:22px;padding:4px 8px;line-height:1;pointer-events:auto">›</button>
      </div>
      <button onclick="goToday()" style="position:absolute;right:0;font-size:11px;font-weight:700;color:#E31837;border:1.5px solid #E31837;border-radius:8px;padding:4px 10px;white-space:nowrap">오늘</button>
    </div>
    <div id="cal-wrap" style="background:${d.bg};border:1px solid ${d.bgB};border-radius:14px;overflow:hidden;margin-bottom:16px">
      <div class="cal-grid" style="border-bottom:1px solid ${d.bgB};background:${d.bg}">
        ${WDAYS.map((w,i)=>`<div style="text-align:center;padding:8px 0;font-size:11px;font-weight:700;color:${i===0?'#EF5350':i===6?'#4FC3F7':d.sub}">${w}</div>`).join('')}
      </div>
      <div class="cal-grid" id="cal-grid-body">${cells}</div>
    </div>`;
  const listHtml = `<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px;padding-top:8px">
      <div style="font-size:14px;font-weight:900;color:${d.text}">${sm}월 ${sd}일 (${dw})</div>
      <span style="font-size:11px;color:${d.sub}">· ${selGs.length>0?selGs.length+'경기':'경기 없음'}</span>
    </div>
    ${gameList}`;
  return {calHtml, listHtml};
}



function renderCal(d) {
  const {calHtml, listHtml} = renderCalSplit(d);
  return `<div id="cal-section">${calHtml}</div>
    <hr id="cal-divider" style="display:none;border:none;border-top:1.5px solid rgba(127,127,127,0.2);margin:0 0 12px"/>
    <div id="list-section">${listHtml}</div>`;
}

function renderBaseballRecord(d) {
  const kiaGames = SCH.filter(g =>
    g.status === 'FINAL' && (g.away === 'KIA' || g.home === 'KIA')
  ).sort((a,b) => b.date.localeCompare(a.date));

  if (!kiaGames.length) {
    return '<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:40px;margin-bottom:12px">⚾</div>'
      + '<div style="font-size:15px;font-weight:700;color:'+d.text+'">아직 경기 기록이 없어요</div>'
      + '<div style="font-size:12px;color:'+d.sub+';margin-top:6px">개막 후 경기가 끝나면 여기에 쌓여요!</div>'
      + '</div>';
  }

  let html = '<div style="font-size:13px;font-weight:800;color:'+d.text+';margin-bottom:16px">⚾ 경기 기록 <span style="font-size:11px;color:'+d.sub+';font-weight:400">'+kiaGames.length+'경기</span></div>';

  kiaGames.forEach(function(g) {
    const isHome = g.home === 'KIA';
    const opp = isHome ? g.away : g.home;
    const kiaScore = isHome ? g.homeScore : g.awayScore;
    const oppScore = isHome ? g.awayScore : g.homeScore;
    const isWin = kiaScore > oppScore;
    const isDraw = kiaScore === oppScore;
    // 결과 색상/라벨 (사진처럼)
    const resultColor = isWin ? '#E31837' : isDraw ? '#FF9500' : '#3B9EF5';
    const resultBg    = isWin ? 'rgba(227,24,55,0.06)' : isDraw ? 'rgba(255,149,0,0.06)' : 'rgba(59,158,245,0.06)';
    const resultEn    = isWin ? 'WIN' : isDraw ? 'DRAW' : 'LOSE';
    const resultKr    = isWin ? '승리' : isDraw ? '무승부' : '패배';

    const memoKey = 'm_'+g.date+'_'+g.away+'_'+g.home;
    let memoData = {};
    try { memoData = JSON.parse(localStorage.getItem(memoKey)||'{}'); if(typeof memoData==='string') memoData={text:memoData}; } catch(e) {}

    const [yr2,mo2,da2] = g.date.split('-');
    const dw2 = ['일','월','화','수','목','금','토'][new Date(g.date+'T12:00:00').getDay()];

    // 팀명 짧게 (타이거즈 → 타이거즈)
    const awayShort = T[g.away] ? T[g.away].name.replace(/^[^ ]+ /,'') : g.away;
    const homeShort = T[g.home] ? T[g.home].name.replace(/^[^ ]+ /,'') : g.home;

    // 티켓 전체 래퍼
    html += '<div class="rec-ticket-card" onclick="if(!event.target.closest(\'[id^=slide-]\'))openGameByKey(this)" style="margin-bottom:20px;cursor:pointer;border-radius:20px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.10);background:'+d.card+'" data-date="'+g.date+'" data-away="'+g.away+'" data-home="'+g.home+'">';

    // ── 티켓 상단: 날짜 + 구장 + WIN/LOSE 배지 ──
    html += '<div style="padding:18px 20px 16px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    // 왼쪽: 날짜 + 구장
    html += '<div>';
    html += '<div style="font-size:20px;font-weight:900;color:'+d.text+';letter-spacing:-0.5px">'+yr2+'.'+mo2+'.'+da2+'</div>';
    html += '<div style="display:flex;align-items:center;gap:4px;margin-top:4px">';
    html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="'+resultColor+'"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>';
    html += '<div style="font-size:12px;color:'+d.sub+'">'+g.stad+'</div>';
    html += '</div>';
    html += '</div>';
    // 오른쪽: WIN/LOSE 배지 (사진처럼 둥근 박스)
    html += '<div style="background:'+resultBg+';border:1.5px solid '+resultColor+';border-radius:14px;padding:8px 16px;text-align:center;min-width:64px">';
    html += '<div style="font-size:15px;font-weight:900;color:'+resultColor+'">'+resultEn+'</div>';
    html += '<div style="font-size:11px;font-weight:600;color:'+resultColor+';margin-top:1px">'+resultKr+'</div>';
    html += '</div>';
    html += '</div>';
    html += '</div>'; // 상단 끝

    // ── 점선 구분선 (노치 포함) ──
    html += '<div style="position:relative;height:1px;margin:0 0">';
    // 왼쪽 반원 노치
    html += '<div style="position:absolute;left:-10px;top:-10px;width:20px;height:20px;border-radius:50%;background:'+(d.dark?'#0A0E1A':'#E8ECF1')+';z-index:2"></div>';
    // 점선
    html += '<div style="border-top:2px dashed '+(d.dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.1)')+';margin:0 10px"></div>';
    // 오른쪽 반원 노치
    html += '<div style="position:absolute;right:-10px;top:-10px;width:20px;height:20px;border-radius:50%;background:'+(d.dark?'#0A0E1A':'#E8ECF1')+';z-index:2"></div>';
    html += '</div>';

    // ── 티켓 하단: 팀 로고 + 스코어 (사진처럼 크게) ──
    html += '<div style="padding:22px 20px 20px">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between">';
    // AWAY팀
    html += '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1">';
    html += logo(g.away, 68);
    html += '<div style="font-size:14px;font-weight:800;color:'+(g.away==='KIA'?'#E31837':d.text)+'">'+awayShort+'</div>';
    html += '<div style="font-size:11px;color:'+d.sub+';letter-spacing:0.05em">AWAY</div>';
    html += '</div>';
    // 스코어
    html += '<div style="text-align:center;padding:0 8px">';
    html += '<div style="font-size:36px;font-weight:900;color:'+d.text+';letter-spacing:-1px">'+(g.awayScore??0)+'<span style="font-size:22px;color:'+d.muted+';margin:0 6px">:</span>'+(g.homeScore??0)+'</div>';
    html += '</div>';
    // HOME팀
    html += '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1">';
    html += logo(g.home, 68);
    html += '<div style="font-size:14px;font-weight:800;color:'+(g.home==='KIA'?'#E31837':d.text)+'">'+homeShort+'</div>';
    html += '<div style="font-size:11px;color:'+d.sub+';letter-spacing:0.05em">HOME</div>';
    html += '</div>';
    html += '</div>';
    html += '</div>'; // 하단 스코어 끝

    // ── 메모 영역 ──
    const memoId = 'rec-memo-'+g.date+'-'+g.away+'-'+g.home;
    const safeD = g.date, safeA = g.away, safeH = g.home;

    html += '<div style="border-top:1px solid '+d.bgB+';padding:14px 20px 18px" onclick="event.stopPropagation()">';

    // 직관/집관/미시청 버튼
    html += '<div style="display:flex;gap:6px;margin-bottom:10px">';
    ['직관','집관','미시청'].forEach(function(v) {
      const sel = (memoData.watch||'') === v;
      const vc = v==='직관'?'#E31837':v==='집관'?'#0078ff':'rgba(0,0,0,0.3)';
      html += '<button onclick="event.stopPropagation();recSetWatch(\''+safeD+'\',\''+safeA+'\',\''+safeH+'\',\''+v+'\')" '
        + 'id="recwatch-'+memoId+'-'+v+'" '
        + 'style="flex:1;padding:7px 0;background:'+(sel?vc:'transparent')+';border:1.5px solid '+vc+';border-radius:8px;'
        + 'font-size:11px;font-weight:700;color:'+(sel?'#fff':vc)+';font-family:\'Noto Sans KR\',sans-serif;cursor:pointer">'

        + 'style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:50%;'
        + 'width:28px;height:28px;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px)">✕</button>';

          + 'style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;'

      + 'border-radius:10px;color:'+d.text+';font-size:12px;line-height:1.6;resize:none;box-sizing:border-box;'
      + 'font-family:\'Noto Sans KR\',sans-serif;margin-bottom:8px;-webkit-user-select:text;user-select:text">'
      + (memoData.text||'')+'</textarea>';

    // 사진 추가 버튼
    html += '<label onclick="event.stopPropagation()" '
      + 'style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:'+d.bg+';border:1px solid '+d.bgB+';'
      + 'border-radius:10px;cursor:pointer">';
    html += '<span style="font-size:15px">📷</span>';
    html += '<span style="font-size:12px;color:'+d.sub+';flex:1">사진 추가</span>';

    html += '</label>';

    html += '</div>'; // 메모 영역 끝
    html += '</div>'; // 티켓 전체 끝
  });

  return html;
}

window.saveRecordMemoEl = function(el) {
  const date = el.dataset.date, away = el.dataset.away, home = el.dataset.home;
  const key = 'm_'+date+'_'+away+'_'+home;
  let data = {};
  try { data = JSON.parse(localStorage.getItem(key)||'{}'); if(typeof data==='string') data={text:data}; } catch(e) {}
  data.text = el.value;
  localStorage.setItem(key, JSON.stringify(data));
};

function _recGetMemo(date, away, home) {
  const key = 'm_'+date+'_'+away+'_'+home;
  try { const d = JSON.parse(localStorage.getItem(key)||'{}'); return typeof d==='string'?{text:d}:d; } catch(e) { return {}; }
}
function _recSaveMemo(date, away, home, data) {
  localStorage.setItem('m_'+date+'_'+away+'_'+home, JSON.stringify(data));
}

window.recSetWatch = function(date, away, home, v) {
  const data = _recGetMemo(date, away, home);
  data.watch = data.watch === v ? '' : v;
  _recSaveMemo(date, away, home, data);
  // 버튼 색상 즉시 갱신
  const memoId = 'rec-memo-'+date+'-'+away+'-'+home;
  ['직관','집관','미시청'].forEach(function(lv) {
    const btn = document.getElementById('recwatch-'+memoId+'-'+lv);
    if (!btn) return;
    const vc = lv==='직관'?'#E31837':lv==='집관'?'#0078ff':'rgba(0,0,0,0.3)';
    const sel = data.watch === lv;
    btn.style.background = sel ? vc : 'transparent';
    btn.style.color = sel ? '#fff' : vc;
  });
};

window.recDeletePhoto = function(date, away, home, idx) {
  const data = _recGetMemo(date, away, home);
  const photos = data.photos || (data.photo ? [data.photo] : []);
  photos.splice(idx, 1);
  data.photos = photos;
  delete data.photo;
  _recSaveMemo(date, away, home, data);
  render();
};

window.recUploadPhoto = function(input, date, away, home) {
  if (!input.files || !input.files.length) return;
  const files = Array.from(input.files);
  _compressAll(files, function(results) {
    const data = _recGetMemo(date, away, home);
    const existing = data.photos || (data.photo ? [data.photo] : []);
    data.photos = [...existing, ...results];
    delete data.photo;
    _recSaveMemo(date, away, home, data);
    render();
    input.value = '';
  });
};

function renderMemos(d) {
  const memos = [];
  for(let i=0;i<localStorage.length;i++) {
    const k=localStorage.key(i);
    if(k&&k.startsWith('m_')) {
      const raw=localStorage.getItem(k);
      if(raw&&raw.trim()) {
        const parts=k.substring(2).split('_');
        const date=parts[0], away=parts[1], home=parts[2];
        let memoData={};
        try{ memoData=JSON.parse(raw); if(typeof memoData==='string') memoData={text:raw}; }catch(e){ memoData={text:raw}; }
        const photos = [];
        if(memoData.text||photos.length||memoData.watch)
          memos.push({date,away,home,memo:memoData.text||'',watch:memoData.watch||'',photos});
      }
    }
  }
  memos.sort((a,b)=>b.date.localeCompare(a.date));

  if(!memos.length) {
    return '<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:40px;margin-bottom:12px">📝</div>'
      + '<div style="font-size:15px;font-weight:700;color:'+d.text+'">메모가 없어요</div>'
      + '<div style="font-size:12px;color:'+d.sub+';margin-top:6px">경기 팝업에서 메모를 남겨보세요</div>'
      + '</div>';
  }

  let html = '<div style="font-size:12px;font-weight:700;color:'+d.sub+';margin-bottom:12px">총 '+memos.length+'개의 메모</div>';
  memos.forEach(m => {
    const isKia = m.away==='KIA'||m.home==='KIA';
    html += '<div class="card'+(isKia?' kia':'')+'" onclick="openGameByKey(this)" data-date="'+m.date+'" data-away="'+m.away+'" data-home="'+m.home+'">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html += logo(m.away,20);
    html += '<span style="font-size:11px;font-weight:700;color:'+d.sub+'">'+m.away+' vs '+m.home+'</span>';
    html += logo(m.home,20);
    html += '<span style="font-size:10px;color:'+d.sub+';margin-left:auto">'+m.date+'</span>';
    html += '</div>';
    if(m.watch) html += '<span style="font-size:10px;font-weight:700;background:'+(m.watch==='직관'?'rgba(227,24,55,0.1)':'rgba(0,120,255,0.1)')+';color:'+(m.watch==='직관'?'#E31837':'#0078ff')+';border-radius:5px;padding:2px 7px;margin-bottom:6px;display:inline-block">'+(m.watch==='직관'?'⚾ 직관':'📺 집관')+'</span>';
    if(m.memo) html += '<div style="font-size:13px;color:'+d.text+';line-height:1.6;white-space:pre-wrap;margin-top:4px">'+m.memo+'</div>';
    if(m.photos&&m.photos.length){
      const pj=JSON.stringify(m.photos).replace(/"/g,'&quot;');
      html+='<div onclick="event.stopPropagation()" style="margin-top:8px;position:relative;border-radius:10px;overflow:hidden;background:#111">';
      html+='<img src="'+m.photos[0]+'" onclick="openPhotoViewer(JSON.parse(this.dataset.photos||&quot;[]&quot;),0)" '
        +'data-photos="'+pj+'" style="width:100%;max-height:200px;object-fit:cover;display:block;cursor:zoom-in"/>';
      if(m.photos.length>1){
        html+='<div style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;font-weight:700;border-radius:8px;padding:3px 8px">+'+(m.photos.length-1)+'장 더</div>';
      }
      html+='</div>';
    }
    html += '</div>';
  });
  return html;

function renderTodoMemo(d) {
  const todos = getTodos();
  const pad2 = n => String(n).padStart(2,'0');
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const todayStr = now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(now.getDate());
  const dw = ['일','월','화','수','목','금','토'];

  let html = '';

  // 입력창
  html += `<div style="display:flex;gap:8px;margin-bottom:10px">
    <input id="todo-input" type="text" placeholder="새 메모 입력..." maxlength="100"
      autocomplete="off"
      onkeydown="if(event.key==='Enter'){event.preventDefault();addTodo();}"
      onclick="event.stopPropagation()"
      ontouchstart="event.stopPropagation()"
      style="flex:1;padding:10px 12px;background:${d.bg};border:1px solid ${d.bgB};border-radius:10px;
      font-size:13px;color:${d.text};font-family:'Noto Sans KR',sans-serif;outline:none;
      -webkit-user-select:text;user-select:text"/>
    <button onclick="addTodo()" style="padding:10px 14px;background:#E31837;color:#fff;border:none;
      border-radius:10px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap">추가</button>
  </div>`;

  // 리스트 컨테이너
  html += `<div id="todo-list-container">`;

  if (!todos.length) {
    html += `<div style="text-align:center;padding:20px 0;color:${d.sub};font-size:13px">메모가 없어요. 위에 입력해보세요!</div>`;
    html += `</div>`;
    return html;
  }

  // 날짜별 그룹
  const groups = {};
  todos.forEach(t => {
    if (!groups[t.date]) groups[t.date] = [];
    groups[t.date].push(t);
  });

  Object.keys(groups).sort((a,b) => b.localeCompare(a)).forEach(date => {
    const [y,m,da] = date.split('-');
    const dayObj = new Date(date+'T12:00:00');
    const dayLabel = dw[dayObj.getDay()];
    const isToday = date === todayStr;

    html += `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span style="font-size:12px;font-weight:700;color:${isToday?'#E31837':d.sub}">${y}.${m}.${da} (${dayLabel})</span>
        ${isToday?`<span style="font-size:10px;background:rgba(227,24,55,0.1);color:#E31837;border-radius:4px;padding:1px 6px;font-weight:700">오늘</span>`:''}
      </div>`;

    groups[date].forEach(t => {
      let tagBadge = '';
      if (t.tag) {
        const parts = t.tag.split('|');
        if (parts.length === 3) {
          const [,tAway,tHome] = parts;
          tagBadge = `<div style="margin-bottom:3px"><span style="font-size:10px;background:rgba(227,24,55,0.1);color:#E31837;border-radius:4px;padding:1px 6px;font-weight:700">⚾ ${tAway}↔${tHome}</span></div>`;
        }
      }
      // 카드 전체 클릭으로 완료 토글, 원은 done이면 빨간색으로 꽉 채움
      html += `<div onclick="toggleTodo('${t.id}')" style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:${d.bg};border:1px solid ${t.tag?'rgba(227,24,55,0.2)':d.bgB};border-radius:10px;margin-bottom:6px;cursor:pointer">
        <div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;background:${t.done?'#E31837':'transparent'};border:2px solid ${t.done?'#E31837':d.bgB}"></div>
        <div style="flex:1;min-width:0">${tagBadge}<span style="font-size:13px;color:${t.done?d.sub:d.text};${t.done?'text-decoration:line-through;':''}line-height:1.4">${t.text}</span></div>
        <button onclick="event.stopPropagation();deleteTodo('${t.id}')"
          style="color:${d.sub};font-size:16px;background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0">×</button>
      </div>`;
    });

    html += `</div>`;
  });

  html += `</div>`;
  return html;
}

window.addTodo = function() {
  const input = document.getElementById('todo-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const pad2 = n => String(n).padStart(2,'0');
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const date = now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(now.getDate());
  const todos = getTodos();
  const newTodo = { id: Date.now().toString(), text, date, done: false };
  todos.unshift(newTodo);
  saveTodos(todos);
  input.value = '';
  // render() 대신 DOM 직접 업데이트 (포커스 유지)
  _refreshTodoList();
  // 입력란에 포커스 유지
  input.focus();
};

  const dw = ['일','월','화','수','목','금','토'];

  const groups = {};
  todos.forEach(t => {
    if (!groups[t.date]) groups[t.date] = [];

  Object.keys(groups).sort((a,b) => b.localeCompare(a)).forEach(date => {
    const [y,m,da] = date.split('-');

    const dayLabel = dw[dayObj.getDay()];
    const isToday = date === todayStr;
    html += `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span style="font-size:12px;font-weight:700;color:${isToday?'#E31837':d.sub}">${y}.${m}.${da} (${dayLabel})</span>

      </div>`;
    groups[date].forEach(t => {
      let tagBadge2 = '';
      if (t.tag) {
        const parts = t.tag.split('|');
        if (parts.length === 3) {
          const [,tAway,tHome] = parts;

      </div>`;
    });
    html += `</div>`;
  });
  listEl.innerHTML = html;
};

window.toggleTodo = function(id) {
  const todos = getTodos();
  const t = todos.find(t=>t.id===id);
  if (t) t.done = !t.done;
  saveTodos(todos);
  _refreshTodoList();
};

window.deleteTodo = function(id) {
  saveTodos(getTodos().filter(t=>t.id!==id));
  _refreshTodoList();
};

// 순위 캐시
let _standCache = null;
let _standCacheTime = 0;

function calcStandingFromSCH() {
  // SCH 배열의 FINAL 경기 결과로 순위 직접 계산
  const teams = Object.keys(T);
  const stats = {};
  teams.forEach(t => { stats[t] = { win:0, lose:0, draw:0 }; });
  SCH.forEach(function(g) {
    if(g.status !== 'FINAL') return;
    if(g.awayScore == null || g.homeScore == null) return;
    const as = Number(g.awayScore), hs = Number(g.homeScore);
    if(!stats[g.away] || !stats[g.home]) return;
    if(as > hs) { stats[g.away].win++; stats[g.home].lose++; }
    else if(hs > as) { stats[g.home].win++; stats[g.away].lose++; }
    else { stats[g.away].draw++; stats[g.home].draw++; }
  });
  // 승률 계산 후 정렬
  const rows = teams.map(tkey => {
    const s = stats[tkey];
    const games = s.win + s.lose;
    const pctNum = games > 0 ? s.win / games : null;
    const pct = pctNum != null ? pctNum.toFixed(3) : '-';
    return { tkey, win:s.win, lose:s.lose, draw:s.draw, pct, pctNum };
  });
  rows.sort((a, b) => {
    if(b.pctNum == null && a.pctNum == null) return 0;
    if(b.pctNum == null) return -1;
    if(a.pctNum == null) return 1;
    return b.pctNum - a.pctNum;
  });
  // 공동순위 부여
  let rank = 1;
  rows.forEach((r, i) => {
    if(i === 0) { r.rank = 1; }
    else if(r.pctNum === rows[i-1].pctNum) { r.rank = rows[i-1].rank; }
    else { r.rank = i + 1; }
  });
  return rows;
}

async function fetchStanding() {
  // 10분 캐시
  if (_standCache && Date.now() - _standCacheTime < 600000) return _standCache;
  try {
    const yr = new Date().getFullYear();
    const url = `https://api-gw.sports.naver.com/schedule/teams/rank?category=kbo&roundId=${yr}`;
    const r = await fetch(url, { headers: { Referer:'https://m.sports.naver.com/', Accept:'application/json' }});
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const list = data?.result?.teamRankList || data?.result?.list || [];
    if (!list.length) throw new Error('empty');
    _standCache = list;
    _standCacheTime = Date.now();
    return list;
  } catch(e) {
    return null;
  }
}

// 라인업+경기상황: 서버 프록시를 통해 호출 (CORS 방지)
// 타자 배열 파싱 (배열 또는 객체)
function _parseBatters(src) {
  const arr = Array.isArray(src) ? src : (src?.batter || []);
  if (!arr.length) return [];
  const om = {};
  arr.forEach(p => {
    const key = p.batOrder || p.order || p.n;
    if (!om[key]) om[key] = [];
    om[key].push(p);
  });
  return Object.entries(om).sort(([a],[b])=>+a-+b).map(([o,ps]) => {
    const cur = ps.find(p=>p.cin==='true'||p.cin===true)
      || ps.find(p=>!(p.cout==='true'||p.cout===true))
      || ps[ps.length-1];
    const replaced = ps.find(p=>(p.cout==='true'||p.cout===true) && p!==cur);
    const starter = replaced || cur;
    return {
      n:+o, order:+o,
      name: cur.name || cur.playerName || '',
      p: cur.posName || cur.position || '',
      pos: cur.posName || cur.position || '',
      sub: replaced ? replaced.name : null,
      starterName: starter.name || cur.name || '',
      starterPos: starter.posName || starter.position || cur.posName || '',
      hit: cur.hit||0, ab: cur.ab||0, rbi: cur.rbi||0,
    };
  });
}
function _parsePitchers(src) {
  const arr = Array.isArray(src) ? src : (src?.pitcher || []);
  return arr.map(p=>({ seqno:p.seqno, name:p.name||'', inn:p.inn||'0', er:p.er||0, kk:p.kk||0 }));
}

async function fetchLineupDirect(gameId, inning) {
  if (!gameId) return null;
  const inn = Math.max(1, inning || 1);
  try {
    const r = await fetch(`/api/kboScores?gameId=${encodeURIComponent(gameId)}&inning=${inn}&action=lineup`);
    if (!r.ok) return null;
    const result = await r.json();
    if (!result) return null;

    // 서버가 표준화한 homeLineup/awayLineup 사용
    const homeL = result.homeLineup;
    const awayL = result.awayLineup;
    const gs    = result.currentGameState;

    // console.log('[lineup raw keys]', result._raw_keys); // 디버그

    if (!homeL && !awayL) {
      return gs ? { currentGameState: gs } : null;
    }

    // pcode → 이름 맵 (gs 베이스 이름 추출용)
    // 서버가 반환한 pcodeMap이 있으면 우선 사용, 없으면 lineup 배열에서 직접 구성
    const pcodeMap = { ...(result.pcodeMap || {}) };
    const allP = [...(homeL?.batter||[]), ...(homeL?.pitcher||[]), ...(awayL?.batter||[]), ...(awayL?.pitcher||[])];
    allP.forEach(p => { if(p.pcode) pcodeMap[String(p.pcode)] = p.name || p.playerName; });

    // 타자 순서맵 (베이스 주자 이름)
    const buildOM = (arr) => {
      const o2n = {};
      (Array.isArray(arr) ? arr : (arr?.batter||[])).forEach(p => {
        const k = p.batOrder||p.order;
        if (!o2n[k]) o2n[k] = [];
        o2n[k].push(p);
      });
      const res = {};
      Object.entries(o2n).forEach(([o,ps]) => {
        const cur = ps.find(p=>p.cin==='true'||p.cin===true)||ps[ps.length-1];
        res[o] = cur.name || cur.playerName || '';
      });
      return res;
    };
    const homeOM = buildOM(homeL);
    const awayOM = buildOM(awayL);

    let enrichedGs = gs || null;
    if (gs) {
      const g = state.modalGame;
      const info = g?.inningInfo || '';
      const isTop = info.includes('초') || !info.includes('말');
      const atkOM = isTop ? awayOM : homeOM;
      const _numId = v => v && /^\d+$/.test(String(v));
      enrichedGs = {
        ...gs,
        _inningInfo: info,
        // pcodeMap으로 ID를 이름으로 변환, 숫자 ID가 이름 필드에 남아있으면 비움
        pitcherName: pcodeMap[gs.pitcher] || (!_numId(gs.pitcherName) ? gs.pitcherName : null) || null,
        batterName:  pcodeMap[gs.batter]  || (!_numId(gs.batterName)  ? gs.batterName  : null) || null,
        base1Name: atkOM[gs.base1] || null,
        base2Name: atkOM[gs.base2] || null,
        base3Name: atkOM[gs.base3] || null,
      };
    }

    return {
      home: { batters: _parseBatters(homeL), pitchers: _parsePitchers(homeL) },
      away: { batters: _parseBatters(awayL), pitchers: _parsePitchers(awayL) },
      currentGameState: enrichedGs,
      pcodeMap,  // 타자/투수 ID 변환용
    };
  } catch(e) {
    console.error('fetchLineupDirect error:', e);
    return null;
  }
}

    ]);
    const idx2 = SCH.findIndex(s => s.date===date && s.away===away && s.home===home);
    if (idx2 !== -1) {

        if (lineupData.home || lineupData.away) SCH[idx2].lineup = lineupData;

        if (!SCH[idx2].awayPitcher) {

            if (_omInfo.includes('말')) { if (!SCH[idx2].awayPitcher) SCH[idx2].awayPitcher = _omPName; }
            else { if (!SCH[idx2].homePitcher) SCH[idx2].homePitcher = _omPName; }
          }
        }

        if (!SCH[idx2].awayPitcher) {

          if (_apl2.length) SCH[idx2].awayPitcher = _apl2[_apl2.length-1].name || '';
        }
        if (!SCH[idx2].homePitcher) {
          const _hpl2 = lineup.home?.pitchers || [];
          if (_hpl2.length) SCH[idx2].homePitcher = _hpl2[_hpl2.length-1].name || '';
        }
      }
      if (state.modalGame?.gameId === g.gameId) {
        state.modalGame = idx2 !== -1 ? SCH[idx2] : state.modalGame;
        renderModal(D());
      }
    });
  }

  let ty=null, txStart=0, canSwipeClose=false;
  box.ontouchstart=e=>{
    ty=e.touches[0].clientY;
    txStart=e.touches[0].clientX;
    canSwipeClose = (box.scrollTop <= 0);
  };
  box.ontouchmove=e=>{
    if(ty===null) return;
    const dy=e.touches[0].clientY-ty;
    const dx=Math.abs(e.touches[0].clientX-txStart);
    if(canSwipeClose && dy>0 && dx<30) e.preventDefault();
  };
  box.ontouchend=e=>{
    if(ty===null) return;
    const dy=e.changedTouches[0].clientY-ty;
    if(canSwipeClose && dy>60) closeModal();
    ty=null;
  };
}

// ── 탭 스와이프 ──
(function(){
  const TABS = ['cal','stand','my'];
  let sx=0, sy=0, sScrollY=0;
  const app = document.getElementById('app');

  app.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    sScrollY = window.scrollY;
  }, {passive:true});

  app.addEventListener('touchend', e => {
    // 모달 열려있으면 무시
    if(state.modalGame) return;
    // 사진 슬라이드 위에서 발생한 터치면 무시
    if(e.target.closest && e.target.closest('[id^="slide-"]')) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    // 세로 스크롤 중이면 무시 (세로 이동이 가로보다 크면)
    if(Math.abs(dy) > Math.abs(dx)) return;
    // 스와이프 거리 부족하면 무시
    if(Math.abs(dx) < 60) return;
    // 스크롤이 내려간 상태면 무시
    if(window.scrollY > 30) return;
    const cur = TABS.indexOf(state.tab);
    if(dx < 0 && cur < TABS.length-1) setTab(TABS[cur+1]); // 왼쪽 스와이프 → 다음 탭
    else if(dx > 0 && cur > 0) setTab(TABS[cur-1]); // 오른쪽 스와이프 → 이전 탭
  }, {passive:true});
})();

(function initGameCache() {
  try {
    const cache = JSON.parse(localStorage.getItem('kbo_game_cache') || '{}');
    Object.entries(cache).forEach(([key, data]) => {
      const idx = SCH.findIndex(s => s.date+'_'+s.away+'_'+s.home === key);
      if (idx === -1) return;
      // lineup이 있으면 starterPos 포함 여부 확인 (구버전 캐시는 lineup 제외)
      const dataToApply = {...data};
      if (dataToApply.lineup) {
        const checkBatters = (batters) => (batters||[]).some(b => b.starterPos);
        const hasStarterPos = checkBatters(dataToApply.lineup?.home?.batters) || checkBatters(dataToApply.lineup?.away?.batters);
        if (!hasStarterPos) delete dataToApply.lineup; // 구버전 lineup은 신규 fetch로 덮어쓰기
      }
      Object.assign(SCH[idx], dataToApply);
    });
  } catch(e) {}
})();

function saveGameCache(key, data) {

    cache[key] = {...(cache[key]||{}), ...data};
    localStorage.setItem('kbo_game_cache', JSON.stringify(cache));
  } catch(e) {}

function normalizeApiTeam(code, name) {
  if (code === 'HT') return 'KIA';
  if (code === 'KT') return 'KT';
  if (code === 'LG') return 'LG';
  if (code === 'SK') return 'SSG';
  if (code === 'NC') return 'NC';
  if (/두산|Bears/i.test(name || '')) return '두산';
  if (/롯데|Giants/i.test(name || '')) return '롯데';
  if (/삼성|Lions/i.test(name || '')) return '삼성';
  if (/한화|Eagles/i.test(name || '')) return '한화';
  if (/키움|Heroes/i.test(name || '')) return '키움';
  if (/SSG|Landers/i.test(name || '')) return 'SSG';
  return name || code || '';
}

function parseBrowserBatters(batters) {
  if (!batters?.length) return [];
  const orderMap = {};
  batters.forEach(p => {
    const order = p.batOrder;
    if (!orderMap[order]) orderMap[order] = [];
    orderMap[order].push(p);
  });
  return Object.entries(orderMap)
    .sort(([a], [b]) => Number(a) - Number(b))
    .map(([order, players]) => {
      const current = players.find(p => p.cin === 'true') || players.find(p => !p.cout) || players[players.length - 1];
      // cout=true인 선수(교체된 선발)가 있으면 그 선수의 포지션을 starterPos로 사용
      const replaced = players.find(p => p.cout === 'true' && p !== current);
      const starterForPos = replaced || current; // 교체된 선수가 없으면 현재 선수 자체
      return {
        n: Number(order),
        order: Number(order),
        name: current?.name || '',
        p: current?.posName || '',
        pos: current?.posName || '',
        sub: replaced?.name || null,
        starterName: starterForPos?.name || current?.name || '',
        starterPos: starterForPos?.posName || current?.posName || '',
        hit: current?.hit || 0,
        ab: current?.ab || 0,
        rbi: current?.rbi || 0,
      };
    });
}

function parseBrowserPitchers(pitchers) {
  return (pitchers || []).map(p => ({
    seqno: p.seqno,
    name: p.name,
    inn: p.inn || '0',
    er: p.er || 0,
    kk: p.kk || 0,
    bb: p.bb || 0,
  }));
}

function buildBrowserLineup(detail) {
  if (!detail) return null;

  // 네이버 lineup API가 반환할 수 있는 다양한 구조 시도
  const td = detail.textRelayData || detail;

  // 구조 1: homeLineup / awayLineup
  let home = td.homeLineup || detail.homeLineup;
  let away = td.awayLineup || detail.awayLineup;

  // 구조 2: homeTeamLineup / awayTeamLineup
  if (!home) home = td.homeTeamLineup || detail.homeTeamLineup;
  if (!away) away = td.awayTeamLineup || detail.awayTeamLineup;

  // 구조 3: lineup.home / lineup.away
  if (!home && detail.lineup) home = detail.lineup.home;
  if (!away && detail.lineup) away = detail.lineup.away;

  // 구조 4: batters/pitchers가 최상위에 home/away 구분 없이 있는 경우
  // homeBatters / awayBatters
  if (!home && (detail.homeBatters || detail.homePitchers)) {
    home = { batter: detail.homeBatters, pitcher: detail.homePitchers };
  }
  if (!away && (detail.awayBatters || detail.awayPitchers)) {
    away = { batter: detail.awayBatters, pitcher: detail.awayPitchers };
  }

  // 구조 5: batters 배열이 직접 있는 경우 (side 필드로 구분)
  if (!home && !away && Array.isArray(detail.batters)) {
    const hb = detail.batters.filter(p => p.side === 'home' || p.teamCode === detail.homeTeamCode);
    const ab = detail.batters.filter(p => p.side === 'away' || p.teamCode === detail.awayTeamCode);
    if (hb.length) home = { batter: hb };
    if (ab.length) away = { batter: ab };
  }

  if (!home && !away) return null;

  return {
    home: {
      batters: parseBrowserBatters(home?.batter || home?.batters),
      pitchers: parseBrowserPitchers(home?.pitcher || home?.pitchers),
    },
    away: {
      batters: parseBrowserBatters(away?.batter || away?.batters),
      pitchers: parseBrowserPitchers(away?.pitcher || away?.pitchers),
    },
  };
}

function parseInningNumber(statusInfo) {
  const match = String(statusInfo || '').match(/(\d+)/);
  return match ? Number(match[1]) : null;
}

async function fetchBrowserGameDetail(gameId, inning) {
  if (!gameId) return null;
  const inn = Math.max(1, inning || 1);
  try {
    // 서버 프록시 경유 (CORS 방지)
    const r = await fetch(`/api/kboScores?gameId=${encodeURIComponent(gameId)}&inning=${inn}&action=lineup`);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) {
    return null;
  }
}

function convertBrowserGame(game, detail) {
  const gameData = detail?.game || game;
  const away = normalizeApiTeam(game.awayTeamCode, game.awayTeamName);
  const home = normalizeApiTeam(game.homeTeamCode, game.homeTeamName);
  const statusCode = game.statusCode || '';
  const status = statusCode === 'BEFORE' ? 'SCHEDULED' : statusCode === 'STARTED' ? 'LIVE' : statusCode === 'RESULT' ? 'FINAL' : 'SCHEDULED';
  const awayRaw = gameData.awayTeamScoreByInning || game.awayTeamScoreByInning || [];
  const homeRaw = gameData.homeTeamScoreByInning || game.homeTeamScoreByInning || [];
  const awayInnings = Array(9).fill(-1);
  const homeInnings = Array(9).fill(-1);
  awayRaw.forEach((score, index) => {
    if (index < 9 && score !== '-') awayInnings[index] = Number(score);
  });
  homeRaw.forEach((score, index) => {
    if (index < 9 && score !== '-') homeInnings[index] = Number(score);
  });

  return {
    date: game.gameDate || '',
    time: game.gameDateTime?.split('T')[1]?.slice(0, 5) || '',
    away,
    home,
    stad: game.stadium || gameData.stadium || '',
    status,
    awayScore: game.awayTeamScore != null ? Number(game.awayTeamScore) : null,
    homeScore: game.homeTeamScore != null ? Number(game.homeTeamScore) : null,
    awayInnings,
    homeInnings,
    inning: parseInningNumber(game.statusInfo),
    inningInfo: game.statusInfo || null,
    winPitcher: gameData.winPitcherName || game.winPitcherName || null,
    losePitcher: gameData.losePitcherName || game.losePitcherName || null,
    awayStarter: game.awayStarterName || game.awayStarter || gameData.awayStarterName || gameData.awayStarter || null,
    homeStarter: game.homeStarterName || game.homeStarter || gameData.homeStarterName || gameData.homeStarter || null,
    awayPitcher: gameData.awayCurrentPitcherName || game.awayCurrentPitcherName
      || gameData.awayPitcherName || game.awayPitcherName
      || detail?.textRelayData?.awayCurrentPitcherName || null,
    homePitcher: gameData.homeCurrentPitcherName || game.homeCurrentPitcherName
      || gameData.homePitcherName || game.homePitcherName
      || detail?.textRelayData?.homeCurrentPitcherName || null,
    awayHit: Number(gameData.awayTeamHit ?? game.awayTeamHit ?? gameData.awayHit ?? game.awayHit ?? 0),
    homeHit: Number(gameData.homeTeamHit ?? game.homeTeamHit ?? gameData.homeHit ?? game.homeHit ?? 0),
    awayError: Number(gameData.awayTeamError ?? game.awayTeamError ?? gameData.awayError ?? game.awayError ?? 0),
    homeError: Number(gameData.homeTeamError ?? game.homeTeamError ?? gameData.homeError ?? game.homeError ?? 0),
    awayBallFour: Number(gameData.awayTeamBallFour ?? game.awayTeamBallFour ?? gameData.awayBallFour ?? game.awayBallFour ?? 0),
    homeBallFour: Number(gameData.homeTeamBallFour ?? game.homeTeamBallFour ?? gameData.homeBallFour ?? game.homeBallFour ?? 0),
    lineup: buildBrowserLineup(detail),
    currentGameState: detail?.textRelayData?.currentGameState || detail?.currentGameState || null,
    broadChannel: game.broadChannel || null,
    gameId: String(game.gameId || ''),
  };
}

async function fetchScoresDirectByDate(targetDate='') {
  const now = new Date();
  const kst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  const yyyy = kst.getFullYear();
  const mm = String(kst.getMonth() + 1).padStart(2, '0');
  const dd = String(kst.getDate()).padStart(2, '0');
  const todayDash = targetDate || `${yyyy}-${mm}-${dd}`;
  const url = `https://api-gw.sports.naver.com/schedule/games?fields=basic%2Cschedule%2Cbaseball%2CmanualRelayUrl&upperCategoryId=kbaseball&fromDate=${todayDash}&toDate=${todayDash}&size=500`;
  const r = await fetch(url, { headers: { Accept: 'application/json' } });
  if (!r.ok) throw new Error(`direct schedule ${r.status}`);
  const data = await r.json();
  const rawGames = (data?.result?.games || []).filter(g => g.categoryId === 'kbo');
  const detailMap = {};

  await Promise.all(rawGames.map(async game => {
    const shouldFetchDetail = game.statusCode === 'BEFORE' || game.statusCode === 'STARTED' || game.statusCode === 'RESULT';
    if (!shouldFetchDetail) return;
    const inning = game.statusCode === 'STARTED' ? (parseInningNumber(game.statusInfo) || 1) : 1;
    const detail = await fetchBrowserGameDetail(game.gameId, inning);
    if (detail) detailMap[game.gameId] = detail;
  }));

  return {
    games: rawGames.map(game => convertBrowserGame(game, detailMap[game.gameId] || null)),
  };
}

async function fetchScoresPayload(targetDate='') {
  const candidates = [];
  if (window.KBO_SCORES_API_URL) candidates.push(window.KBO_SCORES_API_URL);
  if (location.protocol !== 'file:') candidates.push(`/api/kboScores${targetDate ? `?date=${targetDate}` : ''}`);

  for (const url of candidates) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      return await r.json();
    } catch(e) {}
  }

  return await fetchScoresDirectByDate(targetDate);
}

async function fetchTodayScores(targetDate='') {
  try {
    const data = await fetchScoresPayload(targetDate);
    const games = data?.games || [];
    if (!games.length) return;

    let updated = false;
    // 디버그: 첫 게임의 전체 필드 확인
    if (games.length > 0) console.log('[DEBUG] API game sample:', JSON.stringify(games[0]));
    games.forEach(g => {
      const idx = SCH.findIndex(s => s.date===g.date && s.away===g.away && s.home===g.home);
      if (idx === -1) return;
      const upd = {};
      if (g.status) upd.status = g.status;
      // API에서 받아온 실시간 시간을 SCH에 덮어쓰기 (시간 변경 대응)
      if (g.time) upd.time = g.time;
      if (g.awayScore != null) upd.awayScore = g.awayScore;
      if (g.homeScore != null) upd.homeScore = g.homeScore;
      if (g.awayInnings?.some(x=>x>=0)) upd.awayInnings = g.awayInnings;
      if (g.homeInnings?.some(x=>x>=0)) upd.homeInnings = g.homeInnings;
      if (g.inning) upd.inning = g.inning;
      if (g.inningInfo) upd.inningInfo = g.inningInfo;
      if (g.winPitcher) upd.winPitcher = g.winPitcher;
      if (g.losePitcher) upd.losePitcher = g.losePitcher;
      if (g.awayStarter) upd.awayStarter = g.awayStarter;
      if (g.homeStarter) upd.homeStarter = g.homeStarter;
      if (g.awayPitcher) upd.awayPitcher = g.awayPitcher;
      if (g.homePitcher) upd.homePitcher = g.homePitcher;
      if (g.awayHit != null) upd.awayHit = g.awayHit;
      if (g.homeHit != null) upd.homeHit = g.homeHit;
      if (g.awayError != null) upd.awayError = g.awayError;
      if (g.homeError != null) upd.homeError = g.homeError;
      if (g.awayBallFour != null) upd.awayBallFour = g.awayBallFour;
      if (g.homeBallFour != null) upd.homeBallFour = g.homeBallFour;
      if (g.lineup) upd.lineup = g.lineup;
      if (g.currentGameState) {
        // 기존 currentGameState에 이름이 이미 있으면 보존 (숫자 ID로 덮어쓰기 방지)
        const prevGs = SCH[idx].currentGameState;
        const newGs = g.currentGameState;
        const mergedGs = { ...newGs };
        // pitcherName: 새 값이 숫자(ID)이거나 없으면 기존 이름 유지
        const newPitcher = newGs.pitcherName || newGs.currentPitcherName || '';
        const prevPitcher = prevGs?.pitcherName || prevGs?.currentPitcherName || '';
        if ((!newPitcher || /^\d+$/.test(String(newPitcher))) && prevPitcher && !/^\d+$/.test(String(prevPitcher))) {
          mergedGs.pitcherName = prevPitcher;
        }
        // batterName: 새 값이 숫자(ID)이거나 없으면 기존 이름 유지
        const newBatter = newGs.batterName || newGs.currentBatterName || '';
        const prevBatter = prevGs?.batterName || prevGs?.currentBatterName || '';
        if ((!newBatter || /^\d+$/.test(String(newBatter))) && prevBatter && !/^\d+$/.test(String(prevBatter))) {
          mergedGs.batterName = prevBatter;
        }
        // 베이스 주자 이름 보존
        if (!mergedGs.base1Name && prevGs?.base1Name) mergedGs.base1Name = prevGs.base1Name;
        if (!mergedGs.base2Name && prevGs?.base2Name) mergedGs.base2Name = prevGs.base2Name;
        if (!mergedGs.base3Name && prevGs?.base3Name) mergedGs.base3Name = prevGs.base3Name;
        upd.currentGameState = mergedGs;
      }
      if (g.gameId) upd.gameId = g.gameId;
      if (g.broadChannel) upd.broadChannel = g.broadChannel;
      // currentGameState의 pitcherName으로 awayPitcher/homePitcher 보완
      // (API가 awayCurrentPitcherName/homeCurrentPitcherName을 안 주는 경우 대비)
      if (!upd.awayPitcher && !upd.homePitcher && upd.currentGameState?.pitcherName) {
        const cPName = upd.currentGameState.pitcherName;
        const cInfo  = upd.currentGameState._inningInfo || g.inningInfo || '';
        if (cInfo.includes('말')) upd.awayPitcher = cPName;
        else upd.homePitcher = cPName;
      }
      Object.assign(SCH[idx], upd);
      // FINAL이거나 시간이 변경된 경우 localStorage에 영구 저장
      if (g.status === 'FINAL' || (g.time && g.time !== SCH[idx]._origTime)) {
        const cacheData = {};
        if (g.status === 'FINAL') Object.assign(cacheData, upd);
        else if (g.time) cacheData.time = g.time; // 시간 변경만 저장
        if (Object.keys(cacheData).length) saveGameCache(g.date+'_'+g.away+'_'+g.home, cacheData);
      }
      updated = true;
    });

    if (updated) {
      render();
      if (state.modalGame) {
        const mg = SCH.find(s => s.date===state.modalGame.date && s.away===state.modalGame.away && s.home===state.modalGame.home);
        if (mg) { state.modalGame = mg; renderModal(D()); }
      }
    }
  } catch(e) {
    console.log('스코어 갱신 실패:', e.message);
  }
}

async function fetchRelayData(gameId, inn) {
  if (!gameId) return null;
  const inning = Math.max(1, inn || 1);

  try {
    // Vercel 서버사이드 프록시를 통해 호출 (CORS 우회)
    const url = `/api/kboScores?gameId=${encodeURIComponent(gameId)}&inning=${inning}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`proxy ${r.status}`);
    const data = await r.json();
    // kboScores.js는 gameId 있을 때 단일 게임 객체를 바로 반환
    return data || null;
  } catch(e) {
    console.error("[Relay] fetchRelayData error:", e);
    return null;
  }
}
