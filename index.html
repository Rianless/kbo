  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#E8ECF1" id="theme-meta"/>
  <title>KBO 대시보드 🐯</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#E8ECF1;color:#0A0E1A;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
    body.dark{background:#0A0E1A;color:#fff}
    button{cursor:pointer;border:none;outline:none;background:none;-webkit-appearance:none}
    textarea{outline:none;font-family:'Noto Sans KR',sans-serif}
    ::-webkit-scrollbar{display:none}
    .fade{animation:fadeIn 0.3s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
    #modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s}
    #modal-overlay.open{display:flex}
    #modal-box{width:100%;max-width:520px;background:#fff;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;padding-bottom:28px;animation:slideUp 0.3s ease}
    #modal-box.closing{animation:slideDown 0.28s ease forwards}
    body.dark #modal-box{background:#0F1525}
    .nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid rgba(0,0,0,0.1);display:flex;padding-bottom:6px;z-index:50}
    body.dark .nav{background:#111827;border-color:rgba(255,255,255,0.08)}
    .nav button{flex:1;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(0,0,0,0.4);font-size:9px;font-family:'Noto Sans KR',sans-serif}
    body.dark .nav button{color:rgba(255,255,255,0.35)}
    .nav button.active{color:#E31837}
    .nav button span.icon{font-size:18px}
    .card{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:14px;padding:12px 14px;cursor:pointer;margin-bottom:8px}
    body.dark .card{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.07)}
    .card.kia{background:rgba(227,24,55,0.08);border-color:rgba(227,24,55,0.25)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
    .cal-cell{min-height:68px;padding:3px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
    .cal-cell.sel{background:rgba(227,24,55,0.15)}
    .cal-cell.past{opacity:0.4}
    .cal-day{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin-top:2px;border:2px solid transparent}
    .cal-day.sel{color:#E31837;border-color:#E31837}
    .cal-day.today{background:rgba(0,0,0,0.12)}
    body.dark .cal-day.today{background:rgba(255,255,255,0.18)}
    .cal-day.sat{color:#4FC3F7}
    .cal-day.sun{color:#EF5350}
    .home-badge{font-size:7px;font-weight:800;color:#E31837;background:rgba(227,24,55,0.12);border-radius:3px;padding:0 3px;line-height:1.4}
    .inn-table{width:100%;border-collapse:collapse;font-size:12px;min-width:300px}
    .inn-table td{text-align:center;padding:6px 3px}
    .inn-table .team-cell{text-align:left;padding:8px 6px;font-size:11px;font-weight:700}
    .tag-kia{font-size:9px;background:#E31837;color:#fff;border-radius:4px;padding:1px 5px;font-weight:700}
    .tag-lu{font-size:9px;background:rgba(0,230,118,0.15);color:#00E676;border-radius:4px;padding:1px 5px;font-weight:700;border:1px solid rgba(0,230,118,0.3)}
  </style>
</head>

function renderDiamond(players, color, dark) {
  const bg = dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.03)';
  const stroke1 = dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  const stroke2 = dark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.2)';
  const baseFill1 = dark?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.5)';
  const baseFill2 = dark?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.7)';
  const pins = players.map(p => {
    const pos = PC[p.p]||PC.DH;
    const isP = p.p==='P';
    const bg2 = isP?`linear-gradient(135deg,${color},${color}bb)`:'rgba(12,18,32,0.93)';
    const border = isP?color:'rgba(255,255,255,0.18)';
    const shadow = isP?`0 0 10px ${color}55,0 2px 8px rgba(0,0,0,0.5)`:'0 2px 6px rgba(0,0,0,0.5)';
    const numColor = isP?'#fff':color;
    const numBg = isP?color+'cc':'transparent';
    const numPad = isP?'1px 3px':'0';
    return `<div style="position:absolute;left:${pos.x}%;top:${pos.y}%;transform:translate(-50%,-50%);z-index:2">
      <div style="background:${bg2};border:1.5px solid ${border};border-radius:8px;padding:3px 7px;display:flex;align-items:center;gap:4px;white-space:nowrap;box-shadow:${shadow}">
        <span style="font-size:9px;font-weight:900;color:${numColor};min-width:12px;text-align:center;background:${numBg};border-radius:3px;padding:${numPad}">${p.n}</span>
        <span style="font-size:11px;font-weight:700;color:#fff">${p.name}</span>
        <span style="font-size:9px;color:rgba(255,255,255,0.4)">${p.p}</span>
      </div>
    </div>`;
  }).join('');
  return `<div style="position:relative;width:100%;padding-bottom:88%">
    <svg viewBox="0 0 340 300" style="position:absolute;inset:0;width:100%;height:100%">
      <path d="M170 260 L30 90 Q170 -20 310 90 Z" fill="${bg}" stroke="${stroke1}" stroke-width="1"/>
      <polygon points="170,75 240,150 170,225 100,150" fill="${bg}" stroke="${stroke2}" stroke-width="1.5"/>
      <rect x="164" y="69" width="12" height="12" rx="2" fill="${baseFill1}" transform="rotate(45,170,75)"/>
      <rect x="234" y="144" width="12" height="12" rx="2" fill="${baseFill1}" transform="rotate(45,240,150)"/>
      <rect x="164" y="219" width="12" height="12" rx="2" fill="${baseFill2}" transform="rotate(45,170,225)"/>
      <rect x="94" y="144" width="12" height="12" rx="2" fill="${baseFill1}" transform="rotate(45,100,150)"/>
      <circle cx="170" cy="155" r="6" fill="rgba(180,120,60,0.4)" stroke="rgba(180,120,60,0.5)" stroke-width="1"/>
      <line x1="170" y1="225" x2="30" y2="90" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4"/>
      <line x1="170" y1="225" x2="310" y2="90" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4"/>
    </svg>
    ${pins}
  </div>`;
}

function renderCal(d) {
  const {yr,mo,sel}=state;

  const f=fdow(yr,mo), days=dim(yr,mo);
  const today='2026-03-27';
  const kmap={};
  SCH.forEach(g => {
    if(g.away!=='KIA'&&g.home!=='KIA') return;
    const [gy,gm,gd]=g.date.split('-').map(Number);

  const dayGs=SCH.filter(g=>g.date===sel);

  let cells='';
  for(let i=0;i<f;i++) cells+=`<div class="cal-cell"></div>`;

    const ds=`${yr}-${pad(mo)}-${pad(i)}`;

    const dow=(f+i-1)%7, isPast=new Date(ds)<new Date('2026-03-28');
    const isHome=kg&&kg.home==='KIA', oppKey=kg?(isHome?kg.away:kg.home):null;
    const dayColor=dow===5?'#4FC3F7':dow===6?'#EF5350':isSel?'#E31837':d.text;

    cells+=`<div class="cal-cell${isSel?' sel':''}${isPast?' past':''}" onclick="selDate('${ds}')">
      <div class="cal-day${isSel?' sel':''}${isToday?' today':''}${dow===5?' sat':dow===6?' sun':''}" style="color:${dayColor}">${i}</div>
      ${kg&&oppKey?`<div style="display:flex;flex-direction:column;align-items:center;gap:1px">
        <div style="height:11px;display:flex;align-items:center;justify-content:center">${isHome?`<div class="home-badge">홈</div>`:''}</div>

    </div>`;
  }
  let gameList='';
  if(new Date(sel)<new Date('2026-03-28')) {
    gameList=`<div style="text-align:center;padding:18px;color:${d.sub};font-size:12px;background:${d.bg};border-radius:12px;border:1px solid ${d.bgB}">⚾ 개막 전 · 3월 28일 (토) 개막</div>`;
  } else if(!selGs.length) {
    gameList=`<div style="text-align:center;padding:18px;color:${d.sub};font-size:12px;background:${d.bg};border-radius:12px;border:1px solid ${d.bgB}">😴 휴식일</div>`;
  } else {
    gameList=selGs.map((g,i)=>{
      const isKia=g.away==='KIA'||g.home==='KIA';
      const kiaHome=g.home==='KIA';
      const lKey=isKia&&kiaHome?g.home:g.away;
      const rKey=isKia&&kiaHome?g.away:g.home;
      const isLive=g.status==='LIVE', isFinal=g.status==='FINAL';
      const scoreHtml = (isLive||isFinal)?
        `<div style="font-size:18px;font-weight:900;color:${d.text}">${kiaHome?(g.homeScore??0):(g.awayScore??0)} <span style="font-size:12px;color:${d.sub}">:</span> ${kiaHome?(g.awayScore??0):(g.homeScore??0)}</div>`:
        `<div style="font-size:12px;font-weight:800;color:#FFB300">VS</div>`;
      return `<div class="card${isKia?' kia':''}" onclick="openModal(${i},'${sel}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:5px">
            ${isLive?`<span style="font-size:9px;background:#E31837;color:#fff;border-radius:4px;padding:1px 5px;font-weight:700;animation:fadeIn 0.5s infinite alternate">🔴 LIVE</span>`:
              isFinal?`<span style="font-size:9px;background:rgba(0,0,0,0.25);color:#fff;border-radius:4px;padding:1px 5px;font-weight:700">종료</span>`:
              `<span style="font-size:11px;font-weight:700;color:#FFB300">${g.time} 시작</span>`}
            ${isKia?`<span class="tag-kia">🐯 KIA</span>`:''}
            ${g.lineup?`<span class="tag-lu">라인업</span>`:''}
          </div>
          <span style="font-size:10px;color:${d.sub}">📍${g.stad} ›</span>

        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:7px;flex:1">
            ${logo(lKey,36)}
            <div>
              <div style="font-size:12px;font-weight:700;color:${lKey==='KIA'?'#ff6b6b':d.text}">${T[lKey]?.name||lKey}</div>
              <div style="font-size:9px;color:${d.sub}">${isKia&&kiaHome?'HOME':'AWAY'}</div>
            </div>
          </div>
          <div style="padding:0 8px;text-align:center">${scoreHtml}</div>
          <div style="display:flex;align-items:center;gap:7px;flex:1;flex-direction:row-reverse">

              <div style="font-size:12px;font-weight:700;color:${rKey==='KIA'?'#ff6b6b':d.text}">${T[rKey]?.name||rKey}</div>
              <div style="font-size:9px;color:${d.sub}">${isKia&&kiaHome?'AWAY':'HOME'}</div>

      </div>`;
    }).join('');
  }
  return `
    ${yr===2026&&mo===3?`<div style="background:linear-gradient(135deg,rgba(227,24,55,0.15),rgba(255,179,0,0.1));border:1px solid rgba(227,24,55,0.3);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">⚾</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:900;color:${d.text}">2026 KBO 개막까지 <span style="color:#E31837">D-2</span></div>
        <div style="font-size:11px;color:${d.sub}">3/28(토) · 인천 SSG랜더스필드 · 14:00</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:#FFB300;font-weight:700">KIA 원정개막</div>
        <div style="font-size:11px;color:${d.sub}">🐯 vs 🚀</div>

    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px">
      <button onclick="prevMo()" style="color:#E31837;font-size:22px;padding:4px 10px;line-height:1">‹</button>

    </div>
    ${gameList}`;
}

  const g=state.modalGame; if(!g) return;

  const hasLU=!!g.lineup;
  const lt=state.modalLt;

  const ct=lt==='away'?aw:hw;

  const lTeam=kiaHome?g.home:g.away, rTeam=kiaHome?g.away:g.home;
  const lLabel=kiaHome?'HOME':'AWAY', rLabel=kiaHome?'AWAY':'HOME';
  const lScore=kiaHome?(g.homeScore??0):(g.awayScore??0);
  const rScore=kiaHome?(g.awayScore??0):(g.homeScore??0);
  const memo=localStorage.getItem(`m_${g.date}_${g.away}_${g.home}`)||'';
  const isLive=g.status==='LIVE', isFinal=g.status==='FINAL';

  // 이닝 스코어 테이블
  const inningHtml = (!isSch&&g.awayInnings&&g.homeInnings&&g.awayInnings.some(x=>x>=0)) ? `
    <div style="overflow-x:auto">
      <table class="inn-table">
        <tr>
          <td class="team-cell" style="color:${lTeam==='KIA'?'#ff6b6b':d.text}">${T[lTeam]?.name||lTeam}</td>
          ${(lTeam===g.away?g.awayInnings:g.homeInnings).map((s,i)=>`<td style="color:${d.text}">${s>=0?s:'·'}</td>`).join('')}

        <tr>
          <td class="team-cell" style="color:${rTeam==='KIA'?'#ff6b6b':d.text}">${T[rTeam]?.name||rTeam}</td>
          ${(rTeam===g.away?g.awayInnings:g.homeInnings).map((s,i)=>`<td style="color:${d.text}">${s>=0?s:'·'}</td>`).join('')}
          <td style="font-weight:900;color:${d.text};border-left:1px solid ${d.bgB}">${rScore}</td>
        </tr>
      </table>
    </div>` : `<div style="text-align:center;padding:16px;color:${d.sub};font-size:12px">${isLive?`${g.inning||''}이닝 진행 중`:'경기 예정 · 경기 후 스코어가 표시됩니다'}</div>`;

  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;justify-content:center;padding:10px 0 2px">
      <div style="width:34px;height:4px;border-radius:2px;background:${d.muted}"></div>
    </div>
    <div style="padding:10px 18px 14px;border-bottom:1px solid ${d.bgB}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:6px">
          ${isLive?`<span style="font-size:10px;background:#E31837;color:#fff;border-radius:4px;padding:1px 6px;font-weight:700">🔴 LIVE</span>`:''}
          ${isFinal?`<span style="font-size:10px;background:rgba(0,0,0,0.25);color:#fff;border-radius:4px;padding:1px 6px;font-weight:700">경기종료</span>`:''}
          <span style="font-size:11px;font-weight:700;color:#FFB300">${g.time} · 📍${g.stad}</span>
        </div>
        <button onclick="closeModal()" style="background:${d.bg};color:${d.sub};border-radius:50%;width:28px;height:28px;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          ${logo(lTeam,48)}
          <div>
            <div style="font-size:13px;font-weight:800;color:${lTeam==='KIA'?'#ff6b6b':d.text}">${T[lTeam]?.name||lTeam}</div>
            <div style="font-size:10px;color:${d.sub}">${lLabel}</div>
          </div>
        </div>
        <div style="text-align:center;padding:0 8px">
          ${isSch?`<div style="font-size:18px;font-weight:800;color:#FFB300">VS</div>`:
          `<div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:28px;font-weight:900;color:${d.text}">${lScore}</span>
            <span style="color:${d.sub}">:</span>
            <span style="font-size:28px;font-weight:900;color:${d.text}">${rScore}</span>
          </div>`}
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex:1;flex-direction:row-reverse">
          ${logo(rTeam,48)}
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:800;color:${rTeam==='KIA'?'#ff6b6b':d.text}">${T[rTeam]?.name||rTeam}</div>
            <div style="font-size:10px;color:${d.sub}">${rLabel}</div>
          </div>
        </div>
      </div>
    </div>
    <div style="padding:18px">
      <div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
          <span style="font-size:15px">📊</span>
          <span style="font-size:13px;font-weight:800;color:${d.text}">이닝별 스코어</span>
        </div>
        <div style="background:${d.bg};border:1px solid ${d.bgB};border-radius:12px;padding:4px">${inningHtml}</div>
      </div>
      <div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:15px">🧢</span>
            <span style="font-size:13px;font-weight:800;color:${d.text}">선발 라인업</span>
          </div>
          ${hasLU?`<div style="display:flex;gap:4px">
            <button onclick="setModalLt('away')" style="padding:4px 10px;background:${lt==='away'?aw.color:d.bg};border:1px solid ${lt==='away'?aw.color:d.bgB};border-radius:8px;color:${lt==='away'?'#fff':d.text};font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif">${g.away}</button>
            <button onclick="setModalLt('home')" style="padding:4px 10px;background:${lt==='home'?hw.color:d.bg};border:1px solid ${lt==='home'?hw.color:d.bgB};border-radius:8px;color:${lt==='home'?'#fff':d.text};font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif">${g.home}</button>
          </div>`:''}
        </div>
        ${!hasLU?`<div style="background:${d.bg};border:1px solid ${d.bgB};border-radius:14px;padding:26px 20px;text-align:center">
          <div style="font-size:24px;margin-bottom:6px">📋</div>
          <div style="font-size:13px;color:${d.sub}">라인업은 경기 당일 발표됩니다</div>
        </div>`:
        `<div style="background:${d.bg};border:1px solid ${d.bgB};border-radius:14px;padding:12px 10px">
          <div style="text-align:center;margin-bottom:4px;font-size:12px;font-weight:700;color:${ct.color}">${ct.name}</div>
          ${renderDiamond(cur,ct.color,state.dark)}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:10px">
            ${cur.map(p=>`<div style="display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:7px;background:${d.bg};border:1px solid ${d.bgB}">
              <span style="font-size:10px;font-weight:900;min-width:17px;text-align:center;color:${p.p==='P'?'#fff':ct.color};background:${p.p==='P'?ct.color+'cc':'transparent'};border-radius:3px;padding:${p.p==='P'?'1px 3px':'0'}">${p.n}</span>
              <span style="font-size:12px;font-weight:700;color:${state.dark?'#fff':d.text};flex:1">${p.name}</span>
              <span style="font-size:10px;color:${d.sub}">${p.p}</span>
            </div>`).join('')}
          </div>
        </div>`}
      </div>
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:15px">📝</span>
            <span style="font-size:13px;font-weight:800;color:${d.text}">내 메모</span>
          </div>
          <span id="memo-saved" style="font-size:11px;color:#00C864;font-weight:700;display:none">저장됨 ✓</span>
        </div>
        <textarea id="memo-input" placeholder="이 경기에 대한 생각이나 메모를 남겨보세요 ✍️" style="width:100%;min-height:90px;padding:12px;background:${d.bg};border:1px solid ${d.bgB};border-radius:12px;color:${d.text};font-size:13px;line-height:1.6;resize:none">${memo}</textarea>
      </div>
    </div>`;
  document.getElementById('memo-input').addEventListener('input', e => {
    localStorage.setItem(`m_${g.date}_${g.away}_${g.home}`, e.target.value);
    const s=document.getElementById('memo-saved');
    s.style.display='inline'; clearTimeout(window._memoT);
    window._memoT=setTimeout(()=>s.style.display='none',1500);
  });
}

function setTab(t){state.tab=t;render();}
function setLcat(c){state.lcat=c;render();}
function toggleDark(){
  state.dark=!state.dark;
  document.body.classList.toggle('dark',state.dark);
  document.getElementById('theme-meta').setAttribute('content',state.dark?'#0A0E1A':'#E8ECF1');
  render(); if(state.modalGame) renderModal(D());
}
function prevMo(){if(state.mo===1){state.yr--;state.mo=12;}else state.mo--;render();}
function nextMo(){if(state.mo===12){state.yr++;state.mo=1;}else state.mo++;render();}
function selDate(ds){state.sel=ds;render();}

function openModal(idx,date) {
  const dayGs=SCH.filter(g=>g.date===date);
  const sorted=[...dayGs.filter(g=>g.away==='KIA'||g.home==='KIA'),...dayGs.filter(g=>g.away!=='KIA'&&g.home!=='KIA')];
  state.modalGame=sorted[idx]; state.modalLt='away';
  const overlay=document.getElementById('modal-overlay');
  const box=document.getElementById('modal-box');
  box.classList.remove('closing'); overlay.classList.add('open');
  renderModal(D()); history.pushState({modal:true},'');
  document.body.style.overflow='hidden';
  let ty=null;
  box.ontouchstart=e=>{ty=e.touches[0].clientY;};
  box.ontouchmove=e=>{if(ty!==null&&e.touches[0].clientY-ty>0)e.preventDefault();};
  box.ontouchend=e=>{if(ty!==null&&e.changedTouches[0].clientY-ty>60)closeModal();ty=null;};
}

function closeModal() {
  const box=document.getElementById('modal-box');
  box.classList.add('closing');
  setTimeout(()=>{
    document.getElementById('modal-overlay').classList.remove('open');
    box.classList.remove('closing'); state.modalGame=null;
    document.body.style.overflow='';
  },280);
}

function setModalLt(lt){state.modalLt=lt;renderModal(D());}

document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});
window.addEventListener('popstate',()=>{if(state.modalGame)closeModal();});

setInterval(()=>{state.clock=new Date();render();},1000);

render();
</script>
</body>
</html>
