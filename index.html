function initGameCache() {
  try {
    const cache = JSON.parse(localStorage.getItem('kbo_game_cache') || '{}');
    Object.entries(cache).forEach(([key, data]) => {
      const idx = SCH.findIndex(s => s.date+'_'+s.away+'_'+s.home === key);
      if (idx === -1) return;
      const dataToApply = {...data};
      if (dataToApply.lineup) {
        const checkBatters = (batters) => (batters||[]).some(b => b.starterPos);
        const hasStarterPos = checkBatters(dataToApply.lineup?.home?.batters) || checkBatters(dataToApply.lineup?.away?.batters);
        if (!hasStarterPos) delete dataToApply.lineup;
      }
      Object.assign(SCH[idx], dataToApply);
    });
  } catch(e) {}
}

function saveGameCache(key, data) {
  try {
    const cache = JSON.parse(localStorage.getItem('kbo_game_cache') || '{}');
    cache[key] = {...(cache[key]||{}), ...data};
    localStorage.setItem('kbo_game_cache', JSON.stringify(cache));
  } catch(e) {}
}

function normalizeApiTeam(code, name) {
  if (code === 'HT') return 'KIA';
  if (code === 'KT') return 'KT';
  if (code === 'LG') return 'LG';
  if (code === 'SK') return 'SSG';
  if (code === 'NC') return 'NC';
  if (/두산|Bears/i.test(name || '')) return '두산';
  if (/롯데|Giants/i.test(name || '')) return '롯데';
  if (/삼성|Lions/i.test(name || '')) return '삼성';
  if (/한화|Eagles/i.test(name || '')) return '한화';
  if (/키움|Heroes/i.test(name || '')) return '키움';
  if (/SSG|Landers/i.test(name || '')) return 'SSG';
  return name || code || '';
}

function parseBrowserBatters(batters) {
  if (!batters?.length) return [];
  const _subPos = new Set(['대주자','대타','주자','대주자/대타','대타/대주자']);
  const _isSub = p => _subPos.has(p.posName || p.position || '');
  const orderMap = {};
  batters.forEach(p => {
    const order = p.batOrder;
    if (!orderMap[order]) orderMap[order] = [];
    orderMap[order].push(p);
  });
  return Object.entries(orderMap)
    .sort(([a], [b]) => Number(a) - Number(b))
    .map(([order, players]) => {
      // 정렬: 대타/대주자 포지션 → 나중, seqno 오름차순, 타수 내림차순
      const sorted = [...players].sort((a, b) => {
        const aS = _isSub(a) ? 1 : 0;
        const bS = _isSub(b) ? 1 : 0;
        if (aS !== bS) return aS - bS;
        const sd = (+a.seqno||0) - (+b.seqno||0);
        if (sd !== 0) return sd;
        return (+b.ab||0) - (+a.ab||0);
      });
      const cur = sorted[sorted.length - 1];
      const starters = sorted.slice(0, -1);
      return {
        n: Number(order),
        order: Number(order),
        name: cur?.name || '',
        p: cur?.posName || '',
        pos: cur?.posName || '',
        chain: starters.length ? starters.map(s => ({
          name: s.name || '',
          hit: Number(s.hit||0),
          ab:  Number(s.ab||0),
          rbi: Number(s.rbi||0),
          bb:  Number(s.bb||s.walk||0),
          run: Number(s.run||s.r||0),
        })) : null,
        sub: starters.length ? (starters[0].name || null) : null,
        starterName: sorted[0]?.name || cur?.name || '',
        starterPos: sorted[0]?.posName || cur?.posName || '',
        subHit: starters.length ? Number(starters[0].hit||0) : 0,
        subAb:  starters.length ? Number(starters[0].ab||0)  : 0,
        subRbi: starters.length ? Number(starters[0].rbi||0) : 0,
        subBb:  starters.length ? Number(starters[0].bb||starters[0].walk||0) : 0,
        subRun: starters.length ? Number(starters[0].run||starters[0].r||0) : 0,
        curHit: Number(cur?.hit||0),
        curAb:  Number(cur?.ab||0),
        curRbi: Number(cur?.rbi||0),
        curBb:  Number(cur?.bb||cur?.walk||0),
        curRun: Number(cur?.run||cur?.r||0),
        hit: Number(cur?.hit||0),
        ab:  Number(cur?.ab||0),
        rbi: Number(cur?.rbi||0),
        bb:  Number(cur?.bb||cur?.walk||0),
        run: Number(cur?.run||cur?.r||0),
      };
    });
}

function parseBrowserPitchers(pitchers) {
  return (pitchers || []).map(p => ({
    seqno: p.seqno,
    name: p.name,
    inn: p.inn || '0',
    er: p.er || 0,
    kk: p.kk || 0,
    bb: p.bb || 0,
    hit: Number(p.hit||p.ha||p.allowedHit||0),
    pc: Number(p.pc||p.ballCount||p.pitchCount||p.numPitch||p.pitches||p.np||p.numberOfPitches||p.pitchThrown||p.totalPitches||0),
    sp: Number(p.sp||p.strikeCount||p.strikes||p.numStrike||p.numberOfStrikes||0),
  }));
}

function buildBrowserLineup(detail) {
  if (!detail) return null;

  // 네이버 lineup API가 반환할 수 있는 다양한 구조 시도
  const td = detail.textRelayData || detail;

  // 구조 1: homeLineup / awayLineup
  let home = td.homeLineup || detail.homeLineup;
  let away = td.awayLineup || detail.awayLineup;

  // 구조 2: homeTeamLineup / awayTeamLineup
  if (!home) home = td.homeTeamLineup || detail.homeTeamLineup;
  if (!away) away = td.awayTeamLineup || detail.awayTeamLineup;

  // 구조 3: lineup.home / lineup.away
  if (!home && detail.lineup) home = detail.lineup.home;
  if (!away && detail.lineup) away = detail.lineup.away;

  // 구조 4: batters/pitchers가 최상위에 home/away 구분 없이 있는 경우
  // homeBatters / awayBatters
  if (!home && (detail.homeBatters || detail.homePitchers)) {
    home = { batter: detail.homeBatters, pitcher: detail.homePitchers };
  }
  if (!away && (detail.awayBatters || detail.awayPitchers)) {
    away = { batter: detail.awayBatters, pitcher: detail.awayPitchers };
  }

  // 구조 5: batters 배열이 직접 있는 경우 (side 필드로 구분)
  if (!home && !away && Array.isArray(detail.batters)) {
    const hb = detail.batters.filter(p => p.side === 'home' || p.teamCode === detail.homeTeamCode);
    const ab = detail.batters.filter(p => p.side === 'away' || p.teamCode === detail.awayTeamCode);
    if (hb.length) home = { batter: hb };
    if (ab.length) away = { batter: ab };
  }

  if (!home && !away) return null;

  return {
    home: {
      batters: parseBrowserBatters(home?.batter || home?.batters),
      pitchers: parseBrowserPitchers(home?.pitcher || home?.pitchers),
    },
    away: {
      batters: parseBrowserBatters(away?.batter || away?.batters),
      pitchers: parseBrowserPitchers(away?.pitcher || away?.pitchers),
    },
  };
}

function parseInningNumber(statusInfo) {
  const match = String(statusInfo || '').match(/(\d+)/);
  return match ? Number(match[1]) : null;
}

async function fetchBrowserGameDetail(gameId, inning) {
  if (!gameId) return null;
  const inn = Math.max(1, inning || 1);
  try {
    // 서버 프록시 경유 (CORS 방지)
    const r = await fetch(`/api/kboScores?gameId=${encodeURIComponent(gameId)}&inning=${inn}&action=lineup`);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) {
    return null;
  }
}

function convertBrowserGame(game, detail) {
  const gameData = detail?.game || game;
  const away = normalizeApiTeam(game.awayTeamCode, game.awayTeamName);
  const home = normalizeApiTeam(game.homeTeamCode, game.homeTeamName);
  const statusCode = game.statusCode || '';
  const statusInfo = game.statusInfo || '';
  const isCanceled = /^(CANCEL|PPD|RAINOUT|POSTPONE|SUSPENDED|DELAY|CANCELED|CANCELLED)$/i.test(statusCode)
    || /CANCEL|PPD|취소|우천|연기|POSTPONE|SUSPEND/i.test(statusCode)
    || /취소|우천|연기|PPD|CANCEL/i.test(statusInfo);
  if(statusCode && !['BEFORE','STARTED','RESULT'].includes(statusCode)) {
    console.log(`[KBO browser] statusCode: "${statusCode}" | statusInfo: "${statusInfo}" | isCanceled: ${isCanceled}`);
  }
  const status = isCanceled ? 'CANCELED'
    : statusCode === 'BEFORE' ? 'SCHEDULED'
    : statusCode === 'STARTED' ? 'LIVE'
    : statusCode === 'RESULT' ? 'FINAL'
    : 'SCHEDULED';
  const awayRaw = gameData.awayTeamScoreByInning || game.awayTeamScoreByInning || [];
  const homeRaw = gameData.homeTeamScoreByInning || game.homeTeamScoreByInning || [];
  const maxInn = Math.max(9, awayRaw.length, homeRaw.length);
  const awayInnings = Array(maxInn).fill(-1);
  const homeInnings = Array(maxInn).fill(-1);
  awayRaw.forEach((score, index) => {
    if (score !== '-') awayInnings[index] = Number(score);
  });
  homeRaw.forEach((score, index) => {
    if (score !== '-') homeInnings[index] = Number(score);
  });

  return {
    date: game.gameDate || '',
    time: game.gameDateTime?.split('T')[1]?.slice(0, 5) || '',
    away,
    home,
    stad: game.stadium || gameData.stadium || '',
    status,
    awayScore: game.awayTeamScore != null ? Number(game.awayTeamScore) : null,
    homeScore: game.homeTeamScore != null ? Number(game.homeTeamScore) : null,
    awayInnings,
    homeInnings,
    inning: parseInningNumber(game.statusInfo),
    inningInfo: game.statusInfo || null,
    winPitcher: gameData.winPitcherName || game.winPitcherName || null,
    losePitcher: gameData.losePitcherName || game.losePitcherName || null,
    awayStarter: game.awayStarterName || game.awayStarter || gameData.awayStarterName || gameData.awayStarter || null,
    homeStarter: game.homeStarterName || game.homeStarter || gameData.homeStarterName || gameData.homeStarter || null,
    awayPitcher: gameData.awayCurrentPitcherName || game.awayCurrentPitcherName
      || gameData.awayPitcherName || game.awayPitcherName
      || detail?.textRelayData?.awayCurrentPitcherName || null,
    homePitcher: gameData.homeCurrentPitcherName || game.homeCurrentPitcherName
      || gameData.homePitcherName || game.homePitcherName
      || detail?.textRelayData?.homeCurrentPitcherName || null,
    awayHit: Number(gameData.awayTeamHit ?? game.awayTeamHit ?? gameData.awayHit ?? game.awayHit ?? 0),
    homeHit: Number(gameData.homeTeamHit ?? game.homeTeamHit ?? gameData.homeHit ?? game.homeHit ?? 0),
    awayError: Number(gameData.awayTeamError ?? game.awayTeamError ?? gameData.awayError ?? game.awayError ?? 0),
    homeError: Number(gameData.homeTeamError ?? game.homeTeamError ?? gameData.homeError ?? game.homeError ?? 0),
    awayBallFour: Number(gameData.awayTeamBallFour ?? game.awayTeamBallFour ?? gameData.awayBallFour ?? game.awayBallFour ?? 0),
    homeBallFour: Number(gameData.homeTeamBallFour ?? game.homeTeamBallFour ?? gameData.homeBallFour ?? game.homeBallFour ?? 0),
    lineup: buildBrowserLineup(detail),
    currentGameState: detail?.textRelayData?.currentGameState || detail?.currentGameState || null,
    broadChannel: game.broadChannel || null,
    gameId: String(game.gameId || ''),
  };
}

async function fetchScoresDirectByDate(targetDate='') {
  const now = new Date();
  const kst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  const yyyy = kst.getFullYear();
  const mm = String(kst.getMonth() + 1).padStart(2, '0');
  const dd = String(kst.getDate()).padStart(2, '0');
  const todayDash = targetDate || `${yyyy}-${mm}-${dd}`;
  const url = `https://api-gw.sports.naver.com/schedule/games?fields=basic%2Cschedule%2Cbaseball%2CmanualRelayUrl&upperCategoryId=kbaseball&fromDate=${todayDash}&toDate=${todayDash}&size=500`;
  const r = await fetch(url, { headers: { Accept: 'application/json' } });
  if (!r.ok) throw new Error(`direct schedule ${r.status}`);
  const data = await r.json();
  const rawGames = (data?.result?.games || []).filter(g => g.categoryId === 'kbo');
  const detailMap = {};

  await Promise.all(rawGames.map(async game => {
    const shouldFetchDetail = game.statusCode === 'BEFORE' || game.statusCode === 'STARTED' || game.statusCode === 'RESULT';
    if (!shouldFetchDetail) return;
    const inning = game.statusCode === 'STARTED' ? (parseInningNumber(game.statusInfo) || 1) : 1;
    const detail = await fetchBrowserGameDetail(game.gameId, inning);
    if (detail) detailMap[game.gameId] = detail;
  }));

  return {
    games: rawGames.map(game => convertBrowserGame(game, detailMap[game.gameId] || null)),
  };
}

async function fetchScoresPayload(targetDate='') {
  const candidates = [];
  if (window.KBO_SCORES_API_URL) candidates.push(window.KBO_SCORES_API_URL);
  if (location.protocol !== 'file:') candidates.push(`/api/kboScores${targetDate ? `?date=${targetDate}` : ''}`);

  for (const url of candidates) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      return await r.json();
    } catch(e) {}
  }

  return await fetchScoresDirectByDate(targetDate);
}

async function fetchTodayScores(targetDate='') {
  try {
    const data = await fetchScoresPayload(targetDate);
    const games = data?.games || [];
    if (!games.length) return;

    let updated = false;
    // 디버그: 첫 게임의 전체 필드 확인
    if (games.length > 0) console.log('[DEBUG] API game sample:', JSON.stringify(games[0]));
    games.forEach(g => {
      const idx = SCH.findIndex(s => s.date===g.date && s.away===g.away && s.home===g.home);
      if (idx === -1) return;
      const upd = {};
      if (g.status) upd.status = g.status;
      // API에서 받아온 실시간 시간을 SCH에 덮어쓰기 (시간 변경 대응)
      if (g.time) upd.time = g.time;
      if (g.awayScore != null) upd.awayScore = g.awayScore;
      if (g.homeScore != null) upd.homeScore = g.homeScore;
      if (g.awayInnings?.some(x=>x>=0)) upd.awayInnings = g.awayInnings;
      if (g.homeInnings?.some(x=>x>=0)) upd.homeInnings = g.homeInnings;
      if (g.inning) upd.inning = g.inning;
      if (g.inningInfo) upd.inningInfo = g.inningInfo;
      if (g.winPitcher) upd.winPitcher = g.winPitcher;
      if (g.losePitcher) upd.losePitcher = g.losePitcher;
      if (g.awayStarter) upd.awayStarter = g.awayStarter;
      if (g.homeStarter) upd.homeStarter = g.homeStarter;
      if (g.awayPitcher) upd.awayPitcher = g.awayPitcher;
      if (g.homePitcher) upd.homePitcher = g.homePitcher;
      if (g.awayHit != null) upd.awayHit = g.awayHit;
      if (g.homeHit != null) upd.homeHit = g.homeHit;
      if (g.awayError != null) upd.awayError = g.awayError;
      if (g.homeError != null) upd.homeError = g.homeError;
      if (g.awayBallFour != null) upd.awayBallFour = g.awayBallFour;
      if (g.homeBallFour != null) upd.homeBallFour = g.homeBallFour;
      if (g.lineup) upd.lineup = g.lineup;
      if (g.currentGameState) {
        // 기존 currentGameState에 이름이 이미 있으면 보존 (숫자 ID로 덮어쓰기 방지)
        const prevGs = SCH[idx].currentGameState;
        const newGs = g.currentGameState;
        const mergedGs = { ...newGs };
        // pitcherName: 새 값이 숫자(ID)이거나 없으면 기존 이름 유지
        const newPitcher = newGs.pitcherName || newGs.currentPitcherName || '';
        const prevPitcher = prevGs?.pitcherName || prevGs?.currentPitcherName || '';
        if ((!newPitcher || /^\d+$/.test(String(newPitcher))) && prevPitcher && !/^\d+$/.test(String(prevPitcher))) {
          mergedGs.pitcherName = prevPitcher;
        }
        // batterName: 새 값이 숫자(ID)이거나 없으면 기존 이름 유지
        const newBatter = newGs.batterName || newGs.currentBatterName || '';
        const prevBatter = prevGs?.batterName || prevGs?.currentBatterName || '';
        if ((!newBatter || /^\d+$/.test(String(newBatter))) && prevBatter && !/^\d+$/.test(String(prevBatter))) {
          mergedGs.batterName = prevBatter;
        }
        // 베이스 주자 이름 보존
        if (!mergedGs.base1Name && prevGs?.base1Name) mergedGs.base1Name = prevGs.base1Name;
        if (!mergedGs.base2Name && prevGs?.base2Name) mergedGs.base2Name = prevGs.base2Name;
        if (!mergedGs.base3Name && prevGs?.base3Name) mergedGs.base3Name = prevGs.base3Name;
        upd.currentGameState = mergedGs;
      }
      if (g.gameId) upd.gameId = g.gameId;
      if (g.broadChannel) upd.broadChannel = g.broadChannel;
      // currentGameState의 pitcherName으로 awayPitcher/homePitcher 보완
      // (API가 awayCurrentPitcherName/homeCurrentPitcherName을 안 주는 경우 대비)
      if (!upd.awayPitcher && !upd.homePitcher && upd.currentGameState?.pitcherName) {
        const cPName = upd.currentGameState.pitcherName;
        const cInfo  = upd.currentGameState._inningInfo || g.inningInfo || '';
        if (cInfo.includes('말')) upd.awayPitcher = cPName;
        else upd.homePitcher = cPName;
      }
      Object.assign(SCH[idx], upd);
      // FINAL이거나 시간이 변경된 경우 localStorage에 영구 저장
      if (g.status === 'FINAL' || (g.time && g.time !== SCH[idx]._origTime)) {
        const cacheData = {};
        if (g.status === 'FINAL') Object.assign(cacheData, upd);
        else if (g.time) cacheData.time = g.time; // 시간 변경만 저장
        if (Object.keys(cacheData).length) saveGameCache(g.date+'_'+g.away+'_'+g.home, cacheData);
      }
      updated = true;
    });

    if (updated) {
      render();
      if (state.modalGame) {
        const mg = SCH.find(s => s.date===state.modalGame.date && s.away===state.modalGame.away && s.home===state.modalGame.home);
        if (mg) { state.modalGame = mg; renderModal(D()); }
      }
    }
  } catch(e) {
    console.log('스코어 갱신 실패:', e.message);
  }
}

async function fetchRelayData(gameId, inn) {
  if (!gameId) return null;
  const inning = Math.max(1, inn || 1);

  try {
    // Vercel 서버사이드 프록시를 통해 호출 (CORS 우회)
    const url = `/api/kboScores?gameId=${encodeURIComponent(gameId)}&inning=${inning}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`proxy ${r.status}`);
    const data = await r.json();
    // kboScores.js는 gameId 있을 때 단일 게임 객체를 바로 반환
    return data || null;
  } catch(e) {
    console.error("[Relay] fetchRelayData error:", e);
    return null;
  }
}

function renderRelayText(relays, away, home) {
  const dark = state.dark;
  console.log(`Rendering ${relays?.length} relay items`);
  if (!relays?.length) return `<div style="text-align:center;padding:30px;color:${dark?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.35)'};font-size:13px">중계 데이터 없음</div>`;
  const awayColor = (T[away]||{}).color||'#888';
  const homeColor = (T[home]||{}).color||'#888';

  return relays.map((item, idx) => {
    const title = item.title || item.text || item.description || '';
    if (!title) return '';

    // typeKey: item.type 또는 textOptions[0].type
    const opts = item.textOptions || [];
    const typeKey = item.type ?? (opts.length > 0 ? opts[0]?.type : null);
    // resultText: textOptions 전체에서 결과 텍스트 수집
    const resultText = item.resultText || '';
    // textOptions 전체 텍스트 합산 (더 풍부한 결과 포함)
    const optsAllText = opts.map(o => o.text || o.title || '').join(' ');
    // 배지 판단에 쓸 전체 텍스트
    const fullText = title + ' ' + resultText + ' ' + optsAllText;
    // 스코어: textOptions 마지막 항목 또는 item 자체
    const last = opts.length > 0 ? opts[opts.length-1] : item;
    const gs2 = last?.currentGameState || item.currentGameState;
    const awayS = gs2?.awayScore ?? '';
    const homeS = gs2?.homeScore ?? '';

    // 이닝 구분선 (타입 0 또는 '이닝' 포함)
    const isInningHeader = typeKey === 0 || (typeof typeKey === 'string' && typeKey === 'INNING')
      || (title.match(/^\d+회(초|말)/) && !title.includes('번타자') && !title.includes('|'));
    if (isInningHeader) {
      return `<div style="text-align:center;padding:10px 16px;font-size:12px;font-weight:700;color:${dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)'};background:${dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.03)'};border-bottom:1px solid ${dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'}">⚾ ${title}</div>`;
    }

    // 배지: 제목 키워드로 분류 (typeKey와 무관하게 항상 동작)
    let badge = '', bdColor = '#555', bdBg = 'rgba(0,0,0,0.07)';

    if (fullText.includes('홈런')) {
      badge='홈런 🔴'; bdColor='#E31837'; bdBg='rgba(227,24,55,0.12)';
    } else if (fullText.match(/3루타/)) {

      </span>` : '';

    return `<div style="padding:11px 16px;border-bottom:1px solid ${dark?'rgba(255,255,255,0.055)':'rgba(0,0,0,0.055)'};display:flex;align-items:flex-start;gap:10px">

      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:${dark?'#fff':'#0A0E1A'};line-height:1.5">${title}${(()=>{
          const pitchOpts = opts.filter(o => o.type === 1 && o.stuff && o.stuff !== '');
          const pitchOpt = pitchOpts.length > 0 ? pitchOpts[pitchOpts.length - 1] : null;
          if (!pitchOpt) return '';
          const stuff = pitchOpt.stuff || '';
          const speed = pitchOpt.speed ? pitchOpt.speed + 'km' : '';
          const pitchNum = pitchOpt.pitchNum ? pitchOpt.pitchNum + '구 ' : '';
          if (!stuff) return '';
          const stuffColor = stuff==='직구'||stuff==='투심'?'#E31837': stuff==='슬라이더'||stuff==='커터'?'#0078ff': stuff==='커브'||stuff==='너클커브'?'#9C27B0': stuff==='포크'||stuff==='체인지업'?'#FF6600': '#555';
          return ` <span style="font-size:11px;font-weight:700;color:${stuffColor};background:${stuffColor}18;border:1px solid ${stuffColor}44;border-radius:4px;padding:1px 5px;margin-left:4px">${pitchNum}${stuff}${speed?' '+speed:''}</span>`;
        })()}</div>
        ${scoreDisp?`<div style="margin-top:3px">${scoreDisp}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function updateRelayUI() {
  // 안타/홈런 알림 감지 (중계창 열려있을 때)
  if (typeof _checkKiaHitNotify === 'function' && _relayData) {
    _checkKiaHitNotify(_relayData, _relayAway, _relayHome);
  }
  const dark = state.dark;
  const game = _relayData || {};
  // currentGameState: 직접 필드 → textRelays 첫 항목(역순이므로 최신) 순으로 탐색
  let gs = game.currentGameState || null;
  if (!gs && game.textRelays?.length) {
    for (const relay of game.textRelays) {
      if (relay.currentGameState) { gs = relay.currentGameState; break; }
      const opts = relay.textOptions || [];
      for (let oi = opts.length - 1; oi >= 0; oi--) {
        if (opts[oi]?.currentGameState) { gs = opts[oi].currentGameState; break; }
      }
      if (gs) break;
    }
  }
  // gs 있으면 pitcherName/batterName 보강 (textRelays 첫 항목에서)
  const _isNumericId = v => v && /^\d+$/.test(String(v));
  if (gs && game.textRelays?.length) {
    for (const relay of game.textRelays) {
      const opts = relay.textOptions || [];
      for (let oi = opts.length - 1; oi >= 0; oi--) {
        const cgs = opts[oi]?.currentGameState;
        if (cgs) {
          // 숫자 ID가 아닌 경우에만 보강
          if ((!gs.pitcherName || _isNumericId(gs.pitcherName)) && cgs.pitcherName && !_isNumericId(cgs.pitcherName)) gs.pitcherName = cgs.pitcherName;
          if ((!gs.batterName  || _isNumericId(gs.batterName))  && cgs.batterName  && !_isNumericId(cgs.batterName))  gs.batterName  = cgs.batterName;
          if (!gs.currentPitcherName && cgs.currentPitcherName && !_isNumericId(cgs.currentPitcherName)) gs.currentPitcherName = cgs.currentPitcherName;
          if (!gs.currentBatterName  && cgs.currentBatterName  && !_isNumericId(cgs.currentBatterName))  gs.currentBatterName  = cgs.currentBatterName;
          break;
        }
      }
      if ((gs.pitcherName && !_isNumericId(gs.pitcherName)) || (gs.batterName && !_isNumericId(gs.batterName))) break;
    }
  }

  // gs에 inningInfo 주입 (renderRelayDiamond에서 수비팀 판별용)
  // currentGameState 안의 다양한 필드 + game.inningInfo 모두 확인
  const inningInfoStr = game.inningInfo
    || gs?.inningDisplay || gs?.inningText || gs?.inningInfo
    || (gs?.inning ? (gs.inning + '회' + (gs.half==='B'||gs.half==='말'?'말':'초')) : '')
    || '';
  if (gs) {
    gs._inningInfo = inningInfoStr;
    if (!gs.half) gs.half = inningInfoStr.includes('말') ? 'B' : 'T';

    // 투수/타자 이름 주입
    // gs에서 직접 또는 lineup에서 현재 투수 추출
    const schGame2 = SCH.find(s => String(s.gameId) === String(_relayGameId));
    const isBottomHalf = inningInfoStr.includes('말') || gs.half === 'B';

    // 투수: 수비팀 현재 투수
    if (!gs._pitcherName) {
      const isNumeric = v => /^\d+$/.test(String(v||''));
      // 1) currentGameState에서 직접 이름 필드 확인
      const rawP = [gs.pitcherName, gs.currentPitcherName, gs.pitcher].find(v => v && !isNumeric(v)) || '';
      // 2) lineup에서 현재 투수 추출 (seqno 마지막 = 현재 등판 투수)
      const relayLu2 = schGame2?.lineup;
      const defPitchers2 = isBottomHalf
        ? (relayLu2?.away?.pitchers || [])
        : (relayLu2?.home?.pitchers || []);
      const lineupP = defPitchers2.length ? defPitchers2[defPitchers2.length - 1]?.name || '' : '';
      // 3) SCH에서 현재 투수 (awayPitcher/homePitcher)
      const schP = isBottomHalf
        ? (schGame2?.awayPitcher || schGame2?.awayStarter || '')
        : (schGame2?.homePitcher || schGame2?.homeStarter || '');
      gs._pitcherName = rawP || lineupP || schP;
    }

    // 타자: 공격팀 현재 타자
    if (!gs._batterName) {
      const isNumeric2 = v => /^\d+$/.test(String(v||''));
      // 1) currentGameState에서 직접 이름 필드 (kboScores에서 이미 pcode 변환 완료)
      const rawB = [gs.batterName, gs.currentBatterName].find(v => v && !isNumeric2(v)) || '';
      let batterFromLineup = '';
      if (!rawB && gs.batter) {
        const relayLu3 = schGame2?.lineup;
        // 2) relay 데이터의 pcodeMap 사용 (서버가 반환한 것)
        const relayPcMap = (_relayData?.pcodeMap) || {};
        const batterId = String(gs.batter);
        if (relayPcMap[batterId]) {
          batterFromLineup = relayPcMap[batterId];
        } else {
          // 3) SCH lineup의 모든 선수에서 pcode 매핑 구성
          const schPcMap = {};
          const allLuP = [
            ...(relayLu3?.home?.batters||[]), ...(relayLu3?.home?.pitchers||[]),
            ...(relayLu3?.away?.batters||[]), ...(relayLu3?.away?.pitchers||[]),
          ];
          // parseBrowserBatters는 pcode를 저장하지 않으므로, 이름 기반 순서 매핑 시도
          const atkBatters3 = isBottomHalf
            ? (relayLu3?.home?.batters || [])
            : (relayLu3?.away?.batters || []);
          // 4) gs.batter가 배팅 순서(1~9)에 해당하면 해당 선수 이름 사용
          const bOrder = Number(gs.batter);
          if (bOrder >= 1 && bOrder <= 9) {
            const bPlayer = atkBatters3.find(p => p.order === bOrder || p.n === bOrder);
            if (bPlayer?.name) batterFromLineup = bPlayer.name;
          }
        }
      }
      gs._batterName = rawB || batterFromLineup;
    }
  }

  // 헤더 업데이트
  const title = document.getElementById('relay-title');
  const sub = document.getElementById('relay-sub');
  const _kiaIsHome = _relayHome === 'KIA';
  const _titleLeft = _kiaIsHome ? _relayHome : _relayAway;
  const _titleRight = _kiaIsHome ? _relayAway : _relayHome;
  if (title) title.textContent = `${_titleLeft} vs ${_titleRight}`;
  if (sub) sub.textContent = inningInfoStr;

  // 다이아몬드 업데이트
  const diamondEl = document.getElementById('relay-diamond');
  const schGame = SCH.find(s => String(s.gameId) === String(_relayGameId));
  // lineup 우선순위: SCH > _relayData 직접 파싱
  let relayLineup = schGame?.lineup || null;
  if (!relayLineup && _relayData) {
    const td2 = _relayData.textRelayData || _relayData;
    const hL = td2.homeLineup || _relayData.homeLineup;
    const aL = td2.awayLineup || _relayData.awayLineup;
    if (hL || aL) {
      relayLineup = {
        home: { batters: _parseBatters(hL), pitchers: _parsePitchers(hL) },
        away: { batters: _parseBatters(aL), pitchers: _parsePitchers(aL) },
      };
    }
  }
  if (diamondEl) {
    diamondEl.innerHTML = renderRelayDiamond(gs, relayLineup, _relayAway, _relayHome);
    diamondEl.style.background = dark ? '#111827' : '#f8f8f8';
  }

  // 이닝 탭 업데이트 (최소 9회까지 보장)
  const tabs = document.getElementById('relay-inn-tabs');
  if (tabs) {
    tabs.style.borderColor = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
    let maxInn = 9;
    if (game.inning && parseInt(game.inning) > 9) maxInn = parseInt(game.inning);

    // 득점 탭 (맨 앞)
    const scoreSel = _relayTab === 'score';
    let tabHtml = `<button onclick="switchRelayTab('score')" style="flex-shrink:0;padding:5px 12px;background:${scoreSel?'#E31837':'transparent'};color:${scoreSel?'#fff':dark?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.4)'};border:${scoreSel?'none':dark?'1px solid rgba(255,255,255,0.12)':'1px solid rgba(0,0,0,0.12)'};border-radius:20px;font-size:12px;font-weight:${scoreSel?700:400};cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:6px">🏃 득점</button>`;

    // 구분선
    tabHtml += `<span style="flex-shrink:0;width:1px;height:20px;background:${dark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.1)'};margin:0 2px;align-self:center"></span>`;

    for (let i = 1; i <= maxInn; i++) {
      const sel = _relayTab === 'inn' && i === _relayInn;
      tabHtml += `<button onclick="switchRelayInn(${i})" style="flex-shrink:0;padding:5px 12px;background:${sel?'#E31837':'transparent'};color:${sel?'#fff':dark?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.4)'};border:${sel?'none':dark?'1px solid rgba(255,255,255,0.12)':'1px solid rgba(0,0,0,0.12)'};border-radius:20px;font-size:12px;font-weight:${sel?700:400};cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:6px">${i}회</button>`;
    }
    tabs.innerHTML = tabHtml;
  }

  // 중계 텍스트 업데이트
  const body = document.getElementById('relay-body');
  if (body) {
    if (_relayTab === 'score') {
      // 득점 탭: 캐시 있으면 바로 표시, 없으면 로딩 표시 (fetchAllScoringPlays가 채워줌)
      if (_scoringCache && _scoringCache.gameId === _relayGameId) {
        body.innerHTML = renderScoringPlays(_scoringCache.plays, dark);
      } else {
        body.innerHTML = '<div style="text-align:center;padding:40px"><div style="font-size:28px;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block">⚾</div><div style="font-size:13px;color:rgba(0,0,0,0.35);margin-top:8px">전 이닝 득점 장면 불러오는 중...</div></div>';
      }
    } else if (!_relayData) {
      body.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(0,0,0,0.35)">⏳ 불러오는 중...</div>';
    } else {
      const relays = [...(game.textRelays || [])].reverse();
      if (relays.length === 0) {
        body.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(0,0,0,0.35)">해당 이닝에 중계 데이터가 없습니다.</div>';
      } else {
        body.innerHTML = renderRelayText(relays, _relayAway, _relayHome);
      }
    }
  }

  // 다크모드 클래스만 토글 (CSS에서 글라스 스타일 적용)
  const box = document.getElementById('relay-box');
  if (box) {
    box.classList.toggle('dark-relay', dark);
    box.style.background = '';
    box.style.color = '';
  }
}

// 득점 장면 렌더링
function renderScoringPlays(plays, dark) {
  const awayColor = (T[_relayAway]||{}).color||'#888';
  const homeColor = (T[_relayHome]||{}).color||'#888';
  const sub = dark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.4)';
  const border = dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';

  if (!plays || !plays.length) {
    return `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:36px;margin-bottom:12px">🤐</div>
      <div style="font-size:14px;font-weight:700;color:${dark?'#fff':'#0A0E1A'}">득점 장면이 없어요</div>
      <div style="font-size:12px;color:${sub};margin-top:6px">무득점 경기이거나 데이터가 없습니다</div>
    </div>`;
  }

  return plays.map(p => {
    const isHR = /홈런/.test(p.title);
    // 득점팀 색상
    const teamColor = p.scoringTeam === 'away' ? awayColor
                    : p.scoringTeam === 'home' ? homeColor
                    : (isHR ? '#E31837' : '#FF9500');
    const teamName  = p.scoringTeam === 'away' ? _relayAway
                    : p.scoringTeam === 'home' ? _relayHome : '';
    const badge = isHR ? '홈런 🔴' : '득점';

    // 이닝 + 팀 태그
    const tags = `
      ${p.inning ? `<span style="font-size:10px;color:${sub}">${p.inning}</span>` : ''}
      ${teamName ? `<span style="font-size:10px;font-weight:700;color:${teamColor};background:${teamColor}18;border:1px solid ${teamColor}44;border-radius:4px;padding:1px 6px">${teamName}</span>` : ''}
    `;

    // 스코어: 득점팀 숫자 크게
    const scoreDisp = (p.awayScore!==''&&p.homeScore!=='') ? `
      <div style="margin-top:4px;display:flex;align-items:baseline;gap:4px;font-size:11px">
        <span style="font-weight:${p.scoringTeam==='away'?900:400};font-size:${p.scoringTeam==='away'?'14px':'11px'};color:${awayColor}">${p.awayScore}</span>
        <span style="color:${sub}">:</span>
        <span style="font-weight:${p.scoringTeam==='home'?900:400};font-size:${p.scoringTeam==='home'?'14px':'11px'};color:${homeColor}">${p.homeScore}</span>
        <span style="color:${sub};margin-left:2px;font-size:10px">${_relayAway} vs ${_relayHome}</span>
      </div>` : '';

    return `<div style="padding:12px 16px;border-bottom:1px solid ${border};border-left:3px solid ${teamColor}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="font-size:10px;font-weight:700;color:${teamColor};background:${teamColor}15;border:1px solid ${teamColor}44;border-radius:5px;padding:2px 7px;white-space:nowrap">${badge}</span>
        ${tags}
      </div>
      <div style="font-size:13px;color:${dark?'#fff':'#0A0E1A'};line-height:1.5;font-weight:500">${p.title}</div>
      ${scoreDisp}
    </div>`;
  }).join('');
}

// 전 이닝 득점 장면 수집
async function fetchAllScoringPlays(gameId, maxInn) {
  const plays = [];
  const seen = new Set();
  let prevAwayScore = 0, prevHomeScore = 0;
  for (let i = 1; i <= maxInn; i++) {
    try {
      const data = await fetchRelayData(gameId, i);
      if (!data) continue;
      const relays = [...(data.textRelays || [])].reverse();
      relays.forEach(item => {
        const allItems = [item, ...(item.textOptions||[])];
        allItems.forEach(it => {
          const title = it.title || it.text || '';
          if (!title || title.startsWith('=')) return;
          const gs = it.currentGameState || item.currentGameState;
          const awayS = Number(gs?.awayScore ?? -1);
          const homeS = Number(gs?.homeScore ?? -1);
          const scored = (awayS > prevAwayScore) || (homeS > prevHomeScore);
          const isKeyword = /홈런|타점|득점|희생플라이|밀어내기|끝내기/.test(title);
          if (!scored && !isKeyword) return;
          const key = title.trim();
          if (seen.has(key)) return;
          seen.add(key);
          // 득점한 팀 판별 (스코어 업데이트 전에 비교)
          const scoringTeam = awayS > prevAwayScore ? 'away'
                            : homeS > prevHomeScore ? 'home' : null;
          if (awayS >= 0) prevAwayScore = awayS;
          if (homeS >= 0) prevHomeScore = homeS;
          plays.push({
            title, inning: i+'회',
            awayScore: awayS >= 0 ? awayS : '',
            homeScore: homeS >= 0 ? homeS : '',
            isHR: /홈런/.test(title),
            scoringTeam,
          });
        });
      });
      if (_relayTab === 'score') {
        const body = document.getElementById('relay-body');
        const pct = Math.round((i / maxInn) * 100);
        const _dark = state.dark;
        if (body) body.innerHTML = '<div style="text-align:center;padding:40px"><div style="font-size:28px;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block">⚾</div><div style="font-size:13px;color:'+(_dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.35)')+';margin-top:8px">'+i+'회 분석 중... ('+pct+'%)</div></div>';
      }
    } catch(e) {}
  }
  return plays;
}

window.switchRelayTab = async function(tab) {
  _relayTab = tab;
  updateRelayUI();
  if (tab === 'score') {
    // 캐시 없으면 fetch
    if (!_scoringCache || _scoringCache.gameId !== _relayGameId) {
      const schGame = SCH.find(s => String(s.gameId) === String(_relayGameId));
      // 최대 이닝 계산
      const infoStr = schGame?.inningInfo || '';
      const infoMatch = infoStr.match(/(\d+)회/);
      const maxInn = (infoMatch ? parseInt(infoMatch[1]) : null) || schGame?.inning || 9;
      const plays = await fetchAllScoringPlays(_relayGameId, Math.max(maxInn, 9));
      _scoringCache = { gameId: _relayGameId, plays };
      if (_relayTab === 'score') updateRelayUI(); // 완료 후 최종 렌더
    }
  }
};

      backBtn.innerHTML = '← 일정으로';
      const isDark = state.dark;
      backBtn.style.cssText = 'margin-bottom:12px;padding:6px 14px;background:' + (isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)') + ';border:1px solid ' + (isDark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.12)') + ';border-radius:8px;font-size:12px;font-weight:700;color:' + (isDark?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.5)') + ';cursor:pointer;font-family:"Noto Sans KR",sans-serif;display:inline-block;';
      backBtn.onclick = () => closeRelay();
      wrapper.appendChild(backBtn);
      if (box) {
        box.classList.remove('closing');
        if (state.dark) box.classList.add('dark-relay'); else box.classList.remove('dark-relay');
        box.style.cssText = 'width:100%;max-width:100%;height:auto;min-height:0;border-radius:20px;border:1px solid var(--glass-border);box-shadow:var(--nm-3);animation:fadeIn 0.2s ease;background:' + (state.dark?'rgba(14,19,30,0.96)':'rgba(245,247,252,0.97)') + ';';
        const relayBody = document.getElementById('relay-body');
        if (relayBody) relayBody.style.cssText = 'overflow-y:visible;max-height:none;flex:none;padding-bottom:0;';
        wrapper.appendChild(box);
      }
      calRelayArea.appendChild(wrapper);
    } else {
      if (panel) {
        if (panel.parentElement !== document.body) document.body.appendChild(panel);
        panel.classList.add('pc-inline'); panel.style.display = 'flex';
      }
      if (box) {
        box.classList.remove('closing');
        if (state.dark) box.classList.add('dark-relay'); else box.classList.remove('dark-relay');
      }
      const header = document.getElementById('relay-header');
      if (header && !document.getElementById('pc-relay-back-btn')) {
        const btn = document.createElement('button');
        btn.id = 'pc-relay-back-btn'; btn.innerHTML = '← 일정으로';
        btn.style.cssText = 'margin-bottom:8px;padding:5px 10px;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.12);border-radius:7px;font-size:12px;font-weight:700;color:rgba(0,0,0,0.5);cursor:pointer;font-family:"Noto Sans KR",sans-serif;display:block;';
        btn.onclick = () => closeRelay();
        header.insertBefore(btn, header.firstChild);
      }
    }  } else {
    // 모바일: 기존 바텀시트
    if (panel) { panel.classList.remove('pc-inline'); panel.style.display = 'flex'; }
    document.body.style.overflow = 'hidden';
    history.pushState({relay:true},'');
  }

  updateRelayUI();

  // 중계 데이터 fetch (lineup은 이미 SCH에 있으면 스킵)
  const needLineup = !schGame?.lineup;
  const [data, luData] = await Promise.all([
    fetchRelayData(gameId, _relayInn),
    needLineup ? fetchLineupDirect(gameId, _relayInn) : Promise.resolve(null),
  ]);

  if (data) {
    _relayData = data;
    // 중계 데이터에서 현재 투수 정보 SCH에 반영
    const _idx3 = SCH.findIndex(s => String(s.gameId) === String(gameId));
    if (_idx3 !== -1) {
      const _gs3 = data.currentGameState;
      if (_gs3?.pitcherName || _gs3?.currentPitcherName) {
        const _pName = _gs3.pitcherName || _gs3.currentPitcherName;
        const _infoS = data.inningInfo || '';
        if (_infoS.includes('말')) SCH[_idx3].awayPitcher = _pName;
        else SCH[_idx3].homePitcher = _pName;
      }
      // 득점 상황 추출하여 저장
      SCH[_idx3]._scoringPlays = extractScoringPlays(data);
    }
    // lineup fetch에서 얻은 pcodeMap을 relay 데이터에 병합 (타자 이름 변환용)
    if (luData?.pcodeMap) {
      _relayData = { ..._relayData, pcodeMap: { ...(_relayData.pcodeMap||{}), ...luData.pcodeMap } };
    }
  } else {
    const body = document.getElementById('relay-body');
    if (body) body.innerHTML = `<div style="text-align:center;padding:40px">
      <div style="font-size:32px;margin-bottom:12px">📡</div>
      <div style="font-size:13px;color:rgba(0,0,0,0.5);margin-bottom:16px">중계 데이터를 불러오지 못했어요</div>
      <button onclick="refreshRelay()" style="padding:8px 20px;background:#E31837;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer">🔄 다시 시도</button>
    </div>`;
  }
  if (luData) {
    const _idx3b = SCH.findIndex(s => String(s.gameId) === String(gameId));
    if (_idx3b !== -1) {
      if (luData.home || luData.away) SCH[_idx3b].lineup = luData;
      if (luData.currentGameState) {
        SCH[_idx3b].currentGameState = luData.currentGameState;
        // lineup fetch에서 얻은 currentGameState의 pitcherName으로 awayPitcher/homePitcher 보완
        const _luGs = luData.currentGameState;
        const _luPName = _luGs?.pitcherName || _luGs?.currentPitcherName || '';
        if (_luPName && !/^\d+$/.test(_luPName)) {
          const _luInfo = _luGs?._inningInfo || SCH[_idx3b].inningInfo || '';
          if (_luInfo.includes('말')) { if (!SCH[_idx3b].awayPitcher) SCH[_idx3b].awayPitcher = _luPName; }
          else { if (!SCH[_idx3b].homePitcher) SCH[_idx3b].homePitcher = _luPName; }
        }
      }
    }
  }
  if (data || luData) updateRelayUI();

  clearInterval(_relayInterval);
  if (schGame?.status === 'LIVE') {
    _relayInterval = setInterval(async () => {
      const d = await fetchRelayData(gameId, _relayInn);
      if (d) { _relayData = d; updateRelayUI(); }
    }, 20000);
  }

  // 헤더 + 다이아몬드 영역: 아래 스와이프로 닫기
  // relay-body: 스크롤만 허용
  const _swipeTargets = [
    document.getElementById('relay-header'),
    document.getElementById('relay-diamond'),
    document.getElementById('relay-inn-tabs'),
  ];

  let _rty = null, _isDragging = false;
  const panel2 = document.getElementById('relay-panel');
  const box2   = document.getElementById('relay-box');

  _swipeTargets.forEach(el => {
    if (!el) return;
    el.ontouchstart = e => {
      _rty = e.touches[0].clientY;
      _isDragging = false;
    };
    el.ontouchmove = e => {
      if (_rty === null) return;
      const dy = e.touches[0].clientY - _rty;
      if (dy > 8) {
        _isDragging = true;
        // 팝업을 손가락 따라 내리기
        if (box2) box2.style.transform = `translateY(${Math.max(0, dy)}px)`;
        e.preventDefault();
      }
    };
    el.ontouchend = e => {
      if (_rty === null) return;
      const dy = e.changedTouches[0].clientY - _rty;
      if (_isDragging && dy > 80) {
        // 충분히 내렸으면 닫기
        if (box2) box2.style.transform = '';
        closeRelay();
      } else {
        // 복원
        if (box2) { box2.style.transition = 'transform 0.25s ease'; box2.style.transform = ''; setTimeout(() => { if(box2) box2.style.transition = ''; }, 260); }
      }
      _rty = null; _isDragging = false;
    };
  });

  // relay-body는 스크롤만 허용
  const relayBody2 = document.getElementById('relay-body');
  if (relayBody2) {
    relayBody2.ontouchstart = e => e.stopPropagation();
    relayBody2.ontouchmove = e => e.stopPropagation();
  }
};

function _renderTicketTodos() {
  const el = document.getElementById('ticket-todo-list');

  const dark = document.body.classList.contains('dark');

  const todos = getTodos().filter(t => t.tag === _ticketTodoTag);

    el.innerHTML = `<div style="font-size:12px;color:${d.sub};padding:4px 0 6px">아직 메모가 없어요</div>`;

window.addTicketTodo = function() {
  const input = document.getElementById('ticket-todo-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const pad2 = n => String(n).padStart(2,'0');
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const date = now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(now.getDate());
  const todos = getTodos();
  todos.unshift({ id: Date.now().toString(), text, date, done: false, tag: _ticketTodoTag });
  saveTodos(todos);
  input.value = '';
  input.focus();
  _renderTicketTodos();
};

// 초기 render: 캐시 적용 후 즉시 실행, 스코어 fetch 완료 후 자동 재렌더링
// ── 기록 탭 사진 슬라이드 터치 핸들러 ──
// ── 기록 탭 사진 슬라이드 (show/hide 방식) ──
// 이미지 압축 (base64 → canvas 리사이즈)
function _compressImage(dataUrl, maxSize, quality, cb) {
  const img = new Image();
  img.onload = function() {
    let w = img.width, h = img.height;
    if(w > maxSize || h > maxSize) {
      if(w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
      else { w = Math.round(w * maxSize / h); h = maxSize; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

function _compressAll(files, cb) {
  const results = new Array(files.length);
  let done = 0;
  files.forEach(function(file, idx) {
    const reader = new FileReader();
    reader.onload = function(e) {
      _compressImage(e.target.result, 1200, 0.75, function(compressed) {
        results[idx] = compressed;
        done++;
        if(done === files.length) cb(results);
      });
    };
    reader.readAsDataURL(file);
  });
}

<script>
// ── Service Worker 등록 ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    // 기존 SW 전부 해제 + 캐시 전부 삭제 후 재등록 (구버전 캐시 강제 제거)
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) await reg.unregister();
    const keys = await caches.keys();
    for (const key of keys) await caches.delete(key);
    // 재등록
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

// ── 알림 권한 요청 (최초 1회) ──
async function requestNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

// ── SW에 로컬 알림 전송 ──
async function sendLocalNotify(title, body, tag) {
  // SW 경유 알림 (백그라운드에서도 동작)
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'LOCAL_NOTIFY', title, body, tag });
    return;
  }
  // 폴백: Notification API 직접
  if (Notification.permission === 'granted') {
    new Notification(title, { body, icon: '/icon-192.png', tag });
  }
}

// ── KIA 안타/홈런 감지 ──
// 이미 알림 보낸 relay 항목 추적 (중복 방지)
const _notifiedRelayKeys = new Set();

function _checkKiaHitNotify(relayData, away, home) {
  if (!relayData || Notification.permission !== 'granted') return;
  const isKiaGame = away === 'KIA' || home === 'KIA';
  if (!isKiaGame) return;
  const kiaIsHome = home === 'KIA';
  console.log('[알림체크] KIA홈?', kiaIsHome, '전체이닝정보:', relayData.inningInfo);

  const relays = relayData.textRelays || [];
  relays.forEach(item => {
    const allItems = [item, ...(item.textOptions || [])];
    allItems.forEach(it => {
      const title = it.title || it.text || '';
      if (!title) return;

      // 안타/홈런 키워드 먼저 체크 (불필요한 연산 방지)
      const isHR   = /홈런/.test(title);
      const isHit  = !isHR && /(1루타|안타|2루타|3루타)/.test(title);
      const isBB   = !isHR && !isHit && /(볼넷|사구|고의사구)/.test(title);
      if (!isHR && !isHit && !isBB) return;

      // KIA 공격 여부 판별
      // 우선순위: 1) gs._inningInfo 2) relayData.inningInfo 3) 타이틀에서 직접 추출
      const gs = it.currentGameState || item.currentGameState || {};
      const inningInfo = gs._inningInfo || gs.inningInfo
        || relayData.inningInfo || relayData.currentGameState?.inningInfo || '';
      
      let isKiaAttack = false;
      if (inningInfo.includes('말')) {
        // 말 = home 공격
        isKiaAttack = kiaIsHome;
      } else if (inningInfo.includes('초')) {
        // 초 = away 공격
        isKiaAttack = !kiaIsHome;
      } else {
        // inningInfo 없을 때: 타이틀에서 KIA 선수 이름 직접 확인은 불가능하므로
        // KIA 타자가 친 것인지 lineup 기반으로 추론
        const kiaGame = SCH.find(s => String(s.gameId) === String(_relayGameId));
        const kiaInfo = kiaGame?.inningInfo || '';
        if (kiaInfo.includes('말')) isKiaAttack = kiaIsHome;
        else if (kiaInfo.includes('초')) isKiaAttack = !kiaIsHome;
        else isKiaAttack = true; // 불확실하면 알림 (오탐 허용)
      }

      if (!isKiaAttack) return;

      // 중복 방지 키
      const key = title.trim().slice(0, 40);
      if (_notifiedRelayKeys.has(key)) return;
      _notifiedRelayKeys.add(key);

      // 알림 발송
      const emoji = isHR ? '💥🏠' : isBB ? '🎯' : '⚾';
      const notifyTitle = isHR ? `${emoji} 홈런!` : isBB ? `${emoji} 볼넷!` : `${emoji} 안타!`;
      console.log('[알림 발송]', notifyTitle, title);
      sendLocalNotify(notifyTitle, title, 'kia-hit-' + Date.now());
    });
  });
}

// fetchTodayScores 패치: LIVE 경기 릴레이 polling 중 안타/홈런 알림
// 30초 폴링마다 relay 데이터 확인
let _hitCheckInterval = null;
function _startHitCheck() {
  clearInterval(_hitCheckInterval);
  _hitCheckInterval = setInterval(async () => {
    if (Notification.permission !== 'granted') return;
    // 오늘 LIVE KIA 경기 찾기 (LIVE 아니어도 오늘 경기면 체크)
    const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
    const today = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    const liveGame = SCH.find(g => g.date === today && g.status === 'LIVE' && (g.away === 'KIA' || g.home === 'KIA'));
    if (!liveGame) {
      console.log('[알림] 오늘 LIVE KIA 경기 없음');
      return;
    }
    if (!liveGame.gameId) {
      console.log('[알림] gameId 없음, SCH에서 아직 못 받아온 상태');
      return;
    }

    console.log('[알림] LIVE 경기 감지:', liveGame.away, 'vs', liveGame.home, '이닝:', liveGame.inning);

    // 현재 이닝 relay fetch
    const inningNum = liveGame.inning || 1;
    const relay = await fetchRelayData(liveGame.gameId, inningNum).catch(e => {
      console.log('[알림] relay fetch 실패:', e);
      return null;
    });

    if (!relay) {
      console.log('[알림] relay 데이터 없음');
      return;
    }

    const relayCount = relay.textRelays?.length || 0;
    console.log('[알림] relay 텍스트 수:', relayCount);
    _checkKiaHitNotify(relay, liveGame.away, liveGame.home);
  }, 30000); // 30초마다
}

// ══════════════════════════════════════════════════════════
// 승리 확률 계산 엔진 (이닝/점수차/아웃 기반 WP 테이블)
// 야구 통계학 기반 근사값 (출처: Tango/Lichtman/Dolphin)
// ══════════════════════════════════════════════════════════
var _wpHistory = []; // [{inn, half, kiaWp}]  — 그래프용 히스토리

function calcWinProb(kiaScore, oppScore, inning, inningInfo, isKiaHome) {
  if (kiaScore == null || oppScore == null) return null;
  var inn = Math.max(1, Math.min(9, inning || 1));
  var diff = kiaScore - oppScore; // KIA 기준 점수차 (양수=앞서는 중)
  if (!isKiaHome) diff = -diff;  // 홈팀 관점으로 통일 후 다시 KIA로

  // 이닝 half: 말(bottom)=1, 초(top)=0
  var isBottom = inningInfo ? inningInfo.includes('말') : false;
  // 홈팀 = isKiaHome 일 때, 말 공격이면 KIA 공격
  // WP 기준: "현재 상황에서 홈팀이 이길 확률" → KIA 기준으로 변환
  
  // 단순화된 WP 테이블 (이닝 × 점수차)
  // 기준: 동점(0), 리드/뒤짐 1~3점+
  var table = {
    // [이닝][점수차] = 홈팀 WP (50% 기준)
    1: {'-3':0.18,'-2':0.25,'-1':0.35,'0':0.54,'1':0.65,'2':0.76,'3':0.84},
    2: {'-3':0.16,'-2':0.22,'-1':0.32,'0':0.54,'1':0.68,'2':0.79,'3':0.87},
    3: {'-3':0.13,'-2':0.19,'-1':0.30,'0':0.54,'1':0.70,'2':0.82,'3':0.90},
    4: {'-3':0.10,'-2':0.16,'-1':0.27,'0':0.54,'1':0.73,'2':0.85,'3':0.92},
    5: {'-3':0.08,'-2':0.13,'-1':0.23,'0':0.54,'1':0.77,'2':0.88,'3':0.94},
    6: {'-3':0.06,'-2':0.10,'-1':0.19,'0':0.54,'1':0.81,'2':0.91,'3':0.96},
    7: {'-3':0.04,'-2':0.07,'-1':0.14,'0':0.55,'1':0.86,'2':0.94,'3':0.97},
    8: {'-3':0.02,'-2':0.04,'-1':0.09,'0':0.55,'1':0.91,'2':0.97,'3':0.99},
    9: {'-3':0.01,'-2':0.02,'-1':0.05,'0':0.50,'1':0.95,'2':0.98,'3':0.99},
  };

  var row = table[inn] || table[9];
  var dKey = String(Math.max(-3, Math.min(3, diff)));
  // 홈팀 관점 WP
  var homeWP = row[dKey] != null ? row[dKey] : (diff > 3 ? 0.995 : 0.005);
  // 말 이닝이면 공격팀(홈)이 한 번 더 치므로 WP 약간 보정
  if (isBottom) homeWP = Math.min(0.999, homeWP * 1.03);

  // KIA WP: KIA가 홈이면 homeWP, 원정이면 1-homeWP
  var kiaWP = isKiaHome ? homeWP : (1 - homeWP);
  return Math.round(kiaWP * 100);
}

function recordWpHistory(kiaWp, inning, inningInfo) {
  if (kiaWp == null) return;
  var label = inning + (inningInfo && inningInfo.includes('말') ? '말' : '초');
  // 같은 이닝이면 덮어쓰기
  var last = _wpHistory[_wpHistory.length - 1];
  if (last && last.label === label) {
    last.wp = kiaWp;
  } else {
    _wpHistory.push({label: label, wp: kiaWp});
    if (_wpHistory.length > 20) _wpHistory.shift();
  }
}

function renderWpGauge(kiaWp) {
  // kiaWp: 0~100
  if (kiaWp == null) return '';
  var opp = 100 - kiaWp;
  var _dk = (typeof state !== 'undefined' && state.dark);
  var _tc  = _dk ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.65)';
  var _tc2 = _dk ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.5)';
  var _tc3 = _dk ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.45)';
  var _barBg = _dk ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
  var _labelBg = _dk ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.06)';
  var kiaColor = kiaWp >= 50 ? '#E31837' : _tc2;
  var oppColor = opp >= 50 ? '#4FC3F7' : _tc2;
  var label = kiaWp > 70 ? '우세' : kiaWp > 55 ? '유리' : kiaWp > 45 ? '박빙' : kiaWp > 30 ? '불리' : '열세';
  var labelColor = kiaWp >= 55 ? '#ff3b5c' : kiaWp >= 45 ? '#FFB300' : '#4FC3F7';

  return '<div style="margin-top:12px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
      '<div style="font-size:9px;font-weight:800;color:' + _tc3 + ';letter-spacing:.1em;text-transform:uppercase">승리 확률</div>' +
      '<div style="font-size:9px;font-weight:800;color:' + labelColor + ';background:' + _labelBg + ';border-radius:4px;padding:1px 6px">' + label + '</div>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">' +
      '<div style="font-size:10px;font-weight:800;color:' + _tc + ';width:26px;text-align:right">KIA</div>' +
      '<div style="flex:1;height:8px;border-radius:4px;background:' + _barBg + ';overflow:hidden;position:relative">' +
        '<div style="height:100%;width:' + kiaWp + '%;background:linear-gradient(90deg,#E31837,#ff3b5c);border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(227,24,55,0.5)"></div>' +
      '</div>' +
      '<div style="font-size:13px;font-weight:900;color:' + kiaColor + ';width:34px;text-align:left;font-variant-numeric:tabular-nums">' + kiaWp + '%</div>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:8px">' +
      '<div style="font-size:10px;font-weight:800;color:' + _tc2 + ';width:26px;text-align:right">상대</div>' +
      '<div style="flex:1;height:8px;border-radius:4px;background:' + _barBg + ';overflow:hidden">' +
        '<div style="height:100%;width:' + (100-kiaWp) + '%;background:linear-gradient(90deg,rgba(79,195,247,0.6),rgba(79,195,247,0.3));border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)"></div>' +
      '</div>' +
      '<div style="font-size:13px;font-weight:900;color:' + oppColor + ';width:34px;text-align:left;font-variant-numeric:tabular-nums">' + (100-kiaWp) + '%</div>' +
    '</div>' +
  '</div>';
}

function renderWpGraph() {
  if (_wpHistory.length < 2) return '';
  var W = 228, H = 64, PAD = 4;
  var pts = _wpHistory;
  var n = pts.length;
  // SVG path
  var xStep = (W - PAD*2) / Math.max(n-1, 1);
  var toY = function(wp) { return PAD + (H - PAD*2) * (1 - wp/100); };
  var path = pts.map(function(p,i) {
    var x = PAD + i * xStep;
    var y = toY(p.wp);
    return (i===0?'M':'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  // 50% 기준선 y
  var midY = toY(50);
  // 마지막 포인트
  var lastPt = pts[pts.length-1];
  var lastX = PAD + (n-1)*xStep;
  var lastY = toY(lastPt.wp);
  var lastColor = lastPt.wp >= 50 ? '#E31837' : '#4FC3F7';

  // Fill under curve (위험: 50% 기준선 아래는 다른 색)
  var fillPath = path + ' L' + (PAD+(n-1)*xStep).toFixed(1) + ',' + H + ' L' + PAD + ',' + H + ' Z';

  var _dk2 = (typeof state !== 'undefined' && state.dark);
  var _gTitle = _dk2 ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.4)';
  var _gBg    = _dk2 ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.04)';
  var _gBord  = _dk2 ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)';
  var _gGrid  = _dk2 ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
  var _g50    = _dk2 ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.3)';
  var _gLabel = _dk2 ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.4)';
  var _gDot   = _dk2 ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.2)';

  return '<div style="margin-top:14px">' +
    '<div style="font-size:9px;font-weight:800;color:' + _gTitle + ';letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">WP 추이 그래프</div>' +
    '<div style="background:' + _gBg + ';border-radius:10px;padding:8px 10px;border:1px solid ' + _gBord + '">' +
      '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="overflow:visible">' +
        '<line x1="' + PAD + '" y1="' + midY.toFixed(1) + '" x2="' + (W-PAD) + '" y2="' + midY.toFixed(1) + '" stroke="' + _gGrid + '" stroke-width="1" stroke-dasharray="3,3"/>' +
        '<text x="' + (W-PAD+2) + '" y="' + (midY+3).toFixed(1) + '" font-size="7" fill="' + _g50 + '" font-weight="700">50</text>' +
        '<path d="' + fillPath + '" fill="url(#wpGrad)" opacity="0.3"/>' +
        '<path d="' + path + '" fill="none" stroke="' + lastColor + '" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
        '<circle cx="' + lastX.toFixed(1) + '" cy="' + lastY.toFixed(1) + '" r="3.5" fill="' + lastColor + '" stroke="' + _gDot + '" stroke-width="1"/>' +
        '<defs><linearGradient id="wpGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E31837" stop-opacity="0.6"/><stop offset="100%" stop-color="#E31837" stop-opacity="0"/></linearGradient></defs>' +
        (function() {
          var labels = '';
          [0, Math.floor(n/2), n-1].forEach(function(idx) {
            if (idx < 0 || idx >= n) return;
            var p = pts[idx];
            var x = PAD + idx * xStep;
            labels += '<text x="' + x.toFixed(1) + '" y="' + (H+12) + '" font-size="7" fill="' + _gLabel + '" text-anchor="middle" font-weight="600">' + p.label + '</text>';
          });
          return labels;
        })() +
      '</svg>' +
    '</div>' +
  '</div>';
}

// ── 오른쪽 패널: 오늘의 KIA 경기 + 상태 업데이트 ──
function updateRightPanel() {
  if (window.innerWidth < 1080) return;

  // D-day
  var ddEl = document.getElementById('rp-dday-val');
  if (ddEl && typeof getDday === 'function') ddEl.textContent = getDday();

  // 오늘 날짜 KST
  var kst = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  var today = kst.getFullYear() + '-' + String(kst.getMonth()+1).padStart(2,'0') + '-' + String(kst.getDate()).padStart(2,'0');

  // 마지막 갱신 시각
  var upEl = document.getElementById('rp-last-update');
  if (upEl) upEl.textContent = String(kst.getHours()).padStart(2,'0') + ':' + String(kst.getMinutes()).padStart(2,'0');

  // 알림 상태
  var notEl = document.getElementById('rp-notify-status');
  if (notEl) {
    if (window._notifyEnabled) {
      notEl.textContent = '● 활성화';
      notEl.className = 'rp-stat-val live';
    } else {
      notEl.textContent = '대기중';
      notEl.className = 'rp-stat-val';
    }
  }

  // 오늘 KIA 경기 찾기
  var todaySec = document.getElementById('rp-today-game');
  if (!todaySec || typeof SCH === 'undefined') return;
  var kiaGame = SCH.find(function(g) {
    return g.date === today && (g.away === 'KIA' || g.home === 'KIA');
  });

  if (!kiaGame) {
    todaySec.innerHTML = '<div class="rp-dday"><div class="rp-dday-val" id="rp-dday-val">' + (typeof getDday==='function'?getDday():'--') + '</div><div class="rp-dday-label">KBO 정규시즌</div></div>';
    return;
  }

  var isHome = kiaGame.home === 'KIA';
  var opp = isHome ? kiaGame.away : kiaGame.home;
  var kiaS = isHome ? kiaGame.homeScore : kiaGame.awayScore;
  var oppS = isHome ? kiaGame.awayScore : kiaGame.homeScore;
  var hasScore = kiaS != null && oppS != null;
  var isLive = kiaGame.status === 'LIVE';
  var isFinal = kiaGame.status === 'FINAL';
  var statusText = isLive ? (kiaGame.inningInfo || 'LIVE') : isFinal ? '최종' : (kiaGame.time || '예정');
  var inn = kiaGame.inning || 1;
  var innPct = Math.min(100, Math.round((inn / 9) * 100));
  var kiaWin = hasScore && kiaS > oppS;
  var scoreDisp = hasScore ? (kiaS + ' : ' + oppS) : 'vs ' + opp;
  var scoreColor = !hasScore ? '' : (kiaWin ? 'color:#22c55e' : (kiaS < oppS ? 'color:var(--accent)' : ''));

  // ── 승리 확률 계산 ──
  var kiaWp = null;
  var wpGaugeHtml = '';
  var wpGraphHtml = '';

  if ((isLive || isFinal) && hasScore) {
    kiaWp = calcWinProb(kiaS, oppS, inn, kiaGame.inningInfo, isHome);
    if (isFinal) kiaWp = kiaWin ? 100 : (kiaS === oppS ? 50 : 0);
    if (isLive) recordWpHistory(kiaWp, inn, kiaGame.inningInfo);
    wpGaugeHtml = renderWpGauge(kiaWp);
    wpGraphHtml = renderWpGraph();
  }

  todaySec.innerHTML =
    '<div class="rp-game-card">' +
      '<div class="rp-game-teams">' +
        '<span class="rp-game-team">KIA</span>' +
        '<span class="rp-game-vs">' + (isHome ? '홈' : '원정') + '</span>' +
        '<span class="rp-game-team">' + opp + '</span>' +
      '</div>' +
      '<div class="rp-game-score" style="' + scoreColor + '">' + scoreDisp + '</div>' +
      '<div class="rp-game-meta">' +
        (isLive ? '<span style="color:var(--accent);font-weight:900">● ' + statusText + '</span>' : statusText) +
        ' · ' + (kiaGame.stadium || (isHome ? '광주' : '')) +
      '</div>' +
      (isLive ? '<div class="rp-seg-bar"><div class="rp-seg-fill" style="width:' + innPct + '%"></div></div>' : '') +
      wpGaugeHtml +
      wpGraphHtml +
    '</div>';
}

function updateRpStandings() {

  if (!rows || !rows.length) return;

    var teamStyle = isKia ? ' style="color:var(--accent)"' : '';
    var teamName = (typeof T !== 'undefined' && T[row.tkey]) ? T[row.tkey].name : row.tkey;

      '<span class="rp-rank-team"' + teamStyle + '>' + teamName + '</span>' +
      '<span class="rp-rank-note">' + note + '</span>' +
      '</div>';
  }).join('');
}

updateRpStandings();
setInterval(updateRightPanel, 30000);
setInterval(updateRpStandings, 60000);
</script>

<!-- ── 선수 상세 미니 모달 ── -->
<div id="player-detail-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(10,14,26,0.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;animation:fadeIn 0.18s ease" onclick="if(event.target===this)closePlayerDetail()">
  <div id="player-detail-box" style="width:100%;max-width:480px;background:rgba(245,247,252,0.98);border:1px solid rgba(255,255,255,0.85);border-bottom:none;border-radius:20px 20px 0 0;padding:0 0 28px;animation:slideUp 0.3s cubic-bezier(0.34,1.35,0.64,1);box-shadow:0 -12px 44px rgba(0,0,0,0.22)">
    <!-- 핸들 -->
    <div style="display:flex;justify-content:center;padding:10px 0 4px">
      <div style="width:36px;height:4px;background:rgba(0,0,0,0.12);border-radius:2px"></div>
    </div>
    <!-- 헤더 -->
    <div id="pd-header" style="display:flex;align-items:center;gap:12px;padding:12px 20px 14px">
      <div id="pd-avatar" style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div id="pd-name" style="font-size:18px;font-weight:900;color:#141925;letter-spacing:-0.3px"></div>
        <div id="pd-pos" style="font-size:11px;font-weight:600;color:rgba(20,25,37,0.45);margin-top:2px"></div>
      </div>
      <button onclick="closePlayerDetail()" style="width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.07);color:#666;font-size:16px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer">✕</button>
    </div>
    <!-- 스탯 카드들 -->
    <div id="pd-stats" style="display:grid;gap:8px;padding:0 16px"></div>
  </div>
</div>

<style>
  body.dark #player-detail-box {
    background: rgba(18,24,38,0.97) !important;
    border-color: rgba(255,255,255,0.08) !important;
  }
  body.dark #pd-name { color: #edf1fa !important; }
  body.dark #pd-pos  { color: rgba(237,241,250,0.4) !important; }
  .pd-stat-row {
    background: rgba(0,0,0,0.04);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  body.dark .pd-stat-row { background: rgba(255,255,255,0.06); }
  .pd-stat-label { font-size: 12px; font-weight: 700; color: rgba(20,25,37,0.5); }
  body.dark .pd-stat-label { color: rgba(237,241,250,0.45); }
  .pd-stat-val { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
  .pd-stat-bar-wrap { height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; margin-top: 6px; overflow:hidden; }
  body.dark .pd-stat-bar-wrap { background: rgba(255,255,255,0.1); }
  .pd-stat-bar { height: 100%; border-radius: 3px; transition: width 0.4s cubic-bezier(0.34,1.2,0.64,1); }
  .pd-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pd-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .pd-mini-card { background: rgba(0,0,0,0.04); border-radius: 10px; padding: 10px 12px; text-align:center; }
  body.dark .pd-mini-card { background: rgba(255,255,255,0.06); }
  .pd-mini-label { font-size: 10px; font-weight: 700; color: rgba(20,25,37,0.45); margin-bottom:4px; }
  body.dark .pd-mini-label { color: rgba(237,241,250,0.4); }
  .pd-mini-val { font-size: 18px; font-weight: 900; }
</style>


<script>
// ── 선수 상세 미니 모달 ──
window.openPlayerDetail = function(p) {
  const isDark = document.body.classList.contains('dark');
  const color = p.color || '#E31837';
  const overlay = document.getElementById('player-detail-overlay');
  const box     = document.getElementById('player-detail-box');
  const avatar  = document.getElementById('pd-avatar');
  const nameEl  = document.getElementById('pd-name');
  const posEl   = document.getElementById('pd-pos');
  const stats   = document.getElementById('pd-stats');

  // 헤더
  avatar.style.background = color;
  avatar.textContent = p.name ? p.name[0] : '?';
  nameEl.textContent = p.name || '';

  let html = '';

  if (p.type === 'batter') {
    posEl.textContent = posLabel(p.pos) + (p.order ? '  ' + p.order + '번 타자' : '');

    // 타율 계산
    const avg = p.ab > 0 ? (p.hit / p.ab) : 0;
    const avgStr = p.ab > 0 ? avg.toFixed(3).replace('0.', '.') : '-';
    const avgPct = Math.min(avg / 0.400 * 100, 100); // .400 기준 100%

    // 출루율 (간이: (안타+볼넷) / (타수+볼넷))
    const obpDenom = p.ab + p.bb;
    const obp = obpDenom > 0 ? ((p.hit + p.bb) / obpDenom) : 0;
    const obpStr = obpDenom > 0 ? obp.toFixed(3).replace('0.', '.') : '-';

    html += `<div class="pd-stat-row">
      <div>
        <div class="pd-stat-label">타율</div>
        <div class="pd-stat-val" style="color:${color}">${avgStr}</div>
        <div class="pd-stat-bar-wrap" style="width:140px;margin-top:6px">
          <div class="pd-stat-bar" style="width:${avgPct}%;background:${color}"></div>
        </div>
      </div>
      <div style="text-align:right">
        <div class="pd-stat-label">출루율</div>
        <div class="pd-stat-val" style="color:${color};font-size:18px">${obpStr}</div>
        <div style="font-size:10px;color:rgba(0,0,0,0.3);margin-top:2px">${p.ab}타수 ${p.hit}안타 ${p.bb}볼넷</div>
      </div>
    </div>`;

    html += `<div class="pd-grid3">
      <div class="pd-mini-card">
        <div class="pd-mini-label">득점</div>
        <div class="pd-mini-val" style="color:${p.run>0?color:'inherit'}">${p.run||0}</div>
      </div>
      <div class="pd-mini-card">
        <div class="pd-mini-label">타점</div>
        <div class="pd-mini-val" style="color:${p.rbi>0?color:'inherit'}">${p.rbi||0}</div>
      </div>
      <div class="pd-mini-card">
        <div class="pd-mini-label">볼넷</div>
        <div class="pd-mini-val" style="color:${p.bb>0?color:'inherit'}">${p.bb||0}</div>
      </div>
    </div>`;

    // 간단한 한줄 평
    const comment = batterComment(p, avg, color);
    if (comment) html += `<div style="padding:10px 16px;font-size:12px;line-height:1.6;color:${isDark?'rgba(237,241,250,0.6)':'rgba(20,25,37,0.5)'}">${comment}</div>`;

  } else if (p.type === 'pitcher') {
    posEl.textContent = '투수';

    // ERA 간이 계산 (이닝 파싱)
    const innNum = parseInn(p.inn);
    const era = innNum > 0 ? ((p.er * 9) / innNum).toFixed(2) : '-';
    const eraColor = innNum > 0 ? (p.er === 0 ? '#00C864' : p.er <= 2 ? color : '#FF6B35') : 'inherit';

    html += `<div class="pd-stat-row">
      <div>
        <div class="pd-stat-label">이닝 ERA (오늘)</div>
        <div class="pd-stat-val" style="color:${eraColor}">${era}</div>
        <div style="font-size:10px;color:rgba(0,0,0,0.3);margin-top:4px">${p.inn}이닝 · ${p.pc}구</div>
      </div>
      <div style="text-align:right">
        <div class="pd-stat-label">피안타</div>
        <div class="pd-stat-val" style="color:${p.hit>0?'#FF6B35':'inherit'};font-size:18px">${p.hit||0}</div>
      </div>
    </div>`;

    html += `<div class="pd-grid3">
      <div class="pd-mini-card">
        <div class="pd-mini-label">삼진</div>
        <div class="pd-mini-val" style="color:${p.kk>0?color:'inherit'}">${p.kk||0}</div>
      </div>
      <div class="pd-mini-card">
        <div class="pd-mini-label">볼넷</div>
        <div class="pd-mini-val" style="color:${p.bb>0?'#FF6B35':'inherit'}">${p.bb||0}</div>
      </div>
      <div class="pd-mini-card">
        <div class="pd-mini-label">실점</div>
        <div class="pd-mini-val" style="color:${p.er>0?'#FF6B35':'inherit'}">${p.er||0}</div>
      </div>
    </div>`;

    const comment = pitcherComment(p, innNum, era, color);
    if (comment) html += `<div style="padding:10px 16px;font-size:12px;line-height:1.6;color:${isDark?'rgba(237,241,250,0.6)':'rgba(20,25,37,0.5)'}">${comment}</div>`;
  }

  stats.innerHTML = html;
  overlay.style.display = 'flex';

  // 바 애니메이션 (약간 딜레이)
  requestAnimationFrame(() => {
    overlay.style.opacity = '1';
  });
};

window.closePlayerDetail = function() {
  const overlay = document.getElementById('player-detail-overlay');
  overlay.style.display = 'none';
};

// 이닝 문자열 → 숫자 (예: "5⅓" → 5.33, "3" → 3)
function parseInn(inn) {
  if (!inn) return 0;
  const s = String(inn).trim();
  const base = parseFloat(s) || 0;
  if (s.includes('⅓') || s.includes('1/3')) return Math.floor(base) + 1/3;
  if (s.includes('⅔') || s.includes('2/3')) return Math.floor(base) + 2/3;
  return base;
}

// 포지션 레이블
function posLabel(pos) {
  const map = {'C':'포수','1B':'1루수','2B':'2루수','3B':'3루수','SS':'유격수','LF':'좌익수','CF':'중견수','RF':'우익수','DH':'지명타자','P':'투수'};
  return map[pos] || pos || '';
}

// 타자 한줄 코멘트
function batterComment(p, avg, color) {
  if (p.ab === 0) return '이번 경기 출전 기록 없음';
  const parts = [];
  if (p.hit >= 3) parts.push(`<b style="color:${color}">${p.hit}안타</b> 맹타!`);
  else if (p.hit === 2) parts.push(`<b style="color:${color}">2안타</b> 활약`);
  else if (p.hit === 1) parts.push('1안타');
  else parts.push(`${p.ab}타수 무안타`);
  if (p.rbi >= 2) parts.push(`<b style="color:${color}">${p.rbi}타점</b> 포함`);
  else if (p.rbi === 1) parts.push('1타점');
  if (p.run >= 1) parts.push(`${p.run}득점`);
  return parts.join(' · ');
}

// 투수 한줄 코멘트
function pitcherComment(p, innNum, era, color) {
  if (innNum === 0) return '투구 기록 없음';
  const parts = [];
  if (innNum >= 6 && p.er === 0) parts.push(`<b style="color:#00C864">퀄리티 스타트</b> 호투`);
  else if (innNum >= 5) parts.push(`${p.inn}이닝 소화`);
  else parts.push(`${p.inn}이닝`);
  if (p.kk >= 7) parts.push(`<b style="color:${color}">${p.kk}K</b> 지배적`);
  else if (p.kk >= 4) parts.push(`${p.kk}K`);
  if (p.er === 0) parts.push('무실점');
  else if (p.er >= 3) parts.push(`<b style="color:#FF6B35">${p.er}실점</b>`);
  return parts.join(' · ');
}

// 모달 외부 키보드 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePlayerDetail();
});
</script>

</body>
</html>
